    info:
      description: Define persistent volume claim for NFS Ganesha
      maturity: experimental
      internal: true
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      '{{ .Values._internal.default_storage_class_unit }}': true
    enabled_conditions:
    - '{{ tuple . "nfs-ganesha" | include "unit-enabled" }}'
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/nfs-ganesha-init
      targetNamespace: nfs-ganesha
      wait: true
      postBuild:
        substitute:
          storage_size: 5Gi
          storage_class: '{{ .Values._internal.default_storage_class }}'

  nfs-ganesha:
    info:
      description: manages NFS Ganesha CSI provisioner
      maturity: experimental
    enabled: false
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      nfs-ganesha-init: true
    helm_repo_url: https://kubernetes-sigs.github.io/nfs-ganesha-server-and-external-provisioner/
    helmrelease_spec:
      targetNamespace: nfs-ganesha
      chart:
        spec:
          chart: nfs-server-provisioner
          version: 1.8.0
      values:
        replicaCount: 1
        extraArgs:
          device-based-fsids: false
        persistence:
          enabled: true
          existingClaim: nfs-ganesha-data-pvc
        storageClass:
          name: nfs-ganesha
          allowVolumeExpansion: true

  test-nfs-ganesha:
    enabled: '{{ .Values.env_type | eq "ci" }}'
    info:
      description: Perform testing for RWX enabled PVs created from NFS Ganesha
      internal: true
      test: true
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      nfs-ganesha: true
    enabled_conditions:
    - '{{ tuple . "nfs-ganesha" | include "unit-enabled" }}'
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/test-nfs-ganesha
      targetNamespace: nfs-ganesha
      wait: true

  ceph-csi-cephfs:
    info:
      description: Installs Ceph-CSI
      maturity: beta
    enabled: false
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
    helm_repo_url: https://ceph.github.io/csi-charts
    helmrelease_spec:
      targetNamespace: ceph-csi-cephfs
      chart:
        spec:
          chart: ceph-csi-cephfs
          version: 3.12.3
      values:
        provisioner:
          replicaCount: '{{ .Values.cluster.control_plane_replicas }}'
        storageClass:
          create: true
          name: cephfs-csi
          clusterID: '{{ .Values.ceph.cephfs_csi.clusterID }}'
          fsName: '{{ .Values.ceph.cephfs_csi.fs_name }}'
          annotations:
            storageclass.kubernetes.io/is-default-class: '{{ .Values._internal.default_storage_class | eq "cephfs-csi" }}'
        csiConfig:
          - clusterID: '{{ .Values.ceph.cephfs_csi.clusterID }}'
            monitors: '{{ .Values.ceph.cephfs_csi.monitors_ips | include "preserve-type" }}'
    helm_secret_values:
      secret:
        create: true
        adminID: '{{ .Values.ceph.cephfs_csi.adminID }}'
        adminKey: '{{ .Values.ceph.cephfs_csi.adminKey }}'

  longhorn-crd:
    info:
      description: installs Longhorn CRDs
      maturity: stable
      hidden: true
    unit_templates:
    - base-deps
    enabled_conditions:
    - '{{ tuple . "longhorn" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
    helm_repo_url: https://charts.rancher.io/
    helmrelease_spec:
      releaseName: longhorn-crd
      targetNamespace: longhorn-system
      chart:
        spec:
          chart: longhorn-crd
          version: 104.2.2+up1.7.3

  longhorn:
    info:
      description: installs Longhorn CSI
      maturity: stable
    enabled: false
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      longhorn-crd: true
      monitoring-crd: '{{ tuple . "monitoring" | include "unit-enabled" }}'
    helm_repo_url: https://charts.rancher.io/
    helmrelease_spec:
      releaseName: longhorn
      targetNamespace: longhorn-system
      install:
        createNamespace: false
      chart:
        spec:
          chart: longhorn
          version: 104.2.2+up1.7.3
      values:
        metrics:
          serviceMonitor:
            enabled: '{{ .Values._internal.monitoring.enabled | include "preserve-type" }}'
        defaultSettings:
          createDefaultDiskLabeledNodes: true
          allowVolumeCreationWithDegradedAvailability: false
          storageMinimalAvailablePercentage: 10
          replicaReplenishmentWaitInterval: '{{ .Values.cluster.capi_providers.infra_provider | eq "capm3" | ternary 3600 600 | include "preserve-type" }}'
          nodeDrainPolicy: block-for-eviction-if-contains-last-replica
          concurrentAutomaticEngineUpgradePerNodeLimit: 3
        persistence:
          defaultClass: '{{ .Values._internal.default_storage_class | eq "longhorn" | include "preserve-type" }}'

  longhorn-engine-image-cleanup:
    info:
      description: kyverno cleanup policy to delete old Longhorn engineimages that are left-over after upgrade
      internal: true
    enabled_conditions:
    - '{{ tuple . "longhorn" | include "unit-enabled" }}'
    - '{{ tuple . "kyverno" | include "unit-enabled" }}'
    depends_on:
      longhorn: true
      kyverno: true
    unit_templates:
    - base-deps
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/kyverno-policies/longhorn-engine-image-cleanup

  longhorn-instance-manager-cleanup:
    info:
      description: cronjob to cleanup Longhorn instance-manager pods that are preventing node drain
      internal: true
    enabled_conditions:
    - '{{ tuple . "longhorn" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    - kube-cronjob
    kustomization_spec:
      postBuild:
        substitute:
          NAMESPACE: longhorn-system
      _patches:
      - target:
          kind: CronJob
        patch: |
          - op: replace
            path: /spec/schedule
            value:  "*/5 * * * *" # Every 5 minutes
      - target:
          kind: ClusterRole
        patch: |
          - op: replace
            path: /rules
            value:
              - apiGroups: [""]
                resources: [nodes]
                verbs: [list, get, patch]
      - target:
          kind: ConfigMap
          labelSelector: kube-cronjob=script
        patch: |
          - op: replace
            path: /data/kube-cronjob.sh
            value: |
              #!/bin/bash

              set -e
              set -o pipefail

              if [[ $(kubectl api-resources --api-group=longhorn.io --no-headers | wc -l)  -eq 0 ]]; then
                  echo "=== Longhorn is not yet installed, aborting ==="
                  exit 0
              fi

              echo "=== Checking for nodes being drained ==="

              for NODE in $(kubectl get nodes -o json |
                              jq -r '.items[] | select(.spec.taints // [] | .[] |
                                                select(.effect == "NoSchedule") |
                                                select(.key == "node.kubernetes.io/unschedulable")
                                                      ) | .metadata.name'
                  ); do

                  echo "=== Node $NODE is being drained, checking if it has volumes attached ==="

                  NODE_VOLUMES=$(kubectl get volume.longhorn.io -n longhorn-system -o json | jq -r --arg node $NODE '[.items[] | select(.spec.nodeID == $node) | .metadata.name] | join(", ")')
                  if [[ -n $NODE_VOLUMES ]]; then
                      echo "Some volumes are still attached to node $NODE: $NODE_VOLUMES"
                      echo "Waiting for volumes to be detached"
                      continue
                  else
                      echo "There are no volumes attached to node $NODE"
                  fi


                  # Compute the list of PVC using single-replicas storageClass
                  SINGLE_REPLICA_VOLUMES=$(kubectl get volume.longhorn.io -n longhorn-system -o json | jq '[.items[] | select(.spec.numberOfReplicas == 1) | .metadata.name]')
                  # Retrieve the list of replicas used by these PVC
                  SINGLE_REPLICA_REPLICAS=$(kubectl get replicas -n longhorn-system -o json | \
                                            jq --argjson single_replicas_pvc "$SINGLE_REPLICA_VOLUMES" \
                                            '[.items[] | select(.spec.volumeName as $in | $single_replicas_pvc | index($in))]')

                  # Filter replicas hosted on nodes being drained
                  NODE_SINGLE_REPLICAS=$(jq -r --arg node $NODE <<< $SINGLE_REPLICA_REPLICAS '[.[] | select(.spec.nodeID == $node) | .metadata.name] | join(", ")')

                  if [[ -n $NODE_SINGLE_REPLICAS ]]; then
                      echo "Some replicas that are not duplicated elsewhere are still attached to node $NODE: $NODE_SINGLE_REPLICAS"
                      echo "Waiting for these replicas to be moved to another node"
                      continue
                  else
                      echo "There are no replicas from single-replica storageclass hosted on node $NODE"
                  fi

                  NODE_INSTANCE_MANAGER_PODS=$(kubectl get pods -n longhorn-system -l longhorn.io/component=instance-manager -l longhorn.io/node=$NODE -o name)
                  for NODE_INSTANCE_MANAGER_POD in $NODE_INSTANCE_MANAGER_PODS; do
                      echo "Instance-manager pod is still running on node $NODE with following status:"
                      kubectl get -n longhorn-system instancemanagers.longhorn.io ${NODE_INSTANCE_MANAGER_POD#pod/} -o yaml
                      echo "Deleting instance-manager as it has been left-over"
                      kubectl delete -n longhorn-system $NODE_INSTANCE_MANAGER_POD
                      # Generate an event to track that deletion
                      kubectl apply -f - <<EOF
                          apiVersion: v1
                          kind: Event
                          metadata:
                            name: cleanup-instance-manager
                            namespace: longhorn-system
                          # Kubernetes expects to parse time as "2006-01-02T15:04:05.000000Z07:00" but time command in alpine does not support "%Y-%m-%dT%H:%M:%S.%6NZ" format
                          eventTime: $(date -u +"%Y-%m-%dT%H:%M:%SZ" | sed 's/Z$/.000000Z/')
                          type: Warning
                          message: "Deleted instance-manager pod $NODE_INSTANCE_MANAGER_POD in node $NODE"
                          involvedObject:
                            apiVersion: v1
                            kind: pod
                            name: $NODE_INSTANCE_MANAGER_POD
                            namespace: longhorn-system
                          reportingComponent: cleanup-instance-manager
                          reportingInstance: cleanup-instance-manager-cronjob
                          action: PodDeleted
                          reason: PodDeleted
              EOF
                      log_event $NODE_INSTANCE_MANAGER_POD $NODE
                  done
                  if [[ -z $NODE_INSTANCE_MANAGER_PODS ]]; then
                      echo "No instance-manager pods found on node $NODE, nothing to do"
                  fi
              done

              echo "=== All done ==="

  cluster-creator-login:
    info:
      description: configures Rancher account used for workload cluster imports
      internal: true
    unit_templates:
    - base-deps
    - kube-job
    - kube-cronjob
    enabled_conditions:
    - '{{ tuple . "rancher" | include "unit-enabled" }}'
    depends_on:
      rancher: true
      first-login-rancher: true
    kustomization_spec:
      path: ./kustomize-units/cluster-creator-login  # inherits from kustomize-units/kube-job and kustomize-units/kube-cronjob
      postBuild:
        substitute:
          CRONJOB_NAME: cluster-creator-renewal
      _patches:
        # this patch adjusts the cron schedule
        - target:
            kind: CronJob
          patch: |
            - op: replace
              path: /spec/schedule
              value: "24 4 */10 * *" # this cron needs to be adjusted if kubeconfig-default-token-ttl-minutes Rancher setting changes from the default (43200 minutes)
      wait: false
      healthChecks:
        - apiVersion: v1
          kind: Secret
          name: cluster-creator-kubeconfig
          namespace: '{{ .Release.Namespace }}'
        - apiVersion: batch/v1
          kind: Job
          name: cluster-creator-login
          namespace: '{{ .Release.Namespace }}'
        - apiVersion: batch/v1
          kind: CronJob
          name: cluster-creator-renewal
          namespace: '{{ .Release.Namespace }}'

  cluster-creator-policy:
    info:
      description: Kyverno policy for cluster creator
      details: |
        This units defines a Kyverno policy to distribute the Kubeconfig of cluster creator
        in all workload cluster namespaces, to allow the import of workload clusters in
        Rancher.
      internal: true
    enabled_conditions:
    - '{{ tuple . "rancher" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      cluster-creator-login: true
      kyverno: true
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/cluster-creator-policy
      wait: true
      force: true

  rancher-default-roles:
    info:
      description: Create Rancher role templates
      details: |
        This unit creates a set of additional role templates which are likely to be needed by many
        clusters.
      internal: true
    enabled_conditions:
    - '{{ tuple . "rancher" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      rancher: true
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/rancher-default-roles

  os-images-info:
    info:
      description: Creates a list of os images
      details: |
        This unit creates a configmap containing the os images (and their details in the case of Sylva diskimage-builder ones)
        to be further served by os-image-server
      internal: true
    enabled_conditions:
      - '{{ or (tuple . "capm3" | include "unit-enabled")
               (.Values.cluster.capi_providers.infra_provider | eq "capo")
               (.Values.cluster.capi_providers.infra_provider | eq "capm3")
         }}'
    unit_templates:
    - base-deps
    - kube-job
    kustomization_spec:
      _components:
      - '{{ tuple "./components/certs" (not .Values.oci_registry_insecure) | include "set-only-if" }}'
      postBuild:
        substitute:
          JOB_CHECKSUM: |-
            {{
            tuple . (list
              .Values._internal.sylva_core_version
              (include "generate-os-images" .)
              .Values.proxies
              (index (tuple . .Values.no_proxy_additional | include "interpret-inner-gotpl" | fromJson) "result")
              .Values.oci_registry_insecure
            ) | include "interpret-and-hash"
            }}
          EXTRA_CA_CERTS: '{{ tuple (.Values.oci_registry_extra_ca_certs | default "" | b64enc) (not .Values.oci_registry_insecure) | include "set-only-if" }}'
      _patches:
        - target:
            kind: Job
          patch: |
            - op: replace
              path: /spec/template/spec/containers/0/image
              # renovate: datasource=docker
              value: registry.gitlab.com/sylva-projects/sylva-elements/container-images/oci-tools:0.1.1
            - op: add
              path: /spec/template/spec/containers/0/env
              value:
              - name: https_proxy
                value: '{{ .Values.proxies.https_proxy }}'
              - name: no_proxy
                value: '{{ include "sylva-units.no_proxy" (tuple .) }}'
              - name: oci_registry_insecure
                value: '{{ .Values.oci_registry_insecure }}'
              - name: SKIP_IMAGE_VERIFICATION
                value: '{{ .Values.security.os_images.skip_signing_check }}'

        - target:
            kind: ConfigMap
            labelSelector: kube-job=script
          patch: |
            - op: replace
              path: /data/kube-job.sh
              value: |
            {{ .Files.Get "scripts/create-os-images-info.sh" | indent 4 }}
            - op: add
              path: /data/images.yaml
              value: |
            {{ include "generate-os-images" . | indent 4}}
      wait: false
      healthChecks:
        - apiVersion: batch/v1
          kind: Job
          name: os-images-info
          namespace: '{{ .Release.Namespace }}'
        - apiVersion: v1
          kind: ConfigMap
          name: os-images-info
          namespace: '{{ .Release.Namespace }}'

  os-image-server:
    info:
      description: >
        Deploys a web server on management cluster
        which serves OS images for baremetal clusters.
      maturity: stable
    enabled_conditions:
      - '{{ tuple . "metal3" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      ingress-nginx: '{{ tuple . "ingress-nginx" | include "unit-enabled" }}'
      '{{ .Values._internal.default_storage_class_unit }}': true
      os-images-info: true
    repo: os-image-server
    annotations:
      sylvactl/readyMessage: |
        OS images are served at:
        {{- $osImageFqdn := (coalesce .Values.external_hostnames.os_image_server .Values.display_external_ip) -}}
        {{- range $imageName, $imageParams := (coalesce .Values.os_images .Values._internal.default_os_images) }}
          * https://{{ $osImageFqdn }}/{{ $imageParams.filename }}(.sha256sum)
        {{- end }}
        {{- if not (eq $osImageFqdn .Values.display_external_ip)}}
        ({{ .Values.external_hostnames.os_image_server }} must resolve to {{ .Values.display_external_ip }})
        {{- end }}
    helmrelease_spec:
      chart:
        spec:
          chart: ./charts/os-image-server
      targetNamespace: os-images
      install:
        createNamespace: true
      timeout: 168h  # leave plenty of time to download OS images in initContainers
      values:
        downloader:
          proxy: '{{ get .Values.proxies "https_proxy" }}'
          no_proxy: '{{ include "sylva-units.no_proxy" (tuple .) }}'
          extra_ca_certs: '{{ .Values.oci_registry_extra_ca_certs | include "set-if-defined" }}'
          securityContext:
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 10000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
        nginx:
          securityContext:
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 10000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
        ingress:
          className: nginx
          hosts:
            - host: '{{ .Values.external_hostnames.os_image_server }}'
        osImagePersistenceDefaults:
          enabled: true
          size: '{{ .Values.os_images_default_download_storage_space }}'
          storageClass: '{{ .Values._internal.default_storage_class }}'
      valuesFrom:
        - kind: ConfigMap
          name: os-images-info  # this configmap is a byproduct of the os-images-info unit

  capo-contrail-bgpaas:
    info:
      description: installs CAPO Contrail BGPaaS controller
      maturity: stable
    enabled: false
    repo: capo-contrail-bgpaas
    helm_chart_artifact_name: capo-contrail-bgpaas
    unit_templates:
    - base-deps
    depends_on:
      heat-operator: '{{ tuple . "heat-operator" | include "unit-enabled" }}'
      capo: '{{ tuple . "capo" | include "unit-enabled" }}'
    helmrelease_spec:
      chart:
        spec:
          chart: .
      targetNamespace: capo-contrail-bgpaas-system
      install:
        createNamespace: true
      values:
        conf:
          env:
            DEFAULT_PORT: '0'
            DEFAULT_ASN: '64512'

  vsphere-cpi:
    info:
      description: configures Vsphere Cloud controller manager
      internal: true
    unit_templates: [] # the vsphere-cpi handles the rollout of control plane nodes so must run as soon as the cluster has been created
    depends_on:
      cluster: '{{ tuple . "cluster" | include "unit-enabled" }}'
    enabled_conditions:
      - '{{ eq .Values.cluster.capi_providers.infra_provider "capv" }}'
    helm_repo_url: https://kubernetes.github.io/cloud-provider-vsphere
    helm_chart_versions:
      1.28.0: '{{ include "k8s-version-match" (tuple ">=1.28.0,<1.29.0" .Values._internal.k8s_version) }}'
      1.29.0: '{{ include "k8s-version-match" (tuple ">=1.29.0,<1.30.0" .Values._internal.k8s_version) }}'
      v1.30.0: '{{ include "k8s-version-match" (tuple ">=1.30.0" .Values._internal.k8s_version) }}'
    helmrelease_spec:
      chart:
        spec:
          chart: vsphere-cpi
          version: "" # defined by helm_chart_versions
      releaseName: vsphere-cpi
      storageNamespace: kube-system
      targetNamespace: kube-system
      values:
        config:
          enabled: true
          vcenter: '{{ .Values.cluster.capv.server }}'
          datacenter: '{{ .Values.cluster.capv.dataCenter }}'
          thumbprint: '{{ .Values.cluster.capv.tlsThumbprint }}'
        daemonset:
          image: registry.k8s.io/cloud-pv-vsphere/cloud-provider-vsphere
      _postRenderers:
        - kustomize:
            patches:
              - patch: |-
                  kind: ConfigMap
                  apiVersion: v1
                  metadata:
                    name: vsphere-cloud-config
                    namespace: kube-system
                  data:
                    vsphere.conf: | {{ index (index .Values.vsphere "vsphere-cpi") "vsphere_conf" | toYaml | nindent 4 }}

    helm_secret_values:
      config:
        username: '{{ .Values.cluster.capv.username }}'
        password: '{{ .Values.cluster.capv.password }}'

  vsphere-csi-driver:
    info:
      description: installs Vsphere CSI
      maturity: stable
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ eq .Values.cluster.capi_providers.infra_provider "capv" }}'
    repo: sylva-core
    kustomization_spec:
      path: kustomize-units/vsphere-csi-driver
      targetNamespace: vmware-system-csi
      wait: true
      postBuild:
        substitute:
          SERVER: '{{ .Values.cluster.capv.server }}'
          DATACENTER: '{{ .Values.cluster.capv.dataCenter }}'
          CLUSTER_ID: '{{ printf "%s-%s" .Values.cluster.name (randAlphaNum 10) | trunc 64 }}'
          STORAGE_POLICY_NAME: '{{ .Values.cluster.capv.storagePolicyName | default "" }}'
          CONTROLLER_REPLICAS: '{{ .Values._internal.ha_cluster.is_ha | ternary 3 1 }}'
    kustomization_substitute_secrets:
      USERNAME: '{{ .Values.cluster.capv.username }}'
      PASSWORD: '{{ .Values.cluster.capv.password }}'

  sandbox-privileged-namespace:
    info:
      description: >
        creates the sandbox namespace used
        to perform privileged operations like debugging a node
      internal: true
    unit_templates:
    - base-deps
    enabled: false
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/sandbox-privileged-namespace
      wait: true
      prune: true

  # Gitea-unit
  gitea-secrets:
    info:
      description: >
        create random secret that will be used by gitea application.
        secrets are sync with vault.
      internal: true
    enabled_conditions:
    - '{{ tuple . "gitea" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      vault-config-operator: true
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/gitea/secrets
      wait: true

  gitea-eso:
    info:
      description: >
        write secrets in gitea namespace in gitea expected format
      internal: true
    enabled_conditions:
    - '{{ tuple . "gitea" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      eso-secret-stores: true
      gitea-keycloak-resources: true
      gitea-secrets: true
    repo: sylva-core
    kustomization_substitute_secrets:
      KEY: '{{ .Values.external_certificates.gitea.key | default "" | b64enc }}'
    kustomization_spec:
      path: ./kustomize-units/gitea/eso
      wait: false
      healthChecks:
        - apiVersion: v1
          kind: Secret
          name: gitea-keycloak-oidc-auth
          namespace: gitea
        - apiVersion: v1
          kind: Secret
          name: gitea-admin
          namespace: gitea
        - apiVersion: v1
          kind: Secret
          name: gitea-postgres-secrets
          namespace: gitea
        - apiVersion: v1
          kind: Secret
          name: gitea-redis
          namespace: gitea
        - apiVersion: v1
          kind: Secret
          name: sylva-ca.crt
          namespace: gitea
      postBuild:
        substitute:
          SERVICE: gitea
          SERVICE_DNS: '{{ .Values.external_hostnames.gitea }}'
          CERT: '{{ .Values.external_certificates.gitea.cert | default "" | b64enc }}'
          CACERT: '{{ .Values.external_certificates.cacert | default "" | b64enc }}'
      _components:
        - '{{ ternary "../../tls-components/tls-secret" "../../tls-components/tls-certificate" (hasKey .Values.external_certificates.gitea "cert") }}'
        - "../../tls-components/sylva-ca"

  gitea-keycloak-resources:
    info:
      description: >
        deploys Gitea OIDC client in Sylva's Keycloak realm
      internal: true
    enabled_conditions:
    - '{{ tuple . "gitea" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      keycloak: true
      keycloak-legacy-operator: true
      keycloak-resources: true
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/gitea/keycloak-resources
      targetNamespace: keycloak
      postBuild:
        substitute:
          GITEA_DNS: '{{ .Values.external_hostnames.gitea }}'
      healthChecks:
        - apiVersion: v1
          kind: Secret
          name: keycloak-client-secret-gitea-client  # this secret is a byproduct of the gitea-client KeycloakClient resource
          namespace: keycloak

  gitea-redis:
    info:
      description: installs Redis cluster for Gitea
      maturity: stable
    enabled_conditions:
    - '{{ tuple . "gitea" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      gitea-eso: true
      gitea-keycloak-resources: true
      gitea-secrets: true
      '{{ .Values._internal.default_storage_class_unit }}': true
    repo: bitnami-redis-cluster
    helmrelease_spec:
      chart:
        spec:
          chart: bitnami/redis-cluster
      targetNamespace: gitea
      releaseName: gitea-redis
      values:
        usePassword: true
        existingSecret: gitea-redis
        existingSecretPasswordKey: password
        global:
          storageClass: "{{ .Values._internal.default_storage_class }}"
        persistence:
          size: 8Gi
      _postRenderers:
        - kustomize:
            patches:
            - '{{ .Values._internal.pdb_allow_unhealthy_pod_eviction | include "preserve-type" }}'

  gitea-postgresql-ha:
    info:
      description: installs PostgreSQL HA cluster for Gitea
      maturity: stable
    enabled_conditions:
    - '{{ tuple . "gitea" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      gitea-eso: true
      gitea-keycloak-resources: true
      gitea-secrets: true
      '{{ .Values._internal.default_storage_class_unit }}': true
    repo: bitnami-postgresql-ha
    helmrelease_spec:
      chart:
        spec:
          chart: bitnami/postgresql-ha
      targetNamespace: gitea
      releaseName: gitea-postgres
      values:
        global:
          storageClass: "{{ .Values._internal.default_storage_class }}"
        postgresql:
          username: gitea
          database: gitea
          existingSecret: gitea-postgres-secrets
        pgpool:
          existingSecret: gitea-postgres-secrets
        persistence:
          size: 8Gi
      _postRenderers:
        - kustomize:
            patches:
            - '{{ .Values._internal.pdb_allow_unhealthy_pod_eviction | include "preserve-type" }}'

  gitea:
    info:
      description: installs Gitea
      maturity: stable
    enabled: false
    unit_templates:
    - base-deps
    depends_on:
      cert-manager: true
      gitea-eso: true
      gitea-keycloak-resources: true
      gitea-secrets: true
      gitea-redis: true
      gitea-postgresql-ha: true
      namespace-defs: true
      '{{ .Values._internal.default_storage_class_unit }}': true
    annotations:
      sylvactl/readyMessage: "Gitea can be reached at https://{{ .Values.external_hostnames.gitea }} ({{ .Values.external_hostnames.gitea }} must resolve to {{ .Values.display_external_ip }})"
    helm_repo_url: https://dl.gitea.com/charts/
    helmrelease_spec:
      chart:
        spec:
          chart: gitea
          version: 10.4.1
      targetNamespace: gitea
      releaseName: gitea
      values:
        containerSecurityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 1000
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        redis-cluster:
          enabled: false
        postgresql:
          enabled: false
        postgresql-ha:
          enabled: false
        persistence:
          enabled: true
          size: 10Gi
          storageClass: "{{ .Values._internal.default_storage_class }}"
          accessModes:
            - "{{ .Values._internal.default_storage_class_access_mode_rwx }}"
        replicaCount: >-
          {{- if eq .Values._internal.default_storage_class_RWX_support "true" -}}
          {{ 3 | include "preserve-type" }}
          {{- else -}}
          {{ 1 | include "preserve-type" }}
          {{- end -}}
        strategy:
          type: '{{ eq (tuple . .Values._internal.default_storage_class_RWX_support | include "interpret-as-string") "true" | ternary "RollingUpdate" "Recreate" }}'
        gitea:
          admin:
            existingSecret: gitea-admin
          metrics:
            enabled: true
            serviceMonitor:
              enabled: '{{ .Values._internal.monitoring.enabled | include "preserve-type" }}'
          oauth:
            - name: "keycloak-sylva"
              provider: "openidConnect"
              existingSecret: gitea-keycloak-oidc-auth
              autoDiscoverUrl: 'https://{{ .Values.external_hostnames.keycloak }}/realms/sylva/.well-known/openid-configuration'

          config:
            cron:
              ENABLED: false
            cron.GIT_GC_REPOS:
              ENABLED: false
            server:
              ENABLE_PPROF: true
            database:
              DB_TYPE: postgres
              HOST: gitea-postgres-postgresql-ha-pgpool.gitea.svc.cluster.local:5432
              NAME: gitea
              USER: gitea
              # define by env variable: PASSWD
              SCHEMA: public
            session:
              PROVIDER: redis
              # define by env variable: PROVIDER_CONFIG
            cache:
              ADAPTER: redis
              # define by env variable: HOST
            queue:
              TYPE: redis
              # define by env variable: CONN_STR
            indexer:
              REPO_INDEXER_ENABLED: false
              ISSUE_INDEXER_ENABLED: false

          additionalConfigFromEnvs:
            - name: GITEA__DATABASE__PASSWD # define DB password
              valueFrom:
                secretKeyRef:
                  key: password
                  name: gitea-postgres-secrets
            - name: GITEA__QUEUE__CONN_STR # redis connection string for queue
              valueFrom:
                secretKeyRef:
                  key: connection_string
                  name: gitea-redis
            - name: GITEA__SESSION__PROVIDER_CONFIG # redis connection string for session
              valueFrom:
                secretKeyRef:
                  key: connection_string
                  name: gitea-redis
            - name: GITEA__CACHE__HOST # redis connection string for queue
              valueFrom:
                secretKeyRef:
                  key: connection_string
                  name: gitea-redis
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: 8m
          tls:
          - hosts:
              - '{{ .Values.external_hostnames.gitea }}'
            secretName: gitea-tls
          hosts:
            - host: '{{ .Values.external_hostnames.gitea }}'
              paths:
              - path: /
                pathType: Prefix
        extraVolumes:
          - secret:
              defaultMode: 420
              secretName: sylva-ca.crt
            name: sylva-ca
        extraVolumeMounts:
          - mountPath: /etc/ssl/certs/sylva-ca.crt
            name: sylva-ca
            readOnly: true
            subPath: ca.crt

  minio-operator-init:
    info:
      description: sets up MinIO certificate for minio-operator
      details: it generate certificate
      internal: true
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "minio-operator" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
      sylva-ca: true
    repo: sylva-core
    kustomization_substitute_secrets:
      KEY: '{{ .Values.external_certificates.minio_operator.key | default "" | b64enc }}'
    kustomization_spec:
      path: ./kustomize-units/minio-operator-init
      wait: true
      postBuild:
        substitute:
          SERVICE: minio-operator-console
          SERVICE_DNS: '{{ .Values.external_hostnames.minio_operator_console }}'
          CERTIFICATE_NAMESPACE: minio-operator
          CERT: '{{ .Values.external_certificates.minio_operator.cert | default "" | b64enc }}'
          CACERT: '{{ .Values.external_certificates.cacert | default "" | b64enc }}'
          CACERT_SECRET_NAME: operator-ca-tls
      _components:
        - '{{ ternary "../tls-components/tls-secret" "../tls-components/tls-certificate" (hasKey .Values.external_certificates.minio_operator "cert") }}'
        - "../tls-components/sylva-ca"
        - "../kyverno-policies/minio-policies/minio-operator-policies"

  minio-operator:
    info:
      description: install MinIO operator
      details: MinIO operator is used to manage multiple S3 tenants
      maturity: beta
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ or (tuple . "minio-monitoring" | include "unit-enabled") (tuple . "minio-logging" | include "unit-enabled") }}'
    depends_on:
      namespace-defs: true
      minio-operator-init: true
      ingress-nginx: '{{ tuple . "ingress-nginx" | include "unit-enabled" }}'
    annotations:
      sylvactl/readyMessage: "minio operator console can be reached at https://{{ .Values.external_hostnames.minio_operator_console }} ({{ .Values.external_hostnames.minio_operator_console }} must resolve to {{ .Values.display_external_ip }})"
    repo: minio-operator
    helmrelease_spec:
      targetNamespace: minio-operator
      chart:
        spec:
          chart: helm/operator
      install:
        createNamespace: false
      values:
        operator:
          env:
          - name: OPERATOR_STS_AUTO_TLS_ENABLED
            value: "off"
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 500Mi
        console:
          enabled: true
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          ingress:
            enabled: true
            ingressClassName: nginx
            host: '{{ .Values.external_hostnames.minio_operator_console }}'
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - '{{ .Values.external_hostnames.minio_operator_console }}'
                secretName: minio-operator-console-tls
      _postRenderers:
        - kustomize:
            patches:
              - target:
                  kind: ClusterRole
                  name: minio-operator-role
                patch: |
                  - op: add
                    path: /rules/-
                    value:
                      apiGroups:
                        - job.min.io
                      resources:
                        - '*'
                      verbs:
                        - '*'
    kustomization_spec:
      healthChecks:
        - apiVersion: v1
          kind: Secret
          name: sts-tls
          namespace: minio-operator

  minio-logging-init:
    info:
      description: sets up secrets and certificates for minio-logging
      internal: true
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "minio-logging" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
      sylva-ca: true
      vault: true
      vault-config-operator: true
      eso-secret-stores: true
    repo: sylva-core
    kustomization_substitute_secrets:
      KEY: '{{ .Values.external_certificates.minio_logging.key | default "" | b64enc }}'
    kustomization_spec:
      path: ./kustomize-units/minio-tenant-init
      wait: true
      postBuild:
        substitute:
          TENANT_NS: minio-logging
          TENANT_NAME: logging
          CLUSTER_DOMAIN: '{{ .Values.cluster_domain }}'
          SERVICE: minio-logging
          SERVICE_DNS: '{{ .Values.external_hostnames.minio_logging }}'
          CERTIFICATE_NAMESPACE: minio-logging
          CERT: '{{ .Values.external_certificates.minio_logging.cert | default "" | b64enc }}'
          CACERT: '{{ .Values.external_certificates.cacert | default "" | b64enc }}'
      _components:
        - '{{ ternary "../tls-components/tls-secret" "../tls-components/tls-certificate" (hasKey .Values.external_certificates.minio_logging "cert") }}'
        - "../tls-components/sylva-ca"
        - "../kyverno-policies/minio-policies/minio-tenant-policies"

  minio-logging:
    info:
      description: creates a MinIO tenant for the logging stack, used as S3 storage by Loki
      maturity: beta
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "loki" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
      minio-operator: true
      minio-logging-init: true
      ingress-nginx: '{{ tuple . "ingress-nginx" | include "unit-enabled" }}'
      two-replicas-storageclass: '{{ tuple . "two-replicas-storageclass" | include "unit-enabled" }}'
      '{{ .Values._internal.default_storage_class_unit }}': '{{ not (tuple . "two-replicas-storageclass" | include "unit-enabled") }}'
    annotations:
      sylvactl/readyMessage: MinIO logging tenant console can be reached at https://{{ .Values.external_hostnames.minio_logging_console }} ({{ .Values.external_hostnames.minio_logging_console }} must resolve to {{ .Values.display_external_ip }})
    repo: minio-operator
    helmrelease_spec:
      targetNamespace: minio-logging
      chart:
        spec:
          chart: helm/tenant
      install:
        createNamespace: false
      values:
        secrets:
          existingSecret: minio-logging-root
        tenant:
          name: logging
          serviceMetadata:
            minioServiceLabels:
              v1.min.io/tenant: logging
          # Use certificate generated by cert-manager in minio-logging-init instead of relying on minio operator
          certificate:
            requestAutoCert: false
            externalCertSecret:
            - name: minio-logging-internal-tls
              type: kubernetes.io/tls
          # The Kubernetes secret name that contains MinIO environment variable configurations:
          configuration:
            name: minio-logging-root
          # Array of Kubernetes secrets from which the Operator generates MinIO users during tenant provisioning:
          users:
            - name: minio-logging-user
          pools:
            - servers: '{{ min .Values._internal.node_count 4 }}'
              name: pool-0
              volumesPerserver: 4
              size: 3Gi
              storageClassName: '{{ tuple . (tuple . "two-replicas-storageclass" | include "unit-enabled") "two-replicas-storageclass" .Values._internal.default_storage_class | include "interpret-ternary" }}'
              containerSecurityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                fsGroupChangePolicy: "OnRootMismatch"
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchExpressions:
                          - key: v1.min.io/pool
                            operator: In
                            values:
                              - pool-0
                          - key: v1.min.io/tenant
                            operator: In
                            values:
                              - logging
                      topologyKey: "kubernetes.io/hostname"
          metrics:
            enabled: true
          env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE
            value: public
          features:
            bucketDNS: false
            enableSFTP: false
          buckets:
            - name: "loki-chunks"
              region: "logging-cluster"
              objectLock: false
            - name: "loki-ruler"
              region: "monitoring-cluster"
              objectLock: false
            - name: "loki-admin"
              region: "monitoring-cluster"
              objectLock: false
          prometheusOperator: false    # Prometheus Operator's Service Monitor for MinIO Tenant Pods
          logging:
            anonymous: true
            json: true
            quiet: true
        ingress:
          api:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
            host: '{{ .Values.external_hostnames.minio_logging }}'
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - '{{ .Values.external_hostnames.minio_logging }}'
                secretName: minio-logging-tls
          console:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
            host: '{{ .Values.external_hostnames.minio_logging_console }}'
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - '{{ .Values.external_hostnames.minio_logging_console }}'
                secretName: minio-logging-tls
    kustomization_spec:
      # these healthChecks are added so that MinIO backend setup
      # for tenant.minio.min.io/logging created by this unit is ready
      healthChecks:
        - apiVersion: apps/v1
          kind: StatefulSet
          name: logging-pool-0  # concatenation from .tenant chart values .name & .pools[0].name
          namespace: minio-logging

  minio-monitoring-init:
    info:
      description: sets up secrets and certificates for minio-monitoring
      internal: true
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "minio-monitoring" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
      sylva-ca: true
      vault: true
      vault-config-operator: true
      eso-secret-stores: true
    repo: sylva-core
    kustomization_substitute_secrets:
      KEY: '{{ .Values.external_certificates.minio_monitoring.key | default "" | b64enc }}'
    kustomization_spec:
      path: ./kustomize-units/minio-tenant-init
      wait: true
      postBuild:
        substitute:
          TENANT_NS: minio-monitoring
          TENANT_NAME: monitoring
          CLUSTER_DOMAIN: '{{ .Values.cluster_domain }}'
          SERVICE: minio-monitoring
          SERVICE_DNS: '{{ .Values.external_hostnames.minio_monitoring }}'
          CERTIFICATE_NAMESPACE: minio-monitoring
          CERT: '{{ .Values.external_certificates.minio_monitoring.cert | default "" | b64enc }}'
          CACERT: '{{ .Values.external_certificates.cacert | default "" | b64enc }}'
      _components:
        - '{{ ternary "../tls-components/tls-secret" "../tls-components/tls-certificate" (hasKey .Values.external_certificates.minio_monitoring "cert") }}'
        - "../tls-components/sylva-ca"
        - "../kyverno-policies/minio-policies/minio-tenant-policies"

  minio-monitoring:
    info:
      description: creates a MinIO tenant for the monitoring stack, used as S3 storage by Thanos
      maturity: beta
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "thanos" | include "unit-enabled" }}'
    depends_on:
      namespace-defs: true
      minio-operator: true
      minio-monitoring-init: true
      ingress-nginx: '{{ tuple . "ingress-nginx" | include "unit-enabled" }}'
      two-replicas-storageclass: '{{ tuple . "two-replicas-storageclass" | include "unit-enabled" }}'
      '{{ .Values._internal.default_storage_class_unit }}': '{{ not (tuple . "two-replicas-storageclass" | include "unit-enabled") }}'
    annotations:
      sylvactl/readyMessage: MinIO monitoring tenant console can be reached at https://{{ .Values.external_hostnames.minio_monitoring_console }} ({{ .Values.external_hostnames.minio_monitoring_console }} must resolve to {{ .Values.display_external_ip }})
    repo: minio-operator
    helmrelease_spec:
      targetNamespace: minio-monitoring
      chart:
        spec:
          chart: helm/tenant
      install:
        createNamespace: false
      values:
        secrets:
          existingSecret: minio-monitoring-root
        tenant:
          name: monitoring
          serviceMetadata:
            minioServiceLabels:
              v1.min.io/tenant: monitoring
          # Use certificate generated by cert-manager in minio-monitoring-init instead of relying on minio operator
          certificate:
            requestAutoCert: false
            externalCertSecret:
            - name: minio-monitoring-internal-tls
              type: kubernetes.io/tls
          # The Kubernetes secret name that contains MinIO environment variable configurations:
          configuration:
            name: minio-monitoring-root
          # Array of Kubernetes secrets from which the Operator generates MinIO users during tenant provisioning:
          users:
            - name: minio-monitoring-user
          pools:
            - servers: '{{ min .Values._internal.node_count 4 }}'
              name: pool-0
              volumesPerserver: 4
              size: 10Gi
              storageClassName: '{{ tuple . (tuple . "two-replicas-storageclass" | include "unit-enabled") "two-replicas-storageclass" .Values._internal.default_storage_class | include "interpret-ternary" }}'
              containerSecurityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                fsGroupChangePolicy: "OnRootMismatch"
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              resources:
                limits:
                  cpu: 500m
                  memory: '{{  has .Values.env_type (list "dev" "ci") | ternary "512Mi" "2Gi" }}'
                requests:
                  cpu: 100m
                  memory: '{{  has .Values.env_type (list "dev" "ci") | ternary "128Mi" "1Gi" }}'
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchExpressions:
                          - key: v1.min.io/pool
                            operator: In
                            values:
                              - pool-0
                          - key: v1.min.io/tenant
                            operator: In
                            values:
                              - monitoring
                      topologyKey: "kubernetes.io/hostname"
          metrics:
            enabled: true
          env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE
            value: public
          features:
            bucketDNS: false
            enableSFTP: false
          buckets:
            - name: "thanos"
              region: "monitoring-cluster"
              objectLock: false
          prometheusOperator: false    # Prometheus Operator's Service Monitor for MinIO Tenant Pods
          logging:
            anonymous: true
            json: true
            quiet: true
        ingress:
          api:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
            host: '{{ .Values.external_hostnames.minio_monitoring }}'
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - '{{ .Values.external_hostnames.minio_monitoring }}'
                secretName: minio-monitoring-tls
          console:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
            host: '{{ .Values.external_hostnames.minio_monitoring_console }}'
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - '{{ .Values.external_hostnames.minio_monitoring_console }}'
                secretName: minio-monitoring-tls
    kustomization_spec:
      # these healthChecks are added so that MinIO backend setup
      # for tenant.minio.min.io/monitoring created by this unit is ready
      healthChecks:
        - apiVersion: apps/v1
          kind: StatefulSet
          name: monitoring-pool-0  # concatenation from .tenant chart values .name & .pools[0].name
          namespace: minio-monitoring

  thanos-init:
    info:
      description: sets up thanos certificate
      details: it generates a multiple CN certificate for all Thanos components
      internal: true
    enabled_conditions:
      - '{{ tuple . "thanos" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      sylva-ca: true
      eso-secret-stores: true
      minio-monitoring-init: true
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/thanos-init
      wait: true
      postBuild:
        substitute:
          SERVICE: thanos
          THANOS_DNS: '{{ .Values.external_hostnames.thanos }}'
          THANOS_RECEIVE_DNS: '{{ .Values.external_hostnames.thanos_receive }}'
          THANOS_STOREGATEWAY_DNS: '{{ .Values.external_hostnames.thanos_storegateway }}'
          THANOS_QUERY_DNS: '{{ .Values.external_hostnames.thanos_query }}'

  thanos-credentials-secret:
    info:
      description: create a secret containing tenant's thanos credentials
      internal: true
    unit_templates:
    - base-deps
    enabled_conditions:
      - '{{ tuple . "thanos" | include "unit-enabled" }}'
    depends_on:
      kyverno-policies-ready: true
    repo: sylva-core
    kustomization_substitute_secrets:
      PASSWORD: '{{ .Values._internal.thanos_password }}'
    kustomization_spec:
      targetNamespace: '{{ .Release.Namespace }}'
      path: ./kustomize-units/credentials-secret
      postBuild:
        substitute:
          LABEL_NAME: sylva.io/aggregated-secret
          LABEL_VALUE: thanos
          SECRET_NAME: thanos-credentials
          USERNAME: '{{ .Values._internal.thanos_user }}'
      healthChecks: # ensure that kyverno has produced the secret
      - apiVersion: v1
        kind: Secret
        namespace: sylva-system
        name: thanos-secrets

  thanos:
    info:
      description: installs Thanos
      maturity: beta
    enabled_conditions:
      - '{{ tuple . "monitoring" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      thanos-init: true
      thanos-credentials-secret: true
      minio-monitoring: true
      '{{ .Values._internal.default_storage_class_unit }}': true
      ingress-nginx: '{{ tuple . "ingress-nginx" | include "unit-enabled" }}'
    annotations:
      sylvactl/readyMessage: Thanos UI can be reached at https://{{ .Values.external_hostnames.thanos }} ({{ .Values.external_hostnames.thanos }} must resolve to {{ .Values.display_external_ip }})
    repo: bitnami-thanos
    helmrelease_spec:
      targetNamespace: thanos
      install:
        createNamespace: false
      chart:
        spec:
          chart: bitnami/thanos
      values:
        fullnameOverride: "thanos"
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            extraParameters:
              basicAuth:
                password:
                  name: thanos-basic-auth
                  key: password
                username:
                  name: thanos-basic-auth
                  key: username
        ruler:
          enabled: true
          resources:
            requests:
              cpu: 0.1
              memory: 128Mi
            limits:
              cpu: 0.5
              memory: 512Mi
          dnsDiscovery:
            enabled: false
          extraFlags:
          - --query.config-file=/etc/thanos/ruler-queries.yaml
          - --label=platform_tag="{{ .Values.monitoring.platform_tag }}"
          - --enable-auto-gomemlimit
          - --tsdb.retention=12h
          - --tsdb.wal-compression
          extraVolumes:
          - name: thanos-ruler-queries-config
            secret:
              secretName: thanos-ruler-queries
          extraVolumeMounts:
          - name: thanos-ruler-queries-config
            mountPath: /etc/thanos/ruler-queries.yaml
            subPath: ruler-queries.yaml
          alertmanagersConfig: |
            alertmanagers:
              - scheme: http
                api_version: v2
                timeout: 10s
                static_configs:
                {{- $count_am := .Values.units.monitoring.helmrelease_spec.values.alertmanager.alertmanagerSpec.replicas -}}
                {{- if kindIs "string" $count_am -}}
                  {{- $count_am = tuple . $count_am | include "interpret-as-string" -}}
                {{- end -}}
                {{- $count_am = int $count_am -}}
                {{- range $index_am := until $count_am }}
                - alertmanager-rancher-monitoring-alertmanager-{{ $index_am }}.alertmanager-operated.cattle-monitoring-system:9093
                {{- end -}}
          existingConfigmap: "sylva-thanos-rules-configmap"  # this ConfigMap is a byproduct of the sylva-thanos-rules unit
          sidecars:
          # reload thanos-ruler when changes to rule files or alertmanager
          # list are detected
          - name: configmap-reload
            image: bitnami/configmap-reload:0.14.0
            args:
            - --volume-dir=/conf/rules/
            - --volume-dir=/conf/alertmanagers/
            - --webhook-url=http://{{ .Values._internal.thanos_user }}:{{ .Values._internal.thanos_password }}@localhost:10902/-/reload
            volumeMounts:
            # volume from "existingConfigmap"
            - name: ruler-config
              mountPath: /conf/rules
            - name: alertmanagers-config
              mountPath: /conf/alertmanagers
            volumes:
            - name: alertmanagers-config
              secret:
                secretName: thanos-ruler-alertmanagers-config
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              privileged: false
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                memory: 64Mi
                cpu: 100m
              limits:
                memory: 128Mi
                cpu: 250m
          persistence:
            enabled: true
            storageClass: '{{ tuple . (tuple . "two-replicas-storageclass" | include "unit-enabled") "two-replicas-storageclass" .Values._internal.default_storage_class | include "interpret-ternary" }}'
            accessModes: ["ReadWriteOnce"]
            size: '{{  has .Values.env_type (list "dev" "ci") | ternary "2Gi" "4Gi" }}'
          evalInterval: 1m
          replicaCount: '{{ .Values._internal.ha_cluster.is_ha | ternary 2 1 | include "preserve-type" }}'
          pdb:
            create: true
            minAvailable: '{{ .Values._internal.ha_cluster.is_ha | ternary 1 0 | include "preserve-type" }}'
          service:
            clusterIP: None
        query:
          logLevel: info
          extraFlags:
            - --query.auto-downsampling
            - --query.replica-label=prometheus_replica
            - --query.replica-label=prometheus
            - --enable-auto-gomemlimit
            - --query.max-concurrent=20
            - --query.max-concurrent-select=4
          resources:
            requests:
              cpu: 0.1
              memory: 256Mi
            limits:
              cpu: 0.5
              memory: 512Mi
          ingress:
            enabled: true
            ingressClassName: "nginx"
            hostname: '{{ .Values.external_hostnames.thanos_query }}'
            extraTls:
              - hosts:
                  - '{{ .Values.external_hostnames.thanos_query }}'
                secretName: thanos-tls
        queryFrontend:
          logLevel: info
          extraFlags:
            - --query-frontend.forward-header=Authorization
            - --cache-compression-type=snappy
            - --query-range.split-interval=6h
            - --enable-auto-gomemlimit
          resources:
            requests:
              cpu: 0.1
              memory: 512Mi
            limits:
              cpu: 0.5
              memory: 1.5Gi
          config: |-
            type: IN-MEMORY
            config:
              max_size: 1GB
              max_size_items: 0
              validity: 0s
          ingress:
            enabled: true
            ingressClassName: "nginx"
            hostname: '{{ .Values.external_hostnames.thanos }}'
            extraTls:
              - hosts:
                  - '{{ .Values.external_hostnames.thanos }}'
                secretName: thanos-tls
        storegateway:
          enabled: true
          logLevel: info
          extraFlags:
            - --index-cache-size=1GB
            - --enable-auto-gomemlimit
          persistence:
            enabled: false
          ingress:
            enabled: true
            hostname: '{{ .Values.external_hostnames.thanos_storegateway }}'
            ingressClassName: "nginx"
            extraTls:
              - hosts:
                  - '{{ .Values.external_hostnames.thanos_storegateway }}'
                secretName: thanos-tls
          resources:
            requests:
              cpu: 0.1
              memory: 1.5Gi
            limits:
              cpu: 0.5
              memory: 2Gi
        compactor:
          persistence:
            enabled: false
          enabled: true
          logLevel: info
          extraFlags:
            - --deduplication.replica-label="prometheus_replica"
          consistencyDelay: 30m
          resources:
            requests:
              cpu: 0.5
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1024Mi
          retentionResolutionRaw: 15d
          retentionResolution5m: 15d
          retentionResolution1h: 15d
        receive:
          enabled: true
          logLevel: info
          resources:
            requests:
              cpu: 0.5
              memory: 4Gi
            limits:
              cpu: 1
              memory: 6Gi
          persistence:
            enabled: false
          tsdbRetention: 12h
          extraFlags:
          - --enable-auto-gomemlimit
          - --tsdb.max-retention-bytes=12GB
          - --tsdb.wal-compression
          ingress:
            enabled: true
            ingressClassName: "nginx"
            annotations:
              nginx.ingress.kubernetes.io/client-body-buffer-size: 1m
            hostname: '{{ .Values.external_hostnames.thanos_receive }}'
            extraTls:
              - hosts:
                  - '{{ .Values.external_hostnames.thanos_receive }}'
                secretName: thanos-tls
      valuesFrom:
        - kind: Secret
          name: thanos-minio-user
          valuesKey: CONSOLE_ACCESS_KEY
          targetPath: objstoreConfig.config.access_key
          optional: false
        - kind: Secret
          name: thanos-minio-user
          valuesKey: CONSOLE_SECRET_KEY
          targetPath: objstoreConfig.config.secret_key
          optional: false
        # Use tenant list built by kyverno policy thanos-aggregated-secret to fill auth.basicAuthUsers object
        - kind: Secret
          name: thanos-secrets
          valuesKey: secrets
      _postRenderers:
        - kustomize:
            patches:
            - '{{ .Values._internal.pdb_allow_unhealthy_pod_eviction | include "preserve-type" }}'
    helm_secret_values:
      extraDeploy:
      - apiVersion: v1
        kind: Secret
        metadata:
          name: thanos-basic-auth
        type: Opaque
        data:
          username: '{{ .Values._internal.thanos_user | b64enc }}'
          password: '{{ .Values._internal.thanos_password | b64enc }}'
      - apiVersion: v1
        kind: Secret
        metadata:
          name: thanos-ruler-queries
          namespace: thanos
        type: Opaque
        stringData:
          ruler-queries.yaml: |
            - http_config:
                basic_auth:
                  username: "{{ .Values._internal.thanos_user }}"
                  password: "{{ .Values._internal.thanos_password }}"
                tls_config:
                  insecure_skip_verify: true
              static_configs: ["thanos-query-frontend:9090"]
              scheme: http
      objstoreConfig:
        type: "S3"
        config:
          bucket: "thanos"
          endpoint: minio.minio-monitoring.svc.cluster.local
          insecure: false
          http_config:
            tls_config:
              insecure_skip_verify: true
            insecure_skip_verify: true
          # Use reduced reduncancy storage class (EC:1) as we are using two replicas in longhorn
          put_user_metadata:
            X-Amz-Storage-Class: REDUCED_REDUNDANCY
  logging-crd:
    info:
      description: install rancher-logging CRD
      maturity: beta
      hidden: true
    enabled_conditions:
      - '{{ tuple . "logging" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
    helm_repo_url: https://charts.rancher.io/
    helmrelease_spec:
      releaseName: logging-crd
      targetNamespace: cattle-logging-system
      chart:
        spec:
          chart: rancher-logging-crd
          version: 103.1.2+up4.4.0
      install:
        createNamespace: false

  logging:
    enabled: false
    info:
      description: installs Rancher Fluentbit/Fluentd logging stack, for log collecting and shipping
      maturity: beta
    unit_templates:
    - base-deps
    depends_on:
      logging-crd: true
    helm_repo_url: https://charts.rancher.io/
    helmrelease_spec:
      releaseName: logging
      targetNamespace: cattle-logging-system
      chart:
        spec:
          chart: rancher-logging
          version: 103.1.2+up4.4.0
      install:
        createNamespace: false
      values:
        systemdLogPath: "/var/log/journal/"
        additionalLoggingSources:
          rke2:
            enabled: '{{ .Values.cluster.capi_providers.bootstrap_provider | eq "cabpr" | include "as-bool" }}'
          kubeAudit:
            # autdit log is currently only supported for rke2 see issue https://gitlab.com/sylva-projects/sylva-core/-/issues/1226
            auditFilename: '{{ .Values.cluster.capi_providers.bootstrap_provider | eq "cabpr" | ternary "/var/lib/rancher/rke2/server/logs/audit.log" "" }}'
            enabled: '{{ and (gt (int .Values.audit_log.level) 0) (.Values.cluster.capi_providers.bootstrap_provider | eq "cabpr" ) | include "as-bool" }}'
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
      _postRenderers:
        - kustomize:
            patches:
              - target:
                  kind: Logging
                  name: logging-root
                patch: |
                  - op: add
                    path: /spec/fluentbit/customParsers
                    value: |
                            [PARSER]
                                Name         crilog
                                Format       regex
                                Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]+) (?<log>.*)$
                                Time_Key     time
                                Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
                                Time_Keep    "On"
                  - op: add
                    path: /spec/fluentbit/inputTail
                    value:
                      Parser: crilog

  logging-config:
    info:
      description: Configures rancher-logging to ship logs to Loki
      internal: true
    enabled_conditions:
    - '{{ tuple . "logging" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      logging: true
      #loki: this dependency is handled in a different way, in management.values.yaml and workload-cluster.values.yaml
    repo: sylva-core
    kustomization_substitute_secrets:
      LOKI_USERNAME: '{{ .Values._internal.loki_user }}'
      LOKI_PASSWORD: '{{ .Values._internal.loki_password }}'
    kustomization_spec:
      path: ./kustomize-units/logging
      postBuild:
        substitute:
          # we must use external name in order to work also for workload clusters
          LOKI_URL: '{{ .Values.logging.loki_url }}'
          CLUSTER_NAME: '{{ .Values.cluster.name }}'
      wait: true

  sylva-logging-flows:
    info:
      description: configures logging flows and output to export the platform logs to an external server
      maturity: beta
      internal: false
    unit_templates:
    - base-deps
    enabled: false
    depends_on:
      logging: true
    repo: sylva-logging-flows
    helm_chart_artifact_name: sylva-logging-flows
    # flow, clusterflows, outputs and clusteroutputs values are documented in the sylva-logging-flow helmchart https://gitlab.com/sylva-projects/sylva-elements/helm-charts/sylva-logging-flows
    helmrelease_spec:
      chart:
        spec:
          chart: .
      targetNamespace: cattle-logging-system
      values:
        flows: '{{ .Values.logging.flows | include "preserve-type" }}'
        clusterflows: '{{ .Values.logging.clusterflows | include "preserve-type" }}'
    helm_secret_values:
      outputs: '{{ .Values.logging.outputs | include "preserve-type" }}'
      clusteroutputs: '{{ .Values.logging.clusteroutputs | include "preserve-type" }}'

  loki-init:
    info:
      description: sets up Loki certificate
      details: it generate certificate
      internal: true
    enabled_conditions:
      - '{{ tuple . "loki" | include "unit-enabled" }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      sylva-ca: true
      eso-secret-stores: true
      minio-logging-init: true
    repo: sylva-core
    kustomization_substitute_secrets:
      KEY: '{{ .Values.external_certificates.loki.key | default "" | b64enc }}'
    kustomization_spec:
      path: ./kustomize-units/loki-init
      wait: true
      postBuild:
        substitute:
          SERVICE: loki
          SERVICE_DNS: '{{ .Values.external_hostnames.loki }}'
          CERTIFICATE_NAMESPACE: loki
          CERT: '{{ .Values.external_certificates.loki.cert | default "" | b64enc }}'
          CACERT: '{{ .Values.external_certificates.cacert | default "" | b64enc }}'
      _components:
        - '{{ ternary "../tls-components/tls-secret" "../tls-components/tls-certificate" (hasKey .Values.external_certificates.loki "cert") }}'
        - "../tls-components/sylva-ca"

  loki-credentials-secret:
    info:
      description: create a secret containing tenant's loki credentials
      internal: true
    unit_templates:
    - base-deps
    depends_on:
      kyverno-policies-ready: true
    enabled_conditions:
      - '{{ tuple . "logging" | include "unit-enabled" }}'
    repo: sylva-core
    kustomization_substitute_secrets:
      PASSWORD: '{{ .Values._internal.loki_password }}'
    kustomization_spec:
      targetNamespace: '{{ .Release.Namespace }}'
      path: ./kustomize-units/credentials-secret
      postBuild:
        substitute:
          LABEL_NAME: sylva.io/aggregated-secret
          LABEL_VALUE: loki
          SECRET_NAME: loki-credentials
          USERNAME: '{{ .Values._internal.loki_user }}'
      healthChecks: # ensure that kyverno has produced the secret
      - apiVersion: v1
        kind: Secret
        namespace: sylva-system
        name: loki-secrets

  loki:
    info:
      description: installs Loki log storage
      details: installs Loki log storage in simple scalable mode
      maturity: beta
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      loki-init: true
      loki-credentials-secret: true
      minio-logging: true
      logging-crd: '{{ tuple . "monitoring" | include "unit-enabled" }}'
    enabled_conditions:
      - '{{ tuple . "logging" | include "unit-enabled" }}'
    annotations:
      sylvactl/readyMessage: "Loki can be reached at https://{{ .Values.external_hostnames.loki }} ({{ .Values.external_hostnames.loki }} must resolve to {{ .Values.display_external_ip }})"
    repo: loki
    helmrelease_spec:
      targetNamespace: loki
      chart:
        spec:
          chart: production/helm/loki
      install:
        createNamespace: false
      values:
        global:
          dnsService: '{{ .Values.cluster.capi_providers.bootstrap_provider | eq "cabpr" | ternary "rke2-coredns-rke2-coredns" "kube-dns" }}'
        loki:
          analytics:
            reporting_enabled: false
          containerSecurityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          server:
            grpc_server_max_recv_msg_size: 52428800
            grpc_server_max_send_msg_size: 52428800
          compactor:
            compaction_interval: 1h
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: s3
          limits_config:
            retention_period: 72h
            reject_old_samples: false
            unordered_writes: true
            allow_structured_metadata: false
          ingester:
            wal:
              enabled: true
              dir: /data/wal
          schemaConfig:
            configs:
              - from: "2022-01-11"
                index:
                  period: 24h
                  prefix: loki_index_
                object_store: s3
                schema: v13
                store: tsdb
          commonConfig:
            replication_factor: 1
          storage:
            bucketNames:
              chunks: "loki-chunks"
              ruler: "loki-ruler"
              admin: "loki-admin"
            s3:
              endpoint: "minio.minio-logging.svc.cluster.local:443"
              s3ForcePathStyle: true
              http_config:
                insecure_skip_verify: true
              storage_class: REDUCED_REDUNDANCY
        test:
          enabled: false
        lokiCanary:
          enabled: false
        chunksCache:
          allocatedMemory: 4096
          resources:
            limits:
              memory: 5Gi
            requests:
              memory: 500Mi
        resultsCache:
          allocatedMemory: 512
          resources:
            limits:
              memory: 600Mi
            requests:
              memory: 60Mi
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          serviceMonitor:
            enabled: '{{ .Values._internal.monitoring.enabled | include "preserve-type" }}'
            relabelings:
            # drop loki-gateway endpoints from scraping as basicAuth config for serviceMonitor
            # is not supported. See: https://github.com/grafana/loki/issues/14141
            - sourceLabels:
              - job
              regex: "loki/loki-gateway"
              action: drop
          dashboards:
            enabled: '{{ .Values._internal.monitoring.enabled | include "preserve-type" }}'
          rules:
            enabled: '{{ .Values._internal.monitoring.enabled | include "preserve-type" }}'
            additionalGroups:
              - name: additional-loki-rules
                rules:
                  - record: job:loki_request_duration_seconds_bucket:sum_rate
                    expr: sum(rate(loki_request_duration_seconds_bucket[1m])) by (le, job)
                  - record: job_route:loki_request_duration_seconds_bucket:sum_rate
                    expr: sum(rate(loki_request_duration_seconds_bucket[1m])) by (le, job, route)
                  - record: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate
                    expr: sum(rate(container_cpu_usage_seconds_total[1m])) by (node, namespace, pod, container)
        write:
          replicas: '{{ int .Values._internal.node_count | gt 2 | ternary 1 2 }}'
          persistence:
            size: 3Gi
          autoscaling:
            enable: true
            minReplicas: 2
            maxReplicas: 6
            targetCPUUtilizationPercentage: 40
          extraVolumes:
            - name: data
              emptyDir: {}
            - name: loki
              emptyDir: {}
          extraVolumeMounts:
            - name: data
              mountPath: /data
            - name: loki
              mountPath: /loki
        read:
          replicas: '{{ int .Values._internal.node_count | gt 2 | ternary 1 2 }}'
          persistence:
            size: 3Gi
        backend:
          replicas: '{{ int .Values._internal.node_count | gt 2 | ternary 1 2 }}'
          persistence:
            size: 3Gi
        memberlist:
          service:
            publishNotReadyAddresses: true
        gateway:
          replicas: '{{ int .Values._internal.node_count | gt 2 | ternary 1 2 }}'
          ingress:
            enabled: true
            ingressClassName: "nginx"
            annotations:
              nginx.ingress.kubernetes.io/proxy-body-size: "4096m"
              nginx.ingress.kubernetes.io/client-body-buffer-size: 10m
            hosts:
              - host: '{{ .Values.external_hostnames.loki }}'
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: loki-tls
                hosts:
                  - '{{ .Values.external_hostnames.loki }}'
          basicAuth:
            enabled: true
          containerSecurityContext:
            seccompProfile:
              type: RuntimeDefault
      valuesFrom:
        - kind: Secret
          name: loki-minio-user
          valuesKey: CONSOLE_ACCESS_KEY
          targetPath: loki.storage.s3.accessKeyId
          optional: false
        - kind: Secret
          name: loki-minio-user
          valuesKey: CONSOLE_SECRET_KEY
          targetPath: loki.storage.s3.secretAccessKey
          optional: false
        # Use tenant list built by kyverno policy loki-aggregated-secret, it will fill loki.tenant object
        - kind: Secret
          name: loki-secrets
          valuesKey: secrets
      _postRenderers:
        - kustomize:
            patches:
            - '{{ .Values._internal.pdb_allow_unhealthy_pod_eviction | include "preserve-type" }}'

  single-replica-storageclass:
    info:
      description: DEPRECATED longhorn storage class with a single replica
      details: |
        This unit is preserved for migration purposes, it will be removed after sylva 1.2 release
        Single replicas PVC were causing data replication churn during rolling updates of nodes
        See https://gitlab.com/sylva-projects/sylva-core/-/issues/1648
      internal: true
    repo: sylva-core
    unit_templates:
    - base-deps
    depends_on:
      longhorn: true
    enabled_conditions:
      - '{{ tuple . "minio-monitoring" | include "unit-enabled" }}'
      - '{{ tuple . "longhorn" | include "unit-enabled" }}'
    kustomization_spec:
      path: ./kustomize-units/longhorn-storageclass
      wait: true
      postBuild:
        substitute:
          CLASS_NAME: single-replica-storageclass
      _patches:
        - target:
            kind: StorageClass
          patch: |
            kind: _unused_
            metadata:
              name: _unused_
            parameters:
              numberOfReplicas: "1"

  two-replicas-storageclass:
    info:
      description: Create a longhorn storage class with a two replicas
      internal: true
    repo: sylva-core
    unit_templates:
    - base-deps
    depends_on:
      longhorn: true
    enabled_conditions:
      - '{{ or (tuple . "minio-monitoring" | include "unit-enabled") (tuple . "minio-logging" | include "unit-enabled") }}'
      - '{{ tuple . "longhorn" | include "unit-enabled" }}'
    kustomization_spec:
      path: ./kustomize-units/longhorn-storageclass
      wait: true
      postBuild:
        substitute:
          CLASS_NAME: two-replicas-storageclass
      _patches:
        - target:
            kind: StorageClass
          patch: |
            kind: _unused_
            metadata:
              name: _unused_
            parameters:
              numberOfReplicas: "2"

  sylva-prometheus-rules:
    info:
      description: installs prometheus rules using external helm chart & rules git repo
      maturity: beta
    unit_templates:
    - base-deps
    depends_on:
      monitoring: true
    enabled_conditions:
      - '{{ tuple . "monitoring" | include "unit-enabled" }}'
    repo: sylva-prometheus-rules
    helm_chart_artifact_name: sylva-prometheus-rules
    helmrelease_spec:
      releaseName: sylva-prometheus-rules
      targetNamespace: sylva-prometheus-rules
      chart:
        spec:
          chart: .
      install:
        createNamespace: true
      values:
        createRules:
          allclusters: true
          '{{ .Values.cluster.name }}': true
        optional_rules: '{{ .Values._internal.monitoring.conditionals | include "preserve-type" }}'

  sylva-thanos-rules:
    info:
      description: installs Thanos rules using external helm chart & rules git repo
      maturity: beta
    unit_templates:
    - base-deps
    depends_on:
      thanos-init: true
    enabled_conditions:
      - '{{ tuple . "thanos" | include "unit-enabled" }}'
      - '{{ .Values.units.thanos.helmrelease_spec.values.ruler.enabled }}'
    repo: sylva-thanos-rules
    helm_chart_artifact_name: sylva-thanos-rules
    helmrelease_spec:
      releaseName: sylva-thanos-rules
      targetNamespace: thanos
      chart:
        spec:
          chart: .

  get-openstack-images:
    info:
      description: Automatically push openstack images to Glance
      details: Pushes OS images to Glance, if needed, and retrieves their UUIDs for use in cluster unit
      internal: true
    unit_templates:
    - base-deps
    depends_on:
      os-images-info: true
      capo-cloud-config: true
    enabled_conditions:
      - '{{ eq .Values.cluster.capi_providers.infra_provider "capo" }}'
    repo: sylva-core
    kustomization_spec:
      path: ./kustomize-units/get-openstack-images
      wait: true
      force: true
      _components:
      - '{{ tuple "./certs" (and (not .Values.oci_registry_insecure) (.Values.oci_registry_extra_ca_certs)) | include "set-only-if" }}'
      targetNamespace: '{{ .Release.Namespace }}'
      postBuild:
        substituteFrom:
          - kind: ConfigMap
            name: os-images-info-max-size
        substitute:
          JOB_INSECURE_CLIENT: '{{ .Values.oci_registry_insecure | quote }}'
          JOB_CHECKSUM: |-
            {{
            tuple . (list
              .Values._internal.sylva_core_version
              (mergeOverwrite (deepCopy .Values.os_images) .Values.sylva_diskimagebuilder_images)
              .Values.sylva_diskimagebuilder_version
              .Values.sylva_base_oci_registry
              .Values.proxies
            ) | include "interpret-and-hash"
            }}
          httpProxy: '{{ .Values.proxies.https_proxy }}'
          httpsProxy: '{{ .Values.proxies.https_proxy }}'
          noProxy: '{{ include "sylva-units.no_proxy" (tuple .) }}'
          # compute total timeout based on per-image timeout and number of images
          ACTIVE_DEADLINE_SECONDS: '{{ mul .Values.get_openstack_images_per_image_timeout_minutes 60 (include "generate-os-images" . | fromYaml | dig "os_images" dict | len) }}'
          EXTRA_CA_CERTS: '{{ tuple (.Values.oci_registry_extra_ca_certs | default "" | b64enc) (not .Values.oci_registry_insecure) | include "set-only-if" }}'

  descheduler:
    info:
      description: install descheduler
    enabled: false
    unit_templates:
    - base-deps
    helm_repo_url: https://kubernetes-sigs.github.io/descheduler/
    helmrelease_spec:
      releaseName: descheduler
      targetNamespace: kube-system
      chart:
        spec:
          chart: descheduler
          version: 0.31.0
      values:
        kind: CronJob
        schedule: "*/10 * * * *"
        deschedulerPolicy:
          profiles:
            - name: sylva
              pluginConfig:
                - name: RemoveDuplicates
                - name: LowNodeUtilization
                  args:
                    useDeviationThresholds: true
                    thresholds:
                      cpu: 20
                      memory: 20
                      pods: 20
                    targetThresholds:
                      cpu: 60
                      memory: 60
                      pods: 50
              plugins:
                balance:
                  enabled:
                    - RemoveDuplicates
                    - LowNodeUtilization

  workload-team-defs:
    info:
      description: installs the workload-team-defs chart
      details: installs the workload-team-defs chart to install the workload cluster through CRD
      maturity: experimental
    repo: workload-team-defs
    unit_templates:
    - base-deps
    depends_on:
      sylva-units-operator: true
    enabled_conditions:
      - '{{ tuple . "workload-cluster-operator" | include "unit-enabled" }}'
    helm_chart_artifact_name: workload-team-defs
    helmrelease_spec:
      chart:
        spec:
          chart: .
      values:
        workload_cluster_teams: '{{ .Values.workload_clusters.teams | include "preserve-type" }}'
        managed_clusters_settings: '{{ index (tuple . .Values.shared_workload_clusters_values | include "interpret-inner-gotpl" | fromJson) "result" | include "preserve-type" }}'
        workload_cluster_sylva_source: '{{ .Values.workload_clusters.sylva_source | include "preserve-type" }}'

##### stuff related to the 'cluster' unit #####
#
# all these values under 'cluster' are passed as values to sylva-capi-cluster chart

cluster:
  name: management-cluster

  # can be set to true to do an RKE2 deployment disconnected from the Internet:
  air_gapped: false

  # cis profile to be used. Curently supported only for rke2 clusters. "cis-1.6" for k8s prior to 1.25, "cis-1.23" for 1.25+
  cis_profile: cis

  # for now, the choice below needs to be made
  # consistently with the choice of a matching kustomization path
  # for the 'cluster' unit
  # e.g. you can use ./management-cluster-def/rke2-capd
  capi_providers:
    infra_provider: capd      # capd, capo, capm3 or capv
    bootstrap_provider: cabpk # cabpr (RKE2) or cabpk (kubeadm)

  # kubernetes version to be used
  k8s_version: '{{ .Values._internal.k8s_version_map | dig .Values.k8s_version_short "" | required (printf "no k8s version defined for %s" .Values.k8s_version_short) }}'

  # kube_vip version to be used for kubeadm deployments
  images:
    kube_vip:
      repository: ghcr.io/kube-vip/kube-vip
      tag: "v0.8.7"

  # Nodes number for control-plane
  control_plane_replicas: 3

  kubelet_extra_args:
    max-pods: '{{ .Values.cluster.capi_providers.infra_provider | eq "capm3" | ternary "500" "210" }}'

  capo:
    # flavor_name: m1.large # Openstack flavor name
    # image_key: # key of an image in os_images or sylva_diskimagebuilder_images
    # image_name: # (deprecated, please use image_key instead) - OpenStack image name (one of image_key and image_name must be set, but not both)
    # ssh_key_name: # OpenStack VM SSH key
    # network_id: # OpenStack network used for nodes and VIP port
    # rootVolume: {} # Let this parameter empty if you don't intent to use root volume
    #   # otherwise, provide following values
    #   diskSize: 20 # Size of the VMs root disk
    #   volumeType: '__DEFAULT__' # Type of volume to be created
    # #control_plane_az: # list of OpenStack availability zones to deploy control planes nodes to, otherwise all would be candidates
    # clouds_yaml: # (this is a dict, not a YAML string)
    #   clouds:
    #     capo_cloud:
    #       auth:
    #         auth_url: # replace me
    #         user_domain_name: # replace me
    #         project_domain_name: # replace me
    #         project_name: # replace me
    #         username: # replace me
    #         password: # replace me
    #       region_name: # replace me
    #       verify: # e.g. false
    # cacert: # cert used to validate CA of OpenStack APIs

    # tag set for OpenStack resources in management cluster:
    resources_tag: >-
      {{- if .Values.cluster.capi_providers.infra_provider | eq "capo" -}}
        sylva-{{ .Values.cluster.capo.clouds_yaml.clouds.capo_cloud.auth.username }}
      {{- end -}}

  control_plane:
    capo:
      security_group_names:
      - capo-{{ .Values.cluster.name }}-security-group-ctrl-plane-{{ .Values.cluster.capo.resources_tag }}
      - capo-{{ .Values.cluster.name }}-security-group-common-{{ .Values.cluster.capo.resources_tag }}

  machine_deployment_default:
    machine_deployment_spec:
      strategy:
        rollingUpdate:
          maxUnavailable: '{{ .Values.cluster.capi_providers.infra_provider | eq "capm3" | ternary 1 0 | include "preserve-type" }}'
          # use maxSurge 0 for baremetal deployments
          maxSurge: '{{ .Values.cluster.capi_providers.infra_provider | eq "capm3" | ternary 0 1 | include "preserve-type" }}'
    capo:
      security_group_names:
      - capo-{{ .Values.cluster.name }}-security-group-workers-{{ .Values.cluster.capo.resources_tag }}
      - capo-{{ .Values.cluster.name }}-security-group-common-{{ .Values.cluster.capo.resources_tag }}

  cluster_virtual_ip: '{{ .Values.cluster_virtual_ip }}'

  cluster_public_ip: '{{ tuple (.Values.openstack.floating_ip) (not (eq .Values.openstack.floating_ip "")) | include "set-only-if" }}'
  cluster_services_cidrs:
    - 100.73.0.0/16
  cluster_pods_cidrs:
    - 100.72.0.0/16
  cni:
    calico:
      helm_values: '{{ .Values.calico_helm_values | include "preserve-type" }}'

  metallb_helm_values: '{{ .Values.metallb_helm_values | include "preserve-type" }}'

  ntp: '{{ .Values.ntp | include "preserve-type" }}'
  proxies:
    http_proxy: '{{ .Values.proxies.http_proxy }}'
    https_proxy: '{{ .Values.proxies.https_proxy }}'
    no_proxy: '{{ include "sylva-units.no_proxy" (tuple .) }}'

  registry_mirrors: '{{ .Values.registry_mirrors | include "preserve-type" }}'

  helm_oci_url: # for an OCI-based deployment this is overridden in use-oci-artifacts.values.yaml
    metallb: ""
    calico-crd: ""
    calico: ""
  helm_versions:
    metallb: '{{ .Values.units.metallb.helmrelease_spec.chart.spec.version }}'
    calico-crd: '{{ tuple . "calico-crd" (index .Values.units "calico-crd") | include "get-helm-version" }}'
    calico: '{{ tuple . "calico" .Values.units.calico | include "get-helm-version" }}'
  helm_extra_ca_certs: # for an OCI-based deployment this is overridden in use-oci-artifacts.values.yaml
    metallb: ""
    calico: ""

  capv:
    # image_name: # vSphere image name
    # username: ""
    # password: ""
    # dataCenter: ""
    # server: ""
    # dataStore: ""
    # tlsThumbprint: ""
    # folder: ""
    # resourcePool: ""
    # storagePolicyName: ""
    # networks:
    #   default:
    #     networkName: ""
    # ssh_key: ''
    numCPUs: 4

  capm3:
    machine_image_checksum_type: sha256
    image_provisioning_host: '{{ .Values.display_external_ip }}'
    network_interfaces:
      mtu: >-
        {{-
        tuple
          (tuple .
          (.Values.security.calico_wireguard_enabled)
          (1440 | include "preserve-type")
          (1450 | include "preserve-type")
          | include "interpret-ternary")
        (.Values.cluster.capi_providers.infra_provider | eq "capm3")
        | include "set-only-if"
        -}}

  enable_longhorn: '{{ or (tuple . "longhorn" | include "unit-enabled") (tuple . .Values.units.longhorn.enabled | include "interpret-for-test") | include "as-bool" }}'

  timeouts:
    cluster_delete_hook_job_timeout: 300

  default_node_class: generic
  node_classes: {}
    # generic:
    #   kernel_cmdline:
    #     hugepages:
    #       enabled: false
    #       2M_percentage_total: ""
    #       1G_percentage_total: ""
    #       default_size: 2M
    #     extra_options: ""
    #   kubelet_extra_args: {}
    #   kubelet_config_file_options: {}
    #   nodeTaints: {}
    #   nodeLabels: {}
    #   nodeAnnotations: {}
    #   additional_commands:
    #     pre_bootstrap_commands: []
    #     post_bootstrap_commands: []
  metallb: {}
    #l2_lbs: # add your metallb-l2 config if required
      #address_pools:
      #  - name: my-custom-pool
      #    addresses:
      #      - 10.122.22.151/32
      #      - 10.10.10.10-10.10.10.120
      #l2_options:
      #  advertisements:
      #    - node_selectors:
      #        - kubernetes.io/hostname: hostB #  to limit the set of nodes for a given advertisement, the node selector must be set
      #      interface: eth1  # interfaces selector can also be used together with node_selectors
      #      advertised_pools:
      #        - my-custom-pool # additional IP pools to be advertised to this peer

    #bgp_lbs: # add your metallb-l3 config if required
      #l3_options:
      #  bgp_peers:
      #    - name: peerName
      #      local_asn: 64511  # example only, must be updated
      #      peer_asn: 64510  # example only, must be updated
      #      peer_address: 10.122.22.129
      #      advertised_pools:
      #        - lbpool  # default IP pool used for kube-api and ingress exposure
      #        - my-custom-pool  # additional IP pools to be advertised to this peer
      #address_pools:
      #  - name: my-custom-pool
      #    addresses:
      #      - 10.122.22.151/32
      #      - 10.10.10.10-10.10.10.120

cluster_machines_ready:
  wait_timeout: 600s

capd_docker_host: unix:///var/run/docker.sock

openstack:
  #external_network_id # Can be provided if a FIP is needed in order to reach the management cluster VIP
  floating_ip: ""  # will typically be set by capo-cluster-resources
  storageClass:
    name: cinder-csi  # name of the storageClass to be created
    #type: xxx  # please provide the cinder volume type, e.g. 'ceph_sas' (must exist in OpenStack)
  control_plane_affinity_policy: soft-anti-affinity
  worker_affinity_policy: soft-anti-affinity

oci_registry_insecure: false

metal3: {}
  # external_bootstrap_ip:
  # bootstrap_ip:

vsphere:
  vsphere-cpi:
    vsphere_conf:
      # Global properties in this section will be used for all specified vCenters unless overriden in VirtualCenter section.
      global:
        port: 443
        # set insecure-flag to true if the vCenter uses a self-signed cert
        insecureFlag: true
        # settings for using k8s secret
        secretName: vsphere-cloud-secret
        secretNamespace: kube-system

      # vcenter section
      vcenter:
        '{{ .Values.cluster.capv.server }}':
          server: '{{ .Values.cluster.capv.server }}'
          datacenters:
            - '{{ .Values.cluster.capv.dataCenter }}'

cluster_virtual_ip: 55.55.55.55

# Admin password that will be configured by default on various units  # FIXME, only used for SSO today see https://gitlab.com/sylva-projects/sylva-core/-/issues/503
# [WARNING] This value cannot be overwritten on production environment (env_type: prod)
admin_password: '{{ .Values._internal.default_password }}'

flux:
  kustomize:
    concurrent: 4
    log_level: info
    features_gates: {}
  helm:
    concurrent: 4
    features_gates:
      OOMWatch: true
      DetectDrift: true
      CorrectDrift: true
    log_level: info
  source:
    concurrent: 2
    log_level: info
    features_gates: {}

flux_webui:
  admin_user: admin

display_external_ip: '{{ .Values.openstack.floating_ip | eq "" | ternary .Values.cluster_virtual_ip .Values.openstack.floating_ip }}'

cluster_domain: sylva

external_hostnames:
  rancher: 'rancher.{{ .Values.cluster_domain }}'
  vault: 'vault.{{ .Values.cluster_domain }}'
  keycloak: 'keycloak.{{ .Values.cluster_domain }}'
  flux: 'flux.{{ .Values.cluster_domain }}'
  neuvector: 'neuvector.{{ .Values.cluster_domain }}'
  harbor: 'harbor.{{ .Values.cluster_domain }}'
  os_image_server: ''
  gitea: 'gitea.{{ .Values.cluster_domain }}'
  minio_operator_console: 'minio-operator-console.{{ .Values.cluster_domain }}'
  minio_monitoring: 'minio-monitoring.{{ .Values.cluster_domain }}'
  minio_monitoring_console: 'minio-monitoring-console.{{ .Values.cluster_domain }}'
  minio_logging: 'minio-logging.{{ .Values.cluster_domain }}'
  minio_logging_console: 'minio-logging-console.{{ .Values.cluster_domain }}'
  thanos: 'thanos.{{ .Values.cluster_domain }}'
  thanos_storegateway: 'thanos-storegateway.{{ .Values.cluster_domain }}'
  thanos_receive: 'thanos-receive.{{ .Values.cluster_domain }}'
  thanos_query: 'thanos-query.{{ .Values.cluster_domain }}'
  loki: 'loki.{{ .Values.cluster_domain }}'
  grafana: 'grafana.{{ .Values.cluster_domain }}'
  kubevirt_manager: 'kubevirt-manager.{{ .Values.cluster_domain }}'
  # openshift_assisted_service can be overwritten by openshift.assisted.serviceHostname
  openshift_assisted_service: 'openshift-assisted-service.{{ .Values.cluster_domain }}'
  # openshift_assisted_images can be overwritten by openshift.assisted.imageHostname
  openshift_assisted_images: 'openshift-assisted-images.{{ .Values.cluster_domain }}'

external_certificates:
  rancher: {}
  vault: {}
  keycloak: {}
  flux: {}
  neuvector: {}
  harbor: {}
  os_image_server: {}
  gitea: {}
  minio_operator: {}
  minio_monitoring: {}
  minio_logging: {}
  thanos: {}
  loki: {}
  grafana: {}
  kubevirt_manager: {}

audit_log:
  level: 0

keycloak: {}

# cis benchmark is only for rke2 so far, e.g. rke2-cis-1.23-profile-hardened
cis_benchmark_scan_profile: '{{ eq .Values.cluster.capi_providers.bootstrap_provider "cabpr" | ternary "rke2-cis-1.8-profile-hardened" "no-scan-profile-defined-for-kubeadm-cluster" }}'

# os_images images that should be served and from where they should be downloaded
# if empty default value are used
os_images: {}

# to configure the SR-IOV VFs on the supported NICs of cluster nodes
sriov:
  node_policies: {}
#   mypolicy1:
#     nodeSelector: {}  # <<< lets you further limit the SR-IOV capable nodes on which the VFs have to be created in a certain config; if not set it applies to all SR-IOV nodes
#     resourceName: ""
#     numVfs: ""
#     deviceType: ""  # supported values: "netdevice" or "vfio-pci"
#     nicSelector:
#       deviceID: ""
#       vendor: ""
#       pfNames: []
#       rootDevices: []

# add ceph cluster details
ceph:
  cephfs_csi:
    clusterID: ""
    fs_name: ""
    adminID: ""
    adminKey: ""
    monitors_ips: []

# add your proxy settings if required
proxies:
  https_proxy: ""
  http_proxy: ""
  no_proxy: ""  # you can also use no_proxy_additional, see below

# you can disable default values for no_proxy (localhost,.svc,.cluster.local.,.cluster.local,.sylva)
# Ex: localhost: false
no_proxy_additional:
  10.0.0.0/8: true
  192.168.0.0/16: true
  172.16.0.0/12: true
  localhost: true
  127.0.0.1: true
  .svc: true
  '{{ printf ".%s" .Values.cluster_domain }}': true
  .cluster.local.: true
  .cluster.local: true

