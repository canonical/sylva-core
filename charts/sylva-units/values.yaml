      internal: true
    enabled: false
    unit_templates:
    - dummy

  sriov-resources:
    info:
      description: configures SRIOV resources
      internal: true
    enabled_conditions:
    - '{{ not (empty .Values.sriov.node_policies) }}'
    unit_templates:
    - base-deps
    depends_on:
      namespace-defs: true
      sriov-network-operator: true
    repo: sriov-resources
    helm_chart_artifact_name: sriov-resources
    helmrelease_spec:
      chart:
        spec:
          chart: .
      targetNamespace: cattle-sriov-system
