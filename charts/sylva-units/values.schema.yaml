    $ref: "#/$defs/metallb-resources-values"

  calico_helm_values:
    type: object

  metallb_helm_values:
    type: object

  _internal:  # -------------------------------
    type: object

    # _internal is made to host intermediate computations which matter
    # only internally to sylva-units built-in unit definitions and behavior
    #
    # since it is not user-facing we don't want over engineer things and generally
    # don't enforce schema on its keys
    #
    # there are however cases where it seems relevant to enforce a schema to
    # facilitate developers life and catch mistakes earlier

    properties:
      immutable_values: #--------------------------------
        type: object
        patternProperties:
          ".*":
            anyOf:
              - type: object
              - $ref: "#/$defs/gotpl"

  # Placeholder for external units that would need to define their own values
  third_party:  # -------------------------------
    type: object

  shared_workload_clusters_values:
    type: object

  shared_workload_clusters_secret_values:
    type: object

  workload_clusters:
    type: object
    properties:
      sylva_source:
        type: object
      teams:
        type: object

  snmp:
    type: object
    additionalProperties: false
    properties:
      devices:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            alias:
              type: string
              format: hostname
            target:
              type: string
              anyOf:
                - pattern: "^((tcp|udp)://.*|)$"
                - format: hostname
            module:
              type: string
              pattern: "^(dell_idrac|hp_cpq|lenovo_xcc)$"
            auth:
              type: string
            cluster_name:
              type: string
      auth:
        type: object
        additionalProperties: false
        patternProperties:
          ".+":
            type: object
            additionalProperties: false
            properties:
              version:
                type: integer
                minimum: 2
                maximum: 3
              community:
                type: string
              security_level:
                type: string
                pattern: "^(noAuthNoPriv|authNoPriv|authPriv)$"
              username:
                type: string
              password:
                type: string
              auth_protocol:
                type: string
                pattern: "^(MD5|SHA|SHA224|SHA256|SHA384|SHA512)$"
              priv_protocol:
                type: string
                pattern: "^(AES|AES192|AES256)$"
              priv_password:
                type: string
            # auth credentials properties are required only for SNMP v3
            if:
              properties:
                version:
                  const: 3
            then:
              required:
                - security_level
                - username
                - password
                - auth_protocol
                - priv_protocol
                - priv_password
  rancher:
    type: object
    additionalProperties: false
    properties:
      auth_user_info_max_age_seconds:
        type: string
        pattern: "([1-9]+[0-9]|0)*$"
      auth_user_info_resync_cron:
        type: string
        pattern: "(\\*|[0-5]?[0-9]|\\*\/[0-9]+)\\s+(\\*|1?[0-9]|2[0-3]|\\*\/[0-9]+)\\s+(\\*|[1-2]?[0-9]|3[0-1]|\\*\/[0-9]+)\\s+(\\*|[0-9]|1[0-2]|\\*\/[0-9]+|jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\\s+(\\*\/[0-9]+|\\*|[0-7]|sun|mon|tue|wed|thu|fri|sat)\\s*(\\*\/[0-9]+|\\*|[0-9]+)?"

allOf:

  - # users cluster_virtual_ip must be set via .cluster_virtual_ip,
    # not via .cluster.cluster_virtual_ip
    properties:
      cluster:  # -------------------------------
        properties:
          cluster_virtual_ip:  # -------------------------------
            const: '{{ .Values.cluster_virtual_ip }}'  # only the value defined in values.yaml can be used

  - if:
      properties:
        units:
          properties:
            cluster:
              properties:
                enabled:
                  const: true
    then:
      properties:
        units:
          properties:
            cluster:
              properties:
                helmrelease_spec:
                  properties:
                    values:
                      not:
                        required: [helmrelease_spec]

  # additional constraints for .openstack
  - if:
      properties:
        cluster:
          properties:
            capi_providers:
              properties:
                infra_provider:
                  const: capo
    then:
      properties:
        openstack:  # -------------------------------
          additionalProperties: false
          properties:
            floating_ip:  # -------------------------------
              anyOf:
                - type: string
                  format: ipv4
                - type: string
                  maxLength: 0

            storageClass:  # -------------------------------
              type: object
              additionalProperties: false
              properties:
                name:  # -------------------------------
                  type: string
                type:  # -------------------------------
                  type: string
              required:
                - type

            cluster_virtual_ip_port_uuid:
              $ref: "#/$defs/openstack-uuid"

            cluster_floating_ip_uuid:
              $ref: "#/$defs/openstack-uuid"

            control_plane_affinity_policy:  # -------------------------------
              type: string
              enum:
                - anti-affinity
                - soft-anti-affinity

            worker_affinity_policy:  # -------------------------------
              type: string
              enum:
                - anti-affinity
                - soft-anti-affinity

            external_network_id:  # -------------------------------
              type: string

        # prevent having both external_network_id and cluster_floating_ip_uuid specified:
          not:
            required:
              - external_network_id
              - cluster_floating_ip_uuid

  # additional constraints for .metal3
  - if:
      properties:
        cluster:
          properties:
            capi_providers:
              properties:
                infra_provider:
                  const: capm3
    then:
      properties:
        metal3:  # -------------------------------
          additionalProperties: false
          properties:

            bootstrap_ip:  # -------------------------------
              type: string
              format: ipv4

            external_bootstrap_ip:  # -------------------------------
              type: string
              format: ipv4

  # additional constraints for .vsphere
  - if:
      properties:
        cluster:
          properties:
            capi_providers:
              properties:
                infra_provider:
                  const: capv
    then:
      properties:
        vsphere:  # -------------------------------
          additionalProperties: false
          properties:

            vsphere-cpi:
              type: object
              additionalProperties: false
              properties:

                vsphere_conf:
                  type: object

  - if:
      properties:
        env_type:
          const: prod
    then:
      properties:
        admin_password:  # ---------setting an admin password in not allowed when env_type----------------------
          const: '{{ .Values._internal.default_password }}' # on prod, the admin password must be internal.default_password
