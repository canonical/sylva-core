# This file contains a JSONSchema to validate the values given
# as inputs to the chart.
#
# **** How to edit this file *****
#
# This file is encoded as YAML instead of JSON to allow comments,
# and make editing and diffing easier.
#
# The values.schema.json file is the file actually used by the Helm chart
# and MUST BE RECREATED after each modification of this file:
# (export https_proxy if behind a Forward Proxy)
#
#   ./tools/generate_json_schema.py
#
# (a CI job is here to check that)
#
# You can test that this file is a valid JSONSchema with:
#
#   tools/generate_json_schema.py && python -m jsonschema -o pretty /usr/lib/python3/dist-packages/jsonschema/schemas/draft2020-12.json -i charts/sylva-units/values.schema.json
#
# (a CI job is here to check the same thing)
#
# **** How to test that values.yaml files conform to this schema ****
#
# Helm template will do this validation:
#
#   tools/generate_json_schema.py && helm template charts/sylva-units --values foo.yaml
#
# You can also use another JSONSchema validation tool (it's useful to have more detailed answers than what Helm produces):
#
#   To test the chart default values.yaml:
#
#      tools/generate_json_schema.py && \
#        tools/yaml2json.py < charts/sylva-units/values.yaml | python -m jsonschema -o pretty charts/sylva-units/values.schema.json -i /dev/stdin
#
#   To test the combination of the default values.yaml combined with other values files:
#
#      tools/generate_json_schema.py && \
#        tools/yamlMerge.py -o json charts/sylva-units/values.yaml foo.yaml | python -m jsonschema -o pretty charts/sylva-units/values.schema.json -i /dev/stdin
#


$schema: https://json-schema.org/draft/2020-12/schema#

title: Schema for sylva-units chart values

# this description is formatted so that it will appear very clearly
# in the JSON counterpart that the JSON isn't meant to be edited
description:
  ----------------------------------------------------------------------
  DO NOT EDIT THIS FILE AS JSON, THE YAML VERSION IS THE SOURCE OF TRUTH
  ----------------------------------------------------------------------

# sub-schemas used later on in the actual schema
$defs:
  gotpl:
    type: string
    pattern: "^{{(.|\r?\n)*}}$"

  username-password:
    anyOf:
      - type: object
        additionalProperties: false
        required:
          - username
          - password
        patternProperties:
          "^(username|password)$":
            type: string
      - $ref: "#/$defs/gotpl"

  boolean-string:
    type: string
    enum: ["true", "false", ""]

  enabled:
    anyOf:
      - type: boolean
      - $ref: "#/$defs/gotpl"
      - $ref: "#/$defs/boolean-string"

  string-with-gotpl:
    type: string
    pattern: '(.|\n)*{{(.|\n)*}}(.|\n)*'

  ipv4-cidr-full:
    type: string
    pattern: ^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\/([1-9]|[12]\d|3[012]))$

  ipv4-range:
    type: string
    pattern: ^(?:(?:[01]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])\.){3}(?:[01]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])-(?:(?:[01]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])\.){3}(?:[01]?[0-9]{1,2}|2[0-4][0-9]|25[0-5])$

  sylva-capi-cluster-values:
    # this sub-schema will be completed with actual sylva-capi-cluster-values with json schema generation
    type: object

  libvirt-metal-values:
    # this sub-schema will be completed with actual libvirt-metal values schema with json schema generation
    type: object

  sriov-resources-values:
    # this sub-schema will be completed with the actual sriov-resources chart values schema by the json schema generation tool
    type: object

  metallb-resources-values:
    # this sub-schema will be completed with actual libvirt-metal values schema with json schema generation
    type: object

  unit_info:
    # this sub-schema describes documentation block for units
    type: object
    additionalProperties: false
    required: [description]
    properties:
      description:
        type: string
      details:
        type: string
      internal:
        type: boolean
      test:
        type: boolean
      maturity:
        type: string
        enum: ["core-component", "stable", "beta", "experimental"]
      version:
        type: string
      hidden:
        type: boolean
      kustomization_path:
        type: string

  certificate:
    type: string
    pattern: ^-----BEGIN CERTIFICATE-----

  cert-and-key:
    type: object
    additionalProperties: false
    properties:
      cert:
        $ref: "#/$defs/certificate"
      key:
        type: string
        pattern: ^-----BEGIN PRIVATE KEY-----
    anyOf:  # we can have either both key and cert, or none of those
    - required: [ cert, key ]
    - allOf:
      - not:
          required: [ cert ]
      - not:
          required: [ key ]

  openstack-uuid:
    type: string
    pattern: "[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}"  # an OpenStack UUID

  pub-key:
    type: string
    pattern: ^-----BEGIN PUBLIC KEY-----

# lines with '# -------------------------------' correspond to keys in values.yaml
# (the rest being the JSONSchema language itself)

additionalProperties: false

# the default values.yaml covers all required keys, so in general
# no top-level key will be missing, this check is here only to
# cover the case where a user would mistakenly remove one of them by "nulling" it
# (e.g. by setting `proxies:` without any subdict in override values)
required:
  - git_repo_spec_default
  - source_templates
  - helm_repo_spec_default
  - unit_kustomization_spec_default
  - unit_helmrelease_spec_default
  - unit_helmrelease_kustomization_spec_default
  - units_enabled_default
  - units
  - cluster
  - proxies
  - env_type
  - registry_mirrors

properties:

  sylva-library:
    type: object

  fullnameOverride:  # -------------------------------
    type: string
  nameOverride:  # -------------------------------
    type: string

  git_repo_spec_default:  # -------------------------------
    type: object
    # (fields from a spec of a GitRepository Flux resource)

  oci_repo_spec_default:  # -------------------------------
    type: object
    # (fields from a spec of a OCIRepository Flux resource)

  source_templates:  # -------------------------------
    type: object
    additionalProperties: false
    patternProperties:

      "^[a-z0-9][a-z0-9.-]*[a-z0-9]$":  # -------------------------------
        type: object
        additionalProperties: false
        required:
          - spec
          - kind
        properties:

          auth:  # -------------------------------
            $ref: "#/$defs/username-password"

          kind: # -------------------------------
            type: string
            enum: ["GitRepository", "OCIRepository"]

          spec:  # -------------------------------
            anyOf:
            - $ref: "#/$defs/gotpl"
            - type: object
              # (fields from a spec of a Flux resource)
              required:
                - url
                - ref
              properties:

                url:  # -------------------------------
                  anyOf:
                    - type: string
                      format: uri
                    - $ref: "#/$defs/string-with-gotpl"

        allOf:
        - not:
            # prevent 'spec.secretRef' from being specified if 'auth' is set
            # because secretRef is generated by the chart in that case
            required:
              - auth
            properties:
              spec:
                required:
                  - secretRef
        - if:
            properties:
              kind:
                const: GitRepository
          then:
            properties:
              spec:  # -------------------------------
                anyOf:
                - $ref: "#/$defs/gotpl"
                - type: object
                  properties:

                    ref:  # -------------------------------
                      type: object
                      additionalProperties: false
                      anyOf:
                        - required:
                          - branch
                        - required:
                          - tag
                        - required:
                          - commit
                        - required:
                          - name
                        - required:
                          - semver
                      patternProperties:
                        '(branch|tag|commit|name|semver)':  # -------------------------------
                          type: string

        - if:
            properties:
              kind:
                const: OCIRepository
          then:
            properties:
              spec:  # -------------------------------
                anyOf:
                - $ref: "#/$defs/gotpl"
                - type: object
                  properties:

                    ref:  # -------------------------------
                      type: object
                      additionalProperties: false
                      anyOf:
                        - required:
                          - digest
                        - required:
                          - semver
                        - required:
                          - tag
                      patternProperties:
                        '(digest|semver|semverFilter|tag)':  # -------------------------------
                          type: string
                        commit:  # -------------------------------
                          const: '{{ tuple "(unused)" false | include "set-only-if" }}'  # particular case to allow key deletion (see use-oci-artifacts.values.yaml)
                    verify:  # -------------------------------
                      anyOf:
                        - $ref: "#/$defs/gotpl"
                        - type: object
                          additionalProperties: false
                          allOf:
                            - if:
                                properties:
                                  provider:
                                    const: cosign
                              then:
                                anyOf:
                                  - required:
                                    - provider
                                    - secretRef
                                  - required:
                                    - provider
                                    - matchOIDCIdentity
                            - if:
                                properties:
                                  provider:
                                    const: notary
                              then:
                                required:
                                  - provider
                                  - secretRef
                          properties:
                            provider:  # -------------------------------
                              enum:
                                - cosign
                                - notary
                            secretRef:
                              type: object
                              additionalProperties: false
                              properties:
                                name:
                                  type: string
                            matchOIDCIdentity:
                              type: array
                              items:
                                type: object
                                properties:
                                  issuer:
                                    type: string
                                  subject:
                                    type: string
                        - type: "null"

  helm_repo_spec_default:  # -------------------------------
    type: object
    # this is a spec of a GitRepository Flux resource

  unit_kustomization_spec_default:  # -------------------------------
    type: object
    # TODO: detail more

  unit_helmrelease_spec_default:  # -------------------------------
    type: object
    # TODO: detail more

  unit_helmrelease_kustomization_spec_default:  # -------------------------------
    type: object
    # TODO: detail more

  unit_definition_defaults:  # -------------------------------
    type: object

  unit_templates:  # -------------------------------
    type: object
    "^[a-z0-9][a-z0-9-]*[a-z0-9]$":  # -------------------------------
      type: object

  units:  # -------------------------------
    type: object
    patternProperties:

      "^[a-z0-9][a-z0-9-]*[a-z0-9]$":  # -------------------------------
        type: object
        additionalProperties: false
        properties:

          enabled:  # -------------------------------
            $ref: "#/$defs/enabled"

          enabled_conditions:
            type: array
            items:
              $ref: "#/$defs/enabled"

          info:
            $ref: "#/$defs/unit_info"

          unit_templates:
            type: array
            items:
              anyOf:
                - $ref: "#/$defs/gotpl"
                - type: string
                  pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"

          one_shot:  # -------------------------------
            type: boolean

          repo:  # -------------------------------
            anyOf:
              - type: string
              - type: "null"

          labels:  # -------------------------------
            type: object
            patternProperties:
              ".*":
                anyOf:
                - type: string
                - const: null

          annotations:  # -------------------------------
            type: object
            patternProperties:
              ".*":
                type: string

          depends_on:  # -------------------------------
            anyOf:
            - type: object
              patternProperties:
                "^([a-z0-9][a-z0-9-]*[a-z0-9](/[a-z0-9][a-z0-9-]*[a-z0-9])?|{{ .* }})$":  # a unit name, optionally prefixed by a namespace name (can be templated)
                  anyOf:
                    - type: boolean
                    - $ref: "#/$defs/gotpl"
            - $ref: "#/$defs/gotpl"

          ref_override:  # -------------------------------
            type: string

          suspend:  # -------------------------------
            type: boolean

          kustomization_name:  # -------------------------------
            anyOf:
              - type: string
              - $ref: "#/$defs/string-with-gotpl"

          kustomization_spec:  # -------------------------------
            type: object
            properties:
              path:  # -------------------------------
                type: string

              _patches:  # -------------------------------
                type: array
                items:
                  anyOf:
                  - type: object
                  - $ref: "#/$defs/gotpl"

              _components:  # -------------------------------
                type: array
                items:
                  type: string

            allOf:
              # prevent having dependsOn here (we want it at the upper level with 'depends_on')
              - not:
                  required:
                    - dependsOn
              # prevent having both "wait: true" and "healthChecks"
              # because in this case FluxCD Kustomize controller ignores "healthChecks"
              - not:
                  required:
                    - wait
                    - healthChecks
                  properties:
                    wait:
                      const: true
              # do not allow sourceRef (dynamically set by Helm template based on 'repo')
              - not:
                  required:
                    - sourceRef

          helmrelease_spec:  # -------------------------------
            type: object
            required:
              - chart
            properties:
              chart:  # -------------------------------
                type: object
                required:
                  - spec
                properties:
                  spec:  # -------------------------------
                    type: object
                    required:
                      - chart
                    properties:
                      chart:  # -------------------------------
                        type: string

              _postRenderers: # -------------------------------
                anyOf:
                  - $ref: "#/$defs/string-with-gotpl"
                  - type: array
                    items:
                      anyOf:
                      - type: object
                      - $ref: "#/$defs/gotpl"

            # prevent having dependsOn here (we want it at the upper level with 'depends_on')
            not:
              required:
                - dependsOn

          helm_repo_url:  # -------------------------------
            anyOf:
              - type: string
                pattern: (https?|oci)://.*
              - $ref: "#/$defs/gotpl"
              - const: ""

          helm_repo_spec:  # -------------------------------
            type: object

          helm_chart_versions:  # -------------------------------
            type: object
            items:
              type: boolean

          helm_chart_artifact_name:
            type: string

          helm_secret_values:  # -------------------------------
            anyOf:
              - type: object
              - $ref: "#/$defs/gotpl"

          kustomization_substitute_secrets:  # -------------------------------
            type: object
            additionalProperties: false
            patternProperties:
              "^.*$":
                type: string

        dependencies:
          helm_repo_spec:
            required:
              - helm_repo_url

        dependentRequired:
          kustomization_substitute_secrets:
            - kustomization_spec
          helm_secret_values:
            - helmrelease_spec
          helm_repo_url:
            - helmrelease_spec
          helm_chart_artifact_name:
            - helmrelease_spec

        required:
          - info
          - unit_templates  # we make this mandatory to set to avoid people mistakenly forgetting to inherit from base-deps
                            # if there really is not intention to not inherit from base-deps, this can be set to '[]'

        allOf:
          - anyOf:  # require having at least helmrelease_spec or
                    # kustomization_spec, and allow having both
            - required:
              - helmrelease_spec
            - required:
              - kustomization_spec
            - required:  # we relax this check if 'unit_templates' is used
              - unit_templates

          - anyOf:
            # for a unit which is explicitly disabled, we don't mandate anything else
            - properties:
                enabled:
                  const: false

            # ... for a unit which is explicitly enabled or conditionally enabled we enforce
            # the following:
            - allOf:

              # prevent having both 'repo' fully specified (not null) and 'helm_repo_url':
              - not:
                  required:
                    - repo
                    - helm_repo_url
                  properties:  # to allow 'helm_repo_url' when 'repo' is null (fail validation of this sub-schema only if repo is a string)
                    repo:
                      type: string

              # there are some things we need on kustomization_spec
              # but that aren't needed in the case where we specify helmrelease_spec,
              # (see example where we need that under bootstrap.values.yaml:units.sylva-units)
              # or in the case where unit_templates is used
              #
              # (note that we have a check for the presence of 'path' in the final resource in templates/units.yaml
              #  to ensure it's presence when unit_templates is used)
              - if:
                  allOf:
                    - not:
                        required:
                          - helmrelease_spec
                    - not:
                        required:
                          - unit_templates
                then:
                  properties:
                    kustomization_spec:
                      allOf:
                        - required:
                          - path
                        - anyOf:  # force having either 'wait' or 'healthChecks'
                          - required:
                              - wait
                          - required:
                              - healthChecks

              # if helmrelease_spec is used then, kustomization_spec.path cannot be set
              - if:
                  required:
                    - helmrelease_spec
                then:
                  anyOf:
                    - not:
                        required: [kustomization_spec]
                    - not:
                        properties:
                          kustomization_spec:
                            required:
                              - path
                    - properties:
                        kustomization_spec:
                          properties:
                            path:
                              const: ./kustomize-units/helmrelease-generic

  cluster:  # -------------------------------
    # the values are values of the sylva-capi-cluster chart
    # https://gitlab.com/sylva-projects/sylva-elements/helm-charts/sylva-capi-cluster
    $ref: "#/$defs/sylva-capi-cluster-values"

  cluster_machines_ready:
    type: object
    additionalProperties: false
    properties:
      wait_timeout:
        type: string
        pattern: '^[0-9]+[smh]'

  os_image_server_additional_selectors:  # -------------------------------
    type: object
    additionalProperties: false
    patternProperties:
      ".*":  # -------------------------------
        anyOf:
          - $ref: "#/$defs/gotpl"
          - type: object  # this is an "OS image selector", as defined in sylva-library (validated by validate-selector from same library)
            additionalProperties: false
            patternProperties:
              ".*":  # -------------------------------
                type: string

  openstack:  # -------------------------------
    type: object
    # actual constraints are later in this file under '# additional constraints for .openstack'

  metal3:  # -------------------------------
    type: object
    # actual constraints are later in this file under '# additional constraints for .metal3'

  vsphere:  # -------------------------------
    type: object
    # actual constraints are later in this file under '# additional constraints for .vsphere'

  capd_docker_host:  # -------------------------------
    type: string
    format: uri
    pattern: "^(unix|tcp)://.*"

  sriov: # -------------------------------
    # the values are values of the sriov-resources chart
    # https://gitlab.com/sylva-projects/sylva-elements/helm-charts/sriov-resources
    $ref: "#/$defs/sriov-resources-values"

  k8s_version_short:
    type: string
    # short Kubernetes version, e.g. 1.26
    pattern: '^[1-9]+[0-9]*[.]([1-9]+[0-9]|0)*$'

  cluster_virtual_ip:  # -------------------------------
    type: string
    format: ipv4

  admin_password:  # -------------------------------
    type: string

  cis_benchmark_scan_profile:  # -------------------------------
    type: string

  flux: # -------------------------------
    type: object
    additionalProperties: false
    properties:
      kustomize:  # -------------------------------
        type: object
        additionalProperties: false
        properties:
          concurrent:
            type: integer
          log_level:
            type: string
          features_gates:
            type: object
      helm:  # -------------------------------
        type: object
        additionalProperties: false
        properties:
          concurrent:
            type: integer
          log_level:
            type: string
          features_gates:
            type: object
      source:  # -------------------------------
        type: object
        additionalProperties: false
        properties:
          concurrent:
            type: integer
          log_level:
            type: string
          features_gates:
            type: object

  flux_webui: # -------------------------------
    type: object
    additionalProperties: false
    properties:
      admin_user:  # -------------------------------
        type: string

  display_external_ip:  # ------------------------------
    type: string

  audit_log:  # -------------------------------
    type: object
    additionalProperties: false
    properties:

      level:  # -------------------------------
        type: integer
        minimum: 0
        maximum: 3

  cluster_domain:  # -------------------------------
    anyOf:
      - type: string
        format: hostname
      - $ref: "#/$defs/string-with-gotpl"

  cluster_public_endpoint:  # -------------------------------
    anyOf:
      - type: string
        pattern: "^(https?://.*|)$"
      - $ref: "#/$defs/gotpl"

  external_hostnames:  # -------------------------------
    type: object
    additionalProperties: false
    properties:

      rancher:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      vault:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      keycloak:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      neuvector:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      harbor:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      flux:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - $ref: "#/$defs/string-with-gotpl"
      os_image_server:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      gitea:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      kunai:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      minio_operator_console:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      minio_monitoring:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      minio_monitoring_console:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      minio_logging:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      minio_logging_console:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      thanos:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      thanos_storegateway:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      thanos_receive:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      thanos_query:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      loki:  # -------------------------------
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      grafana:
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      kubevirt_manager:
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      openshift_assisted_service:
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"
      openshift_assisted_images:
        anyOf:
          - type: string
            format: hostname
          - const: ''
          - $ref: "#/$defs/string-with-gotpl"

  external_certificates:  # -------------------------------
    type: object
    additionalProperties: false
    properties:
      cacert: # -------------------------------
        $ref: "#/$defs/certificate"
      rancher: # -------------------------------
        $ref: "#/$defs/cert-and-key"
      vault:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      keycloak:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      neuvector:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      harbor:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      flux:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      os_image_server:  # -------------------------------
        $ref: "#/$defs/cert-and-key"
      gitea:  # -------------------------------
