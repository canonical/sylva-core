  keycloak: # -------------------------------
    type: object
    additionalProperties: false
    properties:

      keycloak_expire_password_days:  # -------------------------------
        type: integer

  os_images: # -------------------------------
    type: object
    additionalProperties: false
    propertyNames: # image name should be k8s object compatible and not be more than 52 chars long
      pattern: "^[a-z0-9][a-z0-9-]{1,50}[a-z0-9]$"
    patternProperties:
      ".*":
        type: object
        patternProperties:  # all properties are strings
          ".*":
            type: string
        properties:
          uri:
            anyOf:
              - anyOf:
                  - pattern: "^(https?://.*|)$"
                  - pattern: "^(oci://.*)$"
                  - pattern: "^{{ .Values.sylva_base_oci_registry }}/.*$"
              - $ref: "#/$defs/string-with-gotpl"
          sha256:
            pattern: "[a-f0-9]*"
        required:
          - uri

  os_images_default_download_storage_space:
    type: string
    pattern: '^[1-9]+[0-9]*Gi$'

  get_openstack_images_per_image_timeout_minutes:
    type: number

  libvirt_metal:  # -------------------------------
    # the values are values of the libvirt-metal chart
    $ref: "#/$defs/libvirt-metal-values"

  proxies:  # -------------------------------
    type: object
    additionalProperties: false
    patternProperties:
      https?_proxy:  # -------------------------------
        type: string
        pattern: "^(https?://.*|)$"
      no_proxy:  # -------------------------------
        type: string
    required:
      - http_proxy
      - https_proxy
      - no_proxy

  ceph:
