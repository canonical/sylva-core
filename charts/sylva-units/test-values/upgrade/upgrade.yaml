cluster:
  name: test-cluster  # overriden so that we can have a value common for mgmt and workload which we use below in _previous_values

_internal:

  state: # simulate an upgrade scenario
    is_upgrade: true

  # we need to give mock "previous values" because
  # as soon as is_upgrade is true the check for immutability
  # will try to use them
_previous_values:
  cluster:
    name: test-cluster
    capi_providers:
      bootstrap_provider: cabpk
      infra_provider: capd
