{{/*

Save chart values as secret to ease debugging, when enabled.

It enable to inspect how values are merged from various inputs (valueFiles, values,
valuesFrom, PostRenderer) when this chart is deployed as a flux HelmRelease.

the chart using following command:

kubectl get secrets sylva-units-values -o template="{{ .data.values }}" | base64 -d

*/}}
{{- $envAll := set . "Values" (include "interpret-values-gotpl" . | fromJson) -}}

{{/*
Checking that all values under ._internal.immutable_values and set with dict "_immutable: true" value will not change during Helm upgrade/rollback.
*/}}
{{- if and .Values._internal.state.is_upgrade .Values._internal.previous_values -}}
  {{- $previous_values := .Values._internal.previous_values -}}
  {{- tuple .Values._internal.immutable_values $previous_values .Values list | include "check-immutable-values" -}}
{{- end -}}
{{/* we'll dump Values in sylva-units-values, except that we need to remove _internal.previous_values or else this secret
     will grow arbitrarily large with each new Helm release
*/}}
{{- $dumpValues := deepCopy $envAll.Values -}}
{{- $_ := set $dumpValues._internal "previous_values" dict -}}
{{/* to have a values checksum that is always the same for a given set of input values the values checksum that we compute cannot include dynamically computed things, like htpasswd */}}
{{- $values_checksum := regexReplaceAll " passwordHash: .*" (.Values | toYaml) " passwordHash: xxxxxx" | sha256sum -}}
apiVersion: v1
kind: Secret
metadata:
  name: sylva-units-values
  labels:
{{ include "sylva-units.labels" . | indent 4 }}
  annotations:
    values-checksum: "{{ $values_checksum }}"
type: Opaque
stringData:
  values: |
{{ $dumpValues | toYaml| indent 4 | include "unshield-raw" }}

---
{{/*

sylva-units-status is a special Kustomization that depends on all other Kustomization
produced by the chart. Hence looking at its status allows to tell if all units have been deployed.

This Kustomization produced a ConfigMap which will be updated at the end
of a deployment with information about the revision and values of the sylva-units Helm release.

*/}}
{{- range $unit_status_name := list "sylva-units-tests-status" "sylva-units-status" }}
  {{- $is_test := eq $unit_status_name "sylva-units-tests-status" -}}
  {{- $deps := list -}}

  {{/* one-shot units information already present in the current sylva-units-status confimap, is preserved */}}
  {{- $one_shot_units := include "one-shot-units" $envAll | fromJson -}}

  {{- range $unit_name, $unit_def := $envAll.Values.units -}}
    {{- $unit_enabled := include "unit-enabled" (tuple $envAll $unit_name) -}}
    {{- $is_test_unit := dig "test" false $unit_def.info -}}
    {{- if $unit_enabled -}}
      {{- if eq $is_test $is_test_unit -}}
        {{- $deps = append $deps (dict "name" (include "kustomization-name" (tuple $envAll $unit_name))) -}}
      {{- end -}}

      {{/* add to one-shot units information: a unit enabled in this run
        which also is a one-shot unit, will be added to the "one-shot-units" entry
        of the sylva-units-status ConfigMap, which is produced on completion of
        the last Kustomization of the dependency chain, sylva-units-status

        (we care about one-shot-unit information only for sylva-units-status)
      */}}
      {{- if and (not $is_test) ($unit_def.one_shot | default false) -}}
        {{- $_ := set $one_shot_units $unit_name "done" -}}
      {{- end -}}

    {{- end -}}
  {{- end }}
  {{/* we always add a dependency on 'cluster' unit for sylva-units-status, 
       because in the specific case where it isn't yet enabled in the mgmt cluster because we're
       before the pivot, we want to ensure that sylva-units-status will
       not prematurely become ready
  */}}
  {{- if (not $is_test) -}}
    {{- $deps = append $deps (dict "name" "cluster") -}}
  {{- end -}}
  {{- $time := now }}
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: {{ $unit_status_name }}
  labels: {{ include "sylva-units.labels" $envAll | nindent 4 }}
    sylva-units/root-dependency-wait: ""
  annotations:
    sylva-units-helm-revision: '{{ $envAll.Release.Revision }}'
    target-release-revision: "{{ $envAll.Release.Revision }}"
    target-sylva-units-chart-version: "{{ $envAll.Chart.Version }}"
    target-values-checksum: "{{ $values_checksum }}"
    release-time: "{{ $time }}"
spec:
{{/* omitting 'targetNamespace' and 'kubeConfig' keys is necessary or else we inherit those which
in the context of workload-cluster.values.yaml results in deploying the ConfigMap in the
remote cluster */}}
{{ omit $envAll.Values.unit_kustomization_spec_default "targetNamespace" "kubeConfig" | toYaml | indent 2 }}
  sourceRef: {{ $envAll.Values.unit_helmrelease_kustomization_spec_default.sourceRef | toYaml | nindent 4 }}
  path: ./kustomize-units/sylva-units-status
  dependsOn: {{ $deps | toYaml | nindent 4 }}
  wait: true
  targetNamespace: {{ $envAll.Release.Namespace }}
  postBuild:
    substitute:
      NAME: {{ $unit_status_name }}
  patches:
    - target:
        kind: ConfigMap
      patch: |
        kind: ConfigMap
        metadata:
          name: _unused_
        data:
          release-revision: "{{ $envAll.Release.Revision }}"
          sylva-units-chart-version: "{{ $envAll.Chart.Version }}"
          release-time: "{{ $time }}"
          values-checksum: "{{ $values_checksum }}"
          {{ if not (empty $one_shot_units) -}}
          one-shot-units: | {{ $one_shot_units | toYaml | nindent 12 }}
          {{- end }}
          additional-info: | {{ $envAll.Values.additional_sylva_units_status_info | toYaml | nindent 12 }}
---
{{- end }}
