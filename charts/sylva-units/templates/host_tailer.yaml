{{- $envAll := set . "Values" (include "interpret-values-gotpl" . | fromJson) -}}
{{- if or (tuple . "upstream-logging" | include "unit-enabled") (tuple . "logging" | include "unit-enabled") -}}
apiVersion: logging-extensions.banzaicloud.io/v1alpha1
kind: HostTailer
metadata:
  name: logging-host-tailer-{{ .Values._kustomization_name_ }}
  namespace: {{ tuple . (tuple . "upstream-logging" | include "unit-enabled") "upstream-logging" "cattle-logging-system" | include "interpret-ternary" }}
spec:
  workloadMetaOverrides:
    labels:
      cluster: sylva
{{- if .Values.cluster.capi_providers.bootstrap_provider | eq "cabpr" -}}
  fileTailers:
  - name: kubelet-logs
    path: /var/lib/rancher/rke2/agent/logs/kubelet.log
  systemdTailers:
  - maxEntries: 100
    name: rke2-server-journal
    systemdFilter: rke2-server.service
  - maxEntries: 100
    name: rke2-agent-journal
    systemdFilter: rke2-agent.service
{{- end -}}
{{- end -}}