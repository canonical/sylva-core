---
include:
  - local: .gitlab/ci/deployment-pipeline.yml
  - project: 'sylva-projects/sylva-elements/ci-tooling/runner-aas'
    ref: 1.0.0
    file:
      - ci-templates/equinix-runner-request-template.yml

# Default tag will be used for all deployments/updates jobs
default:
  tags:
    - $CI_PIPELINE_IID
    - equinix
    - shell

# test-tags will be used to run the tests jobs in a docker executor based runner
.test-tags:
  tags:
    - $CI_PIPELINE_IID
    - equinix
    - docker
