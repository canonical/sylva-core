---
include:
  - local: .gitlab/ci/pipeline-deploy-base.yml
  - project: 'sylva-projects/sylva-elements/ci-tooling/runner-aas'
    ref: test
    file:
      - ci-templates/equinix-runner-request-template.yml

create-runner:
  script:
    - glab config set -g check_update false
    - >
      glab ci run-trig
      --token="$RUNNER_AAS_TOKEN"
      --branch "test"
      --variables "TARGET_REF:test"
      --variables "REQUEST:$REQUEST"
      --variables "SOURCE_JWT_TOKEN:$JOB_ID_TOKEN"
      --variables "RUNNER_PLAN:$RUNNER_PLAN"
      --variables "RUNNER_OS:$RUNNER_OS"
      --variables "RUNNER_ADDITIONAL_TAGS:$RUNNER_ADDITIONAL_TAGS"
      --repo "sylva-projects/sylva-elements/ci-tooling/runner-aas-interface" | tee pipeline.json


variables:
  EQUINIX_RUNNER_PLAN: "m3.large.x86"

# Default tag will be used for all deployments/updates jobs
default:
  tags:
    - $CI_PIPELINE_IID
    - equinix
    - shell

# test-tags will be used to run the tests jobs in a docker executor based runner
.test-tags:
  tags:
    - $CI_PIPELINE_IID
    - equinix
    - docker

# This configuration is specific to capm3 deployments
.flavored-pre-deployment-configuration:
  - echo Runner tags = $CI_RUNNER_TAGS  /  Pipeline IID = $CI_PIPELINE_IID
  - >
    if [[ $CI_RUNNER_TAGS != *${CI_PIPELINE_IID}* ]]; then
      echo "Wrong runner :(";
      exit 100;
    fi
