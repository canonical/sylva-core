# ==========================================
# Build stage
# ==========================================


.build-base:
  stage: build
  dependencies: []
  variables:
    OCI_REGISTRY: oci://${CI_REGISTRY_IMAGE}
    OCI_TAG: $OCI_TAG_FORMAT


publish-kustomize-units-artifact:
  extends: .build-base
  script:
    - export ARTIFACT_VERSION=${OCI_TAG}
    - tools/oci/build-kustomize-units-artifact.py

push-helm-artifacts:
  extends: .build-base
  script:
    - export OCI_REGISTRY=oci://${CI_REGISTRY_IMAGE}
    - tools/oci/push-helm-charts-artifacts.py

publish-sylva-units-artifact:
  extends: .build-base
  script:
    - export HELM_CHART_VERSION=${OCI_TAG}
    - tools/oci/build-sylva-units-artifact.py
  allow_failure: true
