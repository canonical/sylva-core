# Test Case: Deny caBundle Updates
#
# Purpose:
#   Ensures that only authorized service accounts (e.g., cert-manager) can add or modify the `caBundle` field
#   in the webhook client configuration of a CustomResourceDefinition (CRD) when a specific annotation is present.
#   Unauthorized users (such as test-updater) should be denied when attempting to add or change the caBundle.
#
# How it works:
#   - Sets up a CRD with the required annotation and webhook conversion, but no caBundle.
#   - Attempts to add or modify the caBundle as both an unauthorized and authorized user.
#   - Verifies that only cert-manager can perform these updates, while others are rejected.
#   - Also checks that after removing the annotation, further caBundle mutations are denied.
#
# Usage:
#   This file is included in the CI pipeline and executed as part of the Validating Admission Policy test suite.
#   All resources and test steps for this policy are grouped here.

.vap_policies:

  setup-crd-policy:
    - |
      cat <<EOF>> setup-crd-policy.yaml
      ---
      # A service account to test denied updates
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: test-updater
        namespace: validating-admission-policy-test
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: crd-updater-role
      rules:
      - apiGroups: ["apiextensions.k8s.io"]
        resources: ["customresourcedefinitions"]
        verbs: ["get", "list", "watch", "update", "patch"]
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: test-user-crd-updater-binding
      subjects:
      - kind: ServiceAccount
        name: test-updater
        namespace: validating-admission-policy-test
      roleRef:
        kind: ClusterRole
        name: crd-updater-role
        apiGroup: rbac.authorization.k8s.io
      ---
      # A sample CRD to test against. Start with annotation and webhook, but empty caBundle.
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com
        # Annotation required to trigger the specific policy check
        annotations:
          cert-manager.io/inject-ca-from: "some-namespace/some-secret"
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
        # Webhook conversion configuration required to trigger the policy check
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # caBundle is initially unset or empty - we will try to add/modify it
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]
      EOF
    - cat setup-crd-policy.yaml

  add-cabundle:
    - |
      cat <<EOF>> test-add-cabundle.yaml
      ---
      # Add caBundle for the first time
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com # Assume this was created (no caBundle initially)
        annotations:
          cert-manager.io/inject-ca-from: "some-namespace/some-secret"
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # Adding caBundle for the first time
              caBundle:  # Dummy Base64 Cert
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]     
      EOF
    - cat test-add-cabundle.yaml

  modify-cabundle:
    - |
      cat <<EOF>> test-modify-cabundle.yaml
      ---
      # Update that modifies the caBundle
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com
        annotations:
          cert-manager.io/inject-ca-from: "some-namespace/some-secret-CHANGED" # Changed annotation
          another-annotation: "added" # Added annotation
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
                      # Add a field to schema to show other changes are allowed
                      anotherField:
                          type: integer
        # Webhook conversion configuration required to trigger the policy check
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # we will try to modify caBundle
              caBundle:  # Same Cert as previous ALLOWED update
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]    
      EOF
    - cat test-modify-cabundle.yaml

  update-crd:
    - |
      cat <<EOF>> test-update-crd.yaml
      ---
      # State for testing NO caBundle change (but other field changes)
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com
        annotations:
          cert-manager.io/inject-ca-from: "some-namespace/some-secret-CHANGED" # Changed annotation
          another-annotation: "added" # Added annotation
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
                      # Add a field to schema to show other changes are allowed
                      anotherField:
                          type: integer
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # caBundle is UNCHANGED
              caBundle:  # Same Cert as previous ALLOWED update
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]
      EOF
    - cat test-update-crd.yaml

  remove-annotation:
    - |
      cat <<EOF>> test-remove-annotation.yaml
      ---
      # Update that removes "cert-manager.io/inject-ca-from" annotation
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com
        annotations:
          # Annotation cert-manager.io/inject-ca-from: is REMOVED
          another-annotation: "added" # Added annotation
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
        # Webhook conversion configuration required to trigger the policy check
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # caBundle is UNCHANGED
              caBundle:  # Dummy Base64 Cert
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]
      EOF
    - cat test-remove-annotation.yaml

  modify-post-annotation-removal:
    - |
      cat <<EOF>> test-modify-post-annotation-removal.yaml
      ---
      # Update that modifies the caBundle after annotation removal
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: tests.example.com
        annotations:
          # Annotation cert-manager.io/inject-ca-from: is still MISSING
          cert-manager.io/inject-ca-from: "some-namespace/some-secret"
      spec:
        group: example.com
        names:
          kind: Test
          listKind: TestList
          plural: tests
          singular: test
        scope: Namespaced
        versions:
          - name: v1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                    properties:
                      field:
                        type: string
        conversion:
          strategy: Webhook
          webhook:
            clientConfig:
              # modify caBundle again
              caBundle:  # Dummy Base64 Cert
              service:
                name: test-webhook-service
                namespace: validating-admission-policy-test
                path: /convert
                port: 443
            conversionReviewVersions: ["v1", "v1beta1"]     
      EOF
    - cat test-modify-post-annotation-removal.yaml
