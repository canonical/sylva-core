# Test Case: Disallow Latest and Main Image Tags
#
# Purpose:
#   Ensures that workloads (Pods, Deployments, Jobs, CronJobs) cannot use container images with the 'latest' or 'main' tag.
#   This enforces best practices by requiring explicit, immutable image tags for all resources.
#
# How it works:
#   - Attempts to create various workload resources using images tagged as 'latest'.
#   - The admission policy should reject these creations.
#
# Usage:
#   This file is included in the CI pipeline and executed as part of the Validating Admission Policy test suite.
#   All resources and test steps for this policy are grouped here.

.vap_policies:

  disallow-latest-and-main-tag:
    - |
      cat <<EOF>> test-disallow-latest-and-main-tag.yaml
      ---
      apiVersion: v1
      kind: Pod
      metadata:
        name: test-pod
        namespace: validating-admission-policy-test
      spec:
        containers:
          - name: main-container
            image: nginx:latest
        initContainers:
          - name: init-container
            image: nginx:latest
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: test-deployment
        namespace: validating-admission-policy-test
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: test
        template:
          metadata:
            labels:
              app: test
          spec:
            containers:
              - name: main-container
                image: nginx:latest
            initContainers:
              - name: init-container
                image: nginx:latest
      ---
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: test-job
        namespace: validating-admission-policy-test
      spec:
        template:
          spec:
            restartPolicy: OnFailure
            containers:
              - name: job-container
                image: nginx:latest
            initContainers:
              - name: job-init-container
                image: nginx:latest
      ---
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: test-cronjob
        namespace: validating-admission-policy-test
      spec:
        schedule: "*/5 * * * *"
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                containers:
                  - name: cronjob-container
                    image: nginx:latest
                initContainers:
                  - name: cronjob-init-container
                    image: nginx:latest
      EOF
    - cat test-disallow-latest-and-main-tag.yaml
