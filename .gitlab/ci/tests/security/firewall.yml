---
# This test extracts from the logs of all the nodes the logs corresponding
# to packets reaching the default rule of the firewall configuration

.firewall-verify:
  script:
    - touch $FIREWALL_LOG_FILE
    - |
      for i in $CLUSTER_DIRECTORY/node_logs/*.tar.gz; do
          echo "Extracting the calico logs from $i"
          mkdir my-node-logs
          tar -C my-node-logs -z -xf $i || true
          for j in $(find my-node-logs -type d -name journal); do
              echo "Found the journal at path $j"
              if [ -n "$WHITE_LIST" ]; then
                  journalctl -D $j | grep "calico-packet:" | grep -v "$WHITE_LIST" >> $FIREWALL_LOG_FILE || true
              else
                  journalctl -D $j | grep "calico-packet:" >> $FIREWALL_LOG_FILE || true
              fi
          done
          rm -rf my-node-logs
      done
    - count=$(cat $FIREWALL_LOG_FILE | wc -l)
    - |
      if [ $count -ne 0 ]; then
          echo "Some packets reached the default policy:"
          cat $FIREWALL_LOG_FILE
          exit 1
      fi
    - echo "No packet reached the default policy, it is OK"

mgmt-firewall-verify:
  extends:
    - .test-base-management-cluster
    - .firewall-verify
  needs:
    - job: deploy-management-cluster
    - job: deploy-workload-cluster
      optional: true
    - job: update-management-cluster
      optional: true
    - job: update-workload-cluster
      optional: true
  variables:
    FIREWALL_LOG_FILE: management-firewall.log
    CLUSTER_DIRECTORY: management-cluster-dump
    WHITE_LIST: "SPT=6443" # don't keep in CI the packets received from the kube-apiserver of the workload cluster
  image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/ci-image/ci-systemd-image:v1.0.58
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - management-firewall.log
  allow_failure: true

# This test extracts from the logs of all the nodes the logs corresponding
# to packets reaching the default rule of the firewall configuration

wkld-firewall-verify:
  extends:
    - .test-base-workload-cluster
    - .firewall-verify
  needs:
    - job: deploy-workload-cluster
    - job: update-workload-cluster
      optional: true
  variables:
    FIREWALL_LOG_FILE: workload-firewall.log
    CLUSTER_DIRECTORY: workload-cluster-dump
  image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/ci-image/ci-systemd-image:v1.0.58
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - workload-firewall.log
  allow_failure: true
