---
# Theses jobs are checking if we have some PolicyReportor ClusterPolicyReport
# in a FAIL, WARN, ERROR state. If some are detected the job loops over them
# to display the result and dump it into a file before failing

.check_kyverno_resource:
  extends:
    - .test-base-management-cluster
  script:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:kyverno[collapsed=true]\r\e[0KChecking Kyverno ${RESOURCE}s\e[0m"
    - |
      error=0
      while read -r NAMESPACE NAME; do
        echo -e "$RESOURCE \\e[1;91m$NAME\\e[0m $(if [ $NAMESPACE != "None" ]; then echo "in \\e[1;94m$NAMESPACE\\e[0m namespace "; fi)was in \\e[31mFAIL/WARN/ERROR\\e[0m" | tee -a ${CI_PROJECT_DIR}/$RESOURCE.log
        kubectl --kubeconfig management-cluster-kubeconfig -n $NAMESPACE get $RESOURCE $NAME -o yaml | yq '{"scope": .scope, "results": .results | filter(.result|test("pass|skip")|not)} | select(.results[] | length > 0)' | tee -a ${CI_PROJECT_DIR}/$RESOURCE.log
        error=1
      done < <(kubectl --kubeconfig management-cluster-kubeconfig get $RESOURCE -A -o yaml | yq '.items[] | select(.summary.fail > 0 or .summary.warn > 0 or .summary.error > 0) | (.metadata.namespace // "None") + " " + .metadata.name')
      echo -e "\e[0Ksection_end:`date +%s`:kyverno\r\e[0K"
      exit $error
  artifacts:
    paths:
      - $RESOURCE.log
    expire_in: 48 hour
    when: always

mgmt-policy-report:
  variables:
    RESOURCE: "policyreport"
    DESCRIPTION: Verify if any PolicyReport is in a FAIL, WARN, or ERROR state.
  extends:
    - .check_kyverno_resource

mgmt-cluster-policy-report:
  variables:
    RESOURCE: "clusterpolicyreport"
    DESCRIPTION: Verify if any ClusterPolicyReport is in a FAIL, WARN, or ERROR state.
  extends:
    - .check_kyverno_resource
