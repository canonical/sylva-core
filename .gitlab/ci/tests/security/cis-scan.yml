---
# This test gather the cis scan report from the management cluster
# and upload it as an artifact

mgmt-cis-scan:
  extends:
    - .test-base-management-cluster
  script:
    - pip install tabulate --break-system-packages
    - |
      if kubectl --kubeconfig management-cluster-kubeconfig get namespace cis-operator-system &>/dev/null; then
        REPORT=$(kubectl --kubeconfig management-cluster-kubeconfig -n cis-operator-system get clusterscanreports -o name)
        echo "Report name: $REPORT"
        kubectl --kubeconfig management-cluster-kubeconfig -n cis-operator-system get $REPORT -o jsonpath={.spec.reportJSON} | jq | tools/display-scan-report.py | tee ${CI_PROJECT_DIR}/cis-report.log
      else
        echo "cis-scan-operator wasn't present, no report was generated" | tee ${CI_PROJECT_DIR}/cis-report.log
      fi
  variables:
    DESCRIPTION: Retrieve the CIS scan report generated by the CIS Operator for RKE2-based deployments.
  artifacts:
    paths:
      - cis-report.log
    expire_in: 48 hour
    when: always
  allow_failure: true
