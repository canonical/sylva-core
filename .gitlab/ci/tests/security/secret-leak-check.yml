---
# This test gather kubernetes and vault from the management cluster
# and check for possible leak on the logs of the pods

leak-report:
  stage: deployment-test
  extends:
    - .test-tags
    - .rules:need-management-cluster
  script:
    - !reference [.import_functions]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - !reference [.test_scripts, edit_hosts_file]
    - export KUBECONFIG=management-cluster-kubeconfig
    - export VAULT_API_TOKEN=$(kubectl -n vault get secrets/vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)
    - export VAULT_URL=$(kubectl get ingress -n vault vault -o jsonpath='{ .spec.tls[].hosts[] }')
    - pip install hvac kubernetes --break-system-packages
    - unset https_proxy http_proxy
    - python3 ./.gitlab/ci/scripts/leaks_check_report.py || true  # always return success until https://gitlab.com/sylva-projects/sylva-core/-/issues/1526 is addressed
  allow_failure: true
  artifacts:
    paths:
      - leak-report.log
    expire_in: 48 hour
    when: always
