---
# This job tests cronjob behavior

.cronjob-testing:
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - failed-jobs-dump/*
      - cronjob_report.txt
  variables:
    DUMP_DIR: ${CI_PROJECT_DIR}/failed-jobs-dump
    REPORT_FILE: ${CI_PROJECT_DIR}/cronjob_report.txt

mgmt-cronjob-testing:
  extends:
    - .cronjob-testing
    - .test-base-management-cluster
  script:
    - export KUBECONFIG=management-cluster-kubeconfig
    - .gitlab/ci/scripts/cronjob-test.sh

wkld-cronjob-testing:
  extends:
    - .cronjob-testing
    - .test-base-workload-cluster
  script:
    - !reference [.test_scripts, edit_hosts_file]
    - export KUBECONFIG=workload-cluster-kubeconfig
    - .gitlab/ci/scripts/cronjob-test.sh
