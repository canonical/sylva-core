---
# This job tests cronjob behavior

.cronjob-testing:
  stage: deployment-test
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - failed-jobs-dump/*
      - cronjob_report.txt
  variables:
    DUMP_DIR: ${CI_PROJECT_DIR}/failed-jobs-dump
    REPORT_FILE: ${CI_PROJECT_DIR}/cronjob_report.txt

mgmt-cronjob-testing:
  extends:
    - .cronjob-testing
    - .test-tags
    - .rules:need-management-cluster
  script:
    - !reference [.import_functions]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - export KUBECONFIG=management-cluster-kubeconfig
    - .gitlab/ci/scripts/cronjob-test.sh

wkld-cronjob-testing:
  extends:
    - .cronjob-testing
    - .test-tags
    - .rules:need-workload-cluster
  script:
    - !reference [.import_functions]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.test_scripts, test_no_sso] # Get workload cluster kubeconfig
    - export KUBECONFIG="$WORKLOAD_CLUSTER_NAME-rancher.yaml"
    - .gitlab/ci/scripts/cronjob-test.sh
