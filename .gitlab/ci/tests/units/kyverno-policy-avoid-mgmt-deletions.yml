---
# This defines jobs to check that we can't delete
# key Sylva Flux and CAPI resources for the mgmt cluster

mgmt-avoid-mgmt-deletion-policies:
  extends:
    - .test-base-management-cluster
  script:
    - |-
      export KUBECONFIG=management-cluster-kubeconfig
      set -e

      function fail_if_delete_succeeds {
        kind=$1
        name=$2
        echo -e "\n====== Will attempt deletion of $kind $name... =======\n"

        echo "--- Check that the resource exists"
        kubectl get $kind $name -o name

        echo "--- Try to delete it..."
        set +e
        kubectl delete $kind $name
        if [[ $? -eq 0 ]]; then
          echo -e "--- Deletion of $kind $name should have been prevented, but succeeded !! :-(\n"
          exit 1
        else
          echo "--- Deletion of $kind $name *failed*, as expected"
        fi
        set -e
      }

      #get protected resources ks/hr based on label
      resources_ks=$(kubectl get kustomization -l=sylva-units/protected --no-headers -o custom-columns="NAME:.metadata.name")
      resources_hr=$(kubectl get helmrelease -l=sylva-units/protected --no-headers -o custom-columns="NAME:.metadata.name")
      for resources in ${resources_ks[@]}
      do
         fail_if_delete_succeeds Kustomization $resources
      done

      for resources in ${resources_hr[@]}
      do
        fail_if_delete_succeeds HelmRelease $resources
      done

      # find Cluster resource
      cluster_resource_name=$(kubectl get cluster.cluster.x-k8s.io -o custom-columns='CLUSTER:.metadata.name' --no-headers)
      if [[ -z $cluster_resource_name ]]; then
         echo "no Cluster resource found!"
         exit 1
      fi

      fail_if_delete_succeeds clusters.cluster.x-k8s.io $cluster_resource_name

      # identify control plane resource...
      cp_kind=$(kubectl get cluster.cluster.x-k8s.io $cluster_resource_name -o yaml | yq -r '.spec.controlPlaneRef | .kind + "." + (.apiVersion|sub("/.*",""))')
      cp_name=$(kubectl get cluster.cluster.x-k8s.io $cluster_resource_name -o yaml | yq -r '.spec.controlPlaneRef.name')

      # try to delete control plane
      fail_if_delete_succeeds $cp_kind $cp_name
  variables:
    DESCRIPTION: Ensure we can't delete key Sylva Flux and CAPI resources for the mgmt cluster.
