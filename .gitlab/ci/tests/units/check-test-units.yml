---
# This job checks the status of test units in various deployment stages.
.check-test-units-base:
  stage: deployment-test
  variables:
    NAMESPACE: sylva-system
  extends:
    - .test-tags
  script:
    - !reference [.import_functions]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - echo "Checking if all test-units have properly reconciled"
    - |
      if [[ -n $CHECK_WORKLOAD_CLUSTER ]]; then
        NAMESPACE=$ENV_NAME
      else
        NAMESPACE=sylva-system
      fi
      if kubectl --kubeconfig management-cluster-kubeconfig get -n $NAMESPACE Kustomization sylva-units-tests-status; then
        sylvactl watch \
        --kubeconfig management-cluster-kubeconfig \
        --timeout 2m \
        -n $NAMESPACE \
        Kustomization/$NAMESPACE/sylva-units-tests-status
      fi

mgmt-test-units:
  extends:
    - .check-test-units-base
    - .rules:need-management-cluster
  needs:
    - deploy-management-cluster

mgmt-update-test-units:
  extends:
    - .check-test-units-base
    - .rules:need-management-cluster-update
  needs:
    - update-management-cluster

wkld-test-units:
  variables:
    CHECK_WORKLOAD_CLUSTER: "true"
  extends:
    - .check-test-units-base
    - .rules:need-workload-cluster
  needs:
    - deploy-workload-cluster

wkld-update-test-units:
  variables:
    CHECK_WORKLOAD_CLUSTER: "true"
  extends:
    - .check-test-units-base
    - .rules:need-workload-cluster-update
  needs:
    - update-workload-cluster
