---
# This job tests cert-manager behavior

.test_cert_manager_scripts:
  self_signed:
    - |
      cat <<EOF>> test-resources-self-signed.yaml
      ---
      apiVersion: v1
      kind: Namespace
      metadata:
        name: cert-manager-test
      ---
      apiVersion: cert-manager.io/v1
      kind: Issuer
      metadata:
        name: test-selfsigned
        namespace: cert-manager-test
      spec:
        selfSigned: {}
      ---
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: selfsigned-cert
        namespace: cert-manager-test
      spec:
        dnsNames:
          - sylva
        secretName: selfsigned-cert-tls
        issuerRef:
          name: test-selfsigned
      EOF
    - cat test-resources-self-signed.yaml

  pki_signed:
    - |
      cat <<EOF>> test-resources-pki-signed.yaml
      ---
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: pki-signed-cert
        namespace: cert-manager-test
      spec:
        dnsNames:
          - pki
        secretName: pki-signed-cert-tls
        issuerRef:
          name: certificate-issuer
          kind: ClusterIssuer
      EOF
    - cat test-resources-pki-signed.yaml

  common_test_suite:
    - echo "Testing self signed certificates"
    - !reference [.test_cert_manager_scripts, self_signed]
    - kubectl apply -f test-resources-self-signed.yaml
    - kubectl wait --for=condition=Ready certificate/selfsigned-cert  -n cert-manager-test  --timeout=30s
    - echo "Testing pki signed certificates"
    - !reference [.test_cert_manager_scripts, pki_signed]
    - kubectl apply -f test-resources-pki-signed.yaml
    - kubectl wait --for=condition=Ready certificate/pki-signed-cert -n cert-manager-test  --timeout=30s

mgmt-cert-manager:
  extends:
    - .test-base-management-cluster
  script:
    - !reference [.test_cert_manager_scripts, common_test_suite]

wkld-cert-manager:
  extends:
    - .test-base-workload-cluster
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.test_cert_manager_scripts, common_test_suite]
