---
# Highlight "longhorn-instance-manager-cleanup" events

.verify-longhorn-cleanup-events:
  allow_failure: true
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - longhorn-cleanup-events-report.txt
  variables:
    REPORT_FILE: ${CI_PROJECT_DIR}/longhorn-cleanup-events-report.txt
  script:
    - echo "Longhorn Cleanup Events Check Started" > ${REPORT_FILE}
    - |
      if ! kubectl --kubeconfig ${KUBECONFIG} get namespace longhorn-system &>/dev/null; then
        echo "'longhorn-system' namespace not found. Skipping event check." | tee -a "${REPORT_FILE}"
        exit 0  # Exit successfully without running the event check
      fi
    - echo "Checking for 'longhorn-instance-manager-cleanup' events in Longhorn namespace..."
    - |
      echo "Longhorn Cleanup Events Report" > "${REPORT_FILE}"
      kubectl --kubeconfig ${KUBECONFIG} get events -n longhorn-system --field-selector reason=cleanup-instance-manager -o wide | tee -a "${REPORT_FILE}"

      if grep -q "cleanup-instance-manager" "${REPORT_FILE}"; then
        echo "Found 'longhorn-instance-manager-cleanup' events. Check the report for details." | tee -a "${REPORT_FILE}"
        exit 1  # Fail job if events are found
      else
        echo "No 'longhorn-instance-manager-cleanup' events found." | tee -a "${REPORT_FILE}"
      fi

# ==========================================
# Management Cluster: Verify longhorn instance manager cleanup events
# ==========================================
mgmt-verify-longhorn-cleanup-events:
  extends:
    - .test-base-management-cluster
    - .verify-longhorn-cleanup-events

# ==========================================
# Workload Cluster: Verify longhorn instance manager cleanup events
# ==========================================
wkld-verify-longhorn-cleanup-events:
  extends:
    - .test-base-workload-cluster
    - .verify-longhorn-cleanup-events
