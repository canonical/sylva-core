# This file defines the Kubernetes resources needed to run Chainsaw tests

# Namespace for Chainsaw tests
---
apiVersion: v1
kind: Namespace
metadata:
  name: chainsaw-test

---
# Service Account for Chainsaw
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chainsaw-test-runner
  namespace: chainsaw-test

---
# ClusterRole with least privilege for Chainsaw
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chainsaw-test-runner
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Impersonation of cert-manager-cainjector ServiceAccount to allow caBundle changes
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["impersonate"]
    resourceNames: ["cert-manager-cainjector"]
---
# Bind the ServiceAccount to the ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chainsaw-test-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chainsaw-test-runner
subjects:
  - kind: ServiceAccount
    name: chainsaw-test-runner
    namespace: chainsaw-test

---
# Job to run Chainsaw tests
apiVersion: batch/v1
kind: Job
metadata:
  name: run-chainsaw-tests
  namespace: chainsaw-test
  labels:
    tag-validating-policy.sylva.io: excluded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        tag-validating-policy.sylva.io: excluded
    spec:
      serviceAccountName: chainsaw-test-runner
      automountServiceAccountToken: true
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chainsaw
          image: ghcr.io/kyverno/chainsaw:v0.2.12
          # command: ["tree", "/tests"]
          command:
          - chainsaw
          args:
          - "test"
          - "/tests"
          - "--config"
          - "/tests/.chainsaw.yaml"
          # For JUnit output:
          # - "--report-format=JSON"
          # - "--report-name=chainsaw-report"
          # - "--report-path=/tmp/chainsaw-report" # Mount this path as an emptyDir or PVC if needed outside container
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            # Mount Chainsaw global config
            - name: chainsaw-config
              mountPath: /tests/.chainsaw.yaml
              subPath: .chainsaw.yaml
            # Mount directory for test reports
            - name: chainsaw-reports
              mountPath: /tmp/chainsaw-report
            # Mount each test suite's ConfigMap as a directory
            - name: test-suite-01-disallow-latest-tag
              mountPath: /tests/01-disallow-latest-tag
            - name: test-suite-02-disallow-default-namespace
              mountPath: /tests/02-disallow-default-namespace
            - name: test-suite-03-ensure-force-cluster-policy
              mountPath: /tests/03-ensure-force-cluster-policy
            - name: test-suite-04-deny-cabundle-changes
              mountPath: /tests/04-deny-cabundle-changes
      volumes:
        - name: chainsaw-config
          configMap:
            name: chainsaw-config
            defaultMode: 0444
        # Ephemeral storage for test reports
        - name: chainsaw-reports
          emptyDir: {}
        # Test suite ConfigMaps
        - name: test-suite-01-disallow-latest-tag
          configMap:
            name: chainsaw-01-disallow-latest-tag
            defaultMode: 0444
        - name: test-suite-02-disallow-default-namespace
          configMap:
            name: chainsaw-02-disallow-default-namespace
            defaultMode: 0444
        - name: test-suite-03-ensure-force-cluster-policy
          configMap:
            name: chainsaw-03-ensure-force-cluster-policy
            defaultMode: 0444
        - name: test-suite-04-deny-cabundle-changes
          configMap:
            name: chainsaw-04-deny-cabundle-changes
            defaultMode: 0444
