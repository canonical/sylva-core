---
# Update that modifies the caBundle
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tests.example.com
  annotations:
    cert-manager.io/inject-ca-from: "some-namespace/some-secret-CHANGED" # Changed annotation
spec:
  group: example.com
  names:
    kind: Test
    listKind: TestList
    plural: tests
    singular: test
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                field:
                  type: string
  # Webhook conversion configuration required to trigger the policy check
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        # we will try to modify caBundle
        caBundle:  # Same Cert as previous ALLOWED update
        service:
          name: test-webhook-service
          namespace: chainsaw-test
          path: /convert
          port: 443
      conversionReviewVersions: ["v1", "v1beta1"]
