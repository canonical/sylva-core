---
# Update that modifies the caBundle after annotation removal
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tests.example.com
  annotations:
    # Annotation cert-manager.io/inject-ca-from: is still MISSING
    another-annotation: "added"
spec:
  group: example.com
  names:
    kind: Test
    listKind: TestList
    plural: tests
    singular: test
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                field:
                  type: string
                anotherField:
                    type: integer
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        # modify caBundle again
        caBundle: 
        service:
          name: test-webhook-service
          namespace: chainsaw-test
          path: /convert
          port: 443
      conversionReviewVersions: ["v1", "v1beta1"]
