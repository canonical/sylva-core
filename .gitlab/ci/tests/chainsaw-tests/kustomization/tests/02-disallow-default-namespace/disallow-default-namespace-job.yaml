# Test Job manifest for verifying denial of Job creation in the 'default' namespace.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: test-default-ns-job
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: job-main-container
          image: scratch:v0.0.0
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      initContainers:
        - name: job-init-container
          image: scratch:v0.0.0
          resources:
            requests:
              cpu: "5m"
              memory: "8Mi"
            limits:
              cpu: "25m"
              memory: "32Mi"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
