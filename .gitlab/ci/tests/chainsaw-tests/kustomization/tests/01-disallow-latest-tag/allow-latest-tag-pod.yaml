apiVersion: v1
kind: Pod
metadata:
  name: allow-specific-tag
  namespace: chainsaw-test # Ensure this matches where your VAP Binding applies or use test namespace
spec:
  containers:
  - name: my-container
    image: busybox:1.36 # Specific tag
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
  initContainers:
    - name: init-container
      image: busybox:1.36 # Specific tag
      resources:
        requests:
          cpu: "5m"
          memory: "8Mi"
        limits:
          cpu: "25m"
          memory: "32Mi"
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
