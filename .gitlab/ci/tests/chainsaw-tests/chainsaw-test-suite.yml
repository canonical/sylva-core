---
# AdmissionPolicy Test Suite
#
# How to update and use:
# 1. To add a new policy test:
#    - Add a new YAML test case in .gitlab/ci/tests/admission-policies/test-cases/
#    - Update admission-policies-job-definitions.yml to include your new test case and step.
# 2. This job runs in CI and uses the test definitions from admission-policies-job-definitions.yml.
# 3. The 'script' section runs all defined policy tests; 'after_script' cleans up resources.
#
# See comments in admission-policies-job-definitions.yml for more details.

.policy-test-report:
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - policy-test-report.log

.tests:

  chainsaw_test_suite:
    # Apply all test resources using Kustomize
    - echo "Applying Chainsaw test resources..." | tee -a ${TEST_LOG}
    - kubectl apply -k kustomization/base | tee -a ${TEST_LOG}
    # Wait for Chainsaw Job to complete
    - echo "Waiting for Chainsaw test job to complete..." | tee -a ${TEST_LOG}
    - kubectl wait --for=condition=complete --timeout=600s job/run-chainsaw-tests -n chainsaw-test | tee -a ${TEST_LOG}
    # Get job logs
    - echo "Fetching Chainsaw test job logs..." | tee -a ${TEST_LOG}
    - kubectl logs job/run-chainsaw-tests -n chainsaw-test | tee -a ${TEST_LOG}

  chainsaw_test_cleanup:
    # Cleanup any leftover resources
    - echo "Cleaning up Chainsaw test resources..." | tee -a ${TEST_LOG}
    - kubectl delete -k kustomization/base --ignore-not-found=true | tee -a ${TEST_LOG}

mgmt-chainsaw-tests:
  extends:
    - .test-base-management-cluster
    - .policy-test-report
  script:
    - !reference [.tests, chainsaw_test_suite]
  after_script:
    - !reference [.tests, chainsaw_test_cleanup]
  variables:
    DESCRIPTION: Test Admission Policies unit.
    TEST_LOG: policy-test-report.log

wkld-chainsaw-tests:
  extends:
    - .test-base-workload-cluster
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.tests, chainsaw_test_suite]
  after_script:
    - !reference [.tests, chainsaw_test_cleanup]
  variables:
    DESCRIPTION: Test Admission Policies unit.
    TEST_LOG: policy-test-report.log