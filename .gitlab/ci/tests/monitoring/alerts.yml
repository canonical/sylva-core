---

# Retrieve alerts from Thanos


#### To be mutualized with login-tests

.test_scripts:
  edit_hosts_file:
    - domain=$(kubectl --kubeconfig management-cluster-kubeconfig get secret sylva-units-values -oyaml | yq '.data.values | @base64d' | yq '.cluster_domain')
    - |
      echo $domain
      if [[ $domain == "sylva" ]]; then
        echo "-- Get ingress saved into /etc/hosts"
        access_ip=$(kubectl --kubeconfig management-cluster-kubeconfig -n sylva-system get secrets/sylva-units-values -o jsonpath='{.data.values}' | base64 -d | yq -r .display_external_ip)
        for i in $(kubectl --kubeconfig management-cluster-kubeconfig get ingress -A -o custom-columns=:.spec.tls[].hosts[] | grep -v "<none>"); do
          echo $access_ip $i >> /etc/hosts
        done
      fi

mgmt-thanos-alert:
  stage: deployment-test
  extends:
    - .test-tags
    - .rules:need-management-cluster
  script:
    - pip install jtbl --break-system-packages
    - !reference [.import_functions]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - !reference [.test_scripts, edit_hosts_file]
    - |
      if [ ${thanos_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n thanos thanos-query -o jsonpath='{ .spec.tls[0].hosts[0] }' )} ]; then
         echo "Thanos URL - $thanos_url"
         thanos_token=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_password)
         thanos_user=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_user)
         unset https_proxy http_proxy
         echo "Checking if service is available"
         response_code=$(curl  --silent --output /dev/null --write-out "%{http_code}"  -k https://$thanos_url:443 -u $thanos_user:$thanos_token)
         if [[ "$response_code" -eq 200 ]]; then
            echo "Checking Thanos alerts"
            curl -k -s -G https://$thanos_url:443/api/v1/query -u $thanos_user:$thanos_token \
            --data-urlencode "$ALERT_QUERY" | yq -r .data.result[].metric | jtbl -H > ${CI_PROJECT_DIR}/thanos-alert.html
            critical_alerts=$(curl -k -s -G https://$thanos_url:443/api/v1/query -u $thanos_user:$thanos_token \
            --data-urlencode "$ALERT_QUERY" | yq -r '.data.result[] | select(.metric.severity=="critical")' | wc -l)
            if [ $critical_alerts -gt 0 ] ; then
              echo "Critical alerts found:"
              curl -k -s -G https://$thanos_url:443/api/v1/query -u $thanos_user:$thanos_token \
              --data-urlencode "$ALERT_QUERY" | yq -r '.data.result[] | select(.metric.severity=="critical") | { "alertname": .metric.alertname, "cluster": .metric.cluster, "namespace": .metric.namespace,  "pod": .metric.pod }'
              exit 1
            fi
         else
           echo "Thanos-query service does not respond"
           exit 1
         fi
      else
        echo "Thanos unit is not enabled - SKIPPING"
      fi
  variables:
    ALERT_QUERY: "query=ALERTS{alertstate=\"firing\"}"
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - thanos-alert.html

