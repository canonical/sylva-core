---

.capm3-virt-kubeconfig:
  - |
    if [[ ${ENV_NAME} == *'capm3-virt'* ]]; then
      yq -i e '.clusters[].cluster.insecure-skip-tls-verify = true' $WORKLOAD_CLUSTER_NAME-rancher.yaml
      yq -i e 'del(.clusters[].cluster.certificate-authority-data)' $WORKLOAD_CLUSTER_NAME-rancher.yaml
    fi

.test_scripts:
  edit_hosts_file:
    - domain=$(kubectl --kubeconfig management-cluster-kubeconfig get secret sylva-units-values -oyaml | yq '.data.values | @base64d' | yq '.cluster_domain')
    - |
      echo $domain
      if [[ $domain == "sylva" ]]; then
        echo "-- Get ingress saved into /etc/hosts"
        access_ip=$(kubectl --kubeconfig management-cluster-kubeconfig -n sylva-system get secrets/sylva-units-values -o jsonpath='{.data.values}' | base64 -d | yq -r .display_external_ip)
        for i in $(kubectl --kubeconfig management-cluster-kubeconfig get ingress -A -o custom-columns=:.spec.tls[].hosts[] | grep -v "<none>"); do
          echo $access_ip $i >> /etc/hosts
        done
      fi
  get_ui_ingresses_url:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:gitlab_ci_get_ui_ingresses_url[collapsed=true]\r\e[0KGet ui urls from ingresses\e[0m"
    - export flux_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n flux-system flux-webui-weave-gitops -o jsonpath='{ .spec.tls[].hosts[] }')
    - export vault_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n vault vault -o jsonpath='{ .spec.tls[].hosts[] }')
    - export rancher_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n cattle-system rancher -o jsonpath='{ .spec.tls[].hosts[] }')
    - export harbor_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n harbor harbor-ingress -o jsonpath='{ .spec.tls[].hosts[] }')
    - export grafana_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n cattle-monitoring-system grafana-sylva-ingress -o jsonpath='{ .spec.tls[].hosts[] }')
    - export neuvector_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n neuvector neuvector-webui-ingress  -o jsonpath='{ .spec.tls[].hosts[] }')
    - export gitea_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n gitea gitea -o jsonpath='{ .spec.tls[].hosts[] }')
    - export thanos_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n thanos thanos-query-frontend -o jsonpath='{ .spec.tls[].hosts[] }')
    - echo -e "\e[0Ksection_end:`date +%s`:gitlab_ci_get_ui_ingresses_url\r\e[0K"
  get_sso_login_and_password:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:gitlab_ci_get_sso_login_and_password[collapsed=true]\r\e[0KGet sso login and password\e[0m"
    - export USER_SSO=$(kubectl --kubeconfig ./management-cluster-kubeconfig -n keycloak get secrets/credential-sylva-sylva-admin-keycloak -o jsonpath='{.data.username}'| base64 -d)
    - export PASSWORD_SSO=$(kubectl --kubeconfig ./management-cluster-kubeconfig -n keycloak get secrets/credential-sylva-sylva-admin-keycloak -o jsonpath='{.data.password}'| base64 -d)
    - echo -e "\e[0Ksection_end:`date +%s`:gitlab_ci_get_sso_login_and_password\r\e[0K"
  get_thanos_login_and_password:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:gitlab_ci_get_thanos_login_and_password[collapsed=true]\r\e[0KGet thanos user and password\e[0m"
    - export thanos_user=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_user)
    - export thanos_password=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_password)
    - echo -e "\e[0Ksection_end:`date +%s`:gitlab_ci_get_thanos_login_and_password\r\e[0K"
  get_grafana_login_and_password:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:gitlab_ci_get_grafana_login_and_password[collapsed=true]\r\e[0KGet grafana user and password\e[0m"
    - export grafana_user="admin"
    - export grafana_password=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.grafana_admin_password)
    - echo -e "\e[0Ksection_end:`date +%s`:gitlab_ci_get_grafana_login_and_password\r\e[0K"
  get_kepler_unit_enabled:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:get_kepler_unit_enabled[collapsed=true]\r\e[0KGet Kepler unit status\e[0m"
    - export kepler_unit_enabled=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq .units.kepler.enabled)
    - echo -e "\e[0Ksection_end:`date +%s`:get_kepler_unit_enabled\r\e[0K"
wkld-sso-kubeconfig:
  extends:
    - .test-base-workload-cluster
  image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/ci-image/ci-playwright-image:v1.1.3
  variables:
    SCREENSHOTS: ${CI_PROJECT_DIR}/screenshots
    DESCRIPTION: Obtain the workload-cluster-kubeconfig through the Rancher UI and use it to create a pod.
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - $SCREENSHOTS
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.test_scripts, get_ui_ingresses_url]
    - !reference [.test_scripts, get_sso_login_and_password]
    - pytest ./tools/login-test/test_download_workload_kubeconfig.py --browser firefox -v --tb=short
    # For capm3 job we need to modify the $WORKLOAD_CLUSTER_NAME-rancher.yaml to remove the certificate and use an insecure option
    - !reference [.capm3-virt-kubeconfig]
    - echo "-- Testing workload cluster. Job started at '$CI_JOB_STARTED_AT'."
    # the $WORKLOAD_CLUSTER_NAME-rancher.yaml file below is the kubeconfig previously downloaded from Rancher server through Playwright
    - |
      attempts=0; max_attempts=5
      until kubectl run test-sso --image=registry.k8s.io/pause:3.9 --kubeconfig $WORKLOAD_CLUSTER_NAME-rancher.yaml --overrides='{"apiVersion": "v1","spec": {"containers": [{"name": "test","image": "registry.k8s.io/pause:3.9","securityContext": {"allowPrivilegeEscalation": false,"capabilities": {"drop": ["ALL"]},"runAsNonRoot": true,"runAsGroup": 1000,"runAsUser": 1000,"seccompProfile": {"type": "RuntimeDefault"}}}]}}'; do
        sleep 3
        ((attempts++)) && ((attempts==max_attempts)) && exit -1
      done
    - echo "-- Wait for test-sso pod to be created"
    - kubectl wait --for=condition=Ready pod/test-sso --kubeconfig $WORKLOAD_CLUSTER_NAME-rancher.yaml --timeout=60s
    - echo "-- All done"

mgmt-GUIs-test:
  extends:
    - .test-base-management-cluster
  image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/ci-image/ci-playwright-image:v1.1.3
  variables:
    SCREENSHOTS: ${CI_PROJECT_DIR}/screenshots
    DESCRIPTION: Test basic authentication login against the GUI.
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - $SCREENSHOTS
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.test_scripts, get_ui_ingresses_url]
    - !reference [.test_scripts, get_thanos_login_and_password]
    - !reference [.test_scripts, get_grafana_login_and_password]
    - !reference [.test_scripts, get_kepler_unit_enabled]
    - pytest ./tools/login-test/test_ui_playwright.py --browser firefox -v --tb=short

mgmt-sso:
  retry:
    max: 2
  extends:
    - .test-base-management-cluster
  image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/ci-image/ci-playwright-image:v1.1.3
  variables:
    SCREENSHOTS: ${CI_PROJECT_DIR}/screenshots
    DESCRIPTION: Test Single Sign-On login against the GUI.
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - $SCREENSHOTS
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - !reference [.test_scripts, get_ui_ingresses_url]
    - !reference [.test_scripts, get_sso_login_and_password]
    - !reference [.test_scripts, get_kepler_unit_enabled]
    - pytest ./tools/login-test/test_sso_playwright.py --browser firefox -v --tb=short

wkld-no-sso-kubeconfig:
  extends:
    - .test-base-workload-cluster
  script:
    - unset https_proxy http_proxy
    - !reference [.test_scripts, edit_hosts_file]
    - echo "-- Testing workload cluster. Job started at '$CI_JOB_STARTED_AT'."
    # the $WORKLOAD_CLUSTER_NAME-rancher.yaml file below is the kubeconfig previously downloaded from Rancher server through Rancher API
    - |
      attempts=0; max_attempts=5
      until kubectl run test-no-sso --image=registry.k8s.io/pause:3.9 --kubeconfig workload-cluster-kubeconfig --overrides='{"apiVersion": "v1","spec": {"containers": [{"name": "test","image": "registry.k8s.io/pause:3.9","securityContext": {"allowPrivilegeEscalation": false,"capabilities": {"drop": ["ALL"]},"runAsNonRoot": true,"runAsGroup": 1000,"runAsUser": 1000,"seccompProfile": {"type": "RuntimeDefault"}}}]}}'; do
        sleep 3
        ((attempts++)) && ((attempts==max_attempts)) && exit -1
      done
    - echo "-- Wait for test-no-sso pod to be created"
    - kubectl wait --for=condition=Ready pod/test-no-sso --kubeconfig workload-cluster-kubeconfig --timeout=60s
    - echo "-- All done"
  variables:
    DESCRIPTION: Obtain the workload-cluster-kubeconfig through the Rancher API and use it to create a pod.

mgmt-login:
  extends:
    - .test-base-management-cluster
  variables:
    HURL_JUNIT_REPORT: ${CI_PROJECT_DIR}/login_junit_report.xml
    DESCRIPTION: Run Hurl Login Tests.
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - $HURL_JUNIT_REPORT
      - index.html
      - store/
    reports:
      junit:
        - $HURL_JUNIT_REPORT
  script:
    - !reference [.test_scripts, edit_hosts_file]
    - export HURL_token=$(kubectl --kubeconfig management-cluster-kubeconfig -n vault get secrets/vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)
    - export HURL_password_grafana=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.grafana_admin_password)
    - export HURL_domain=$(kubectl --kubeconfig management-cluster-kubeconfig get secret sylva-units-values -oyaml | yq '.data.values | @base64d' | yq '.cluster_domain')
    - export HURL_flux_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n flux-system flux-webui-weave-gitops -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_vault_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n vault vault -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_rancher_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n cattle-system rancher -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_keycloak_url=$(kubectl --kubeconfig management-cluster-kubeconfig  get ingress -n keycloak keycloak-ingress -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_harbor_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n harbor harbor-ingress -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_neuvector_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n neuvector neuvector-webui-ingress  -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_gitea_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n gitea gitea -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_password_thanos=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_password)
    - export HURL_user_thanos=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.thanos_user)
    - export HURL_password_kubevirt=$(kubectl --kubeconfig management-cluster-kubeconfig get secrets sylva-units-values -o yaml | yq .data.values | base64 -d | yq ._internal.kubevirt_admin_password)
    - export HURL_kubevirt_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n kubevirt-manager kubevirt-manager -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_minio_logging_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n minio-logging logging -o jsonpath='{ .spec.tls[].hosts[] }')
    - |
      if [ -n "${HURL_minio_logging_url}" ]; then
          export HURL_minio_logging_console_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n minio-logging logging-console -o jsonpath='{ .spec.tls[].hosts[] }');
      fi
    - export HURL_minio_monitoring_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n minio-monitoring monitoring -o jsonpath='{ .spec.tls[].hosts[] }')
    - |
      if [ -n "${HURL_minio_monitoring_url}" ]; then
          export HURL_minio_monitoring_console_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n minio-monitoring monitoring-console -o jsonpath='{ .spec.tls[].hosts[] }');
      fi
    - |
      if [ -n "${HURL_neuvector_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/neuvector-admin.hurl
      fi
    - |
      if [ -n "${HURL_harbor_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/harbor-admin.hurl
      fi
    - |
      if [ -n "${HURL_gitea_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/gitea-admin.hurl
      fi
    - |
      if [ -n "${HURL_kubevirt_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/kubevirt-admin.hurl
      fi
    - |
      if [ -n "${HURL_minio_logging_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/minio-logging.hurl
      fi
    - |
      if [ -n "${HURL_minio_monitoring_url}" ]; then
          sleep 2;
      else
          rm -rf  ./tools/login-test/minio-monitoring.hurl
      fi
    - hurl -k ./tools/login-test/*.hurl --test --color --noproxy=".$HURL_domain"  --report-junit $HURL_JUNIT_REPORT --report-html ${CI_PROJECT_DIR}

wkld-login:
  extends:
    - .test-base-workload-cluster
  variables:
    HURL_JUNIT_REPORT: ${CI_PROJECT_DIR}/login_junit_report.xml
    DESCRIPTION: Run Hurl Login Tests.
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - $HURL_JUNIT_REPORT
      - index.html
      - store/
    reports:
      junit:
        - $HURL_JUNIT_REPORT
  script:
    - !reference [.test_scripts, edit_hosts_file]
    - export HURL_token=$(kubectl --kubeconfig management-cluster-kubeconfig -n vault get secrets/vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)
    - export HURL_vault_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n vault vault -o jsonpath='{ .spec.tls[].hosts[] }')
    - export HURL_rancher_url=$(kubectl --kubeconfig management-cluster-kubeconfig get ingress -n cattle-system rancher -o jsonpath='{ .spec.tls[].hosts[] }')
    - hurl -k ./tools/login-test/login-workload/*.hurl --test --color --noproxy=".$domain"  --report-junit $HURL_JUNIT_REPORT --report-html ${CI_PROJECT_DIR}
