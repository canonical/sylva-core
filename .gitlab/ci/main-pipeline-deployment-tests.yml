---
# ==========================================
# Deploy stage
# ==========================================

include:
  - local: .gitlab/ci/templates-deployments.yml

variables:
  CAPO_PLATFORM_TAG: capo-infra-rocket
  PRIVATE_RUNNER_CONTEXT: rocket
  # if a deploy job sets this to "even" (resp. "odd"), the job will automatically trigger
  # for any MR having an even MR number and the run-e2e-tests label
  E2E_JOB_MR_PARITY: any
  ENV_TAG: "${CI_PIPELINE_ID}-${ENV_NAME}"
  ENV_TAG_OCI: "${CI_PIPELINE_ID}-${ENV_NAME}-oci"
  KIND_CLUSTER_NAME: bootstrap-${ENV_TAG}
  MANAGEMENT_CLUSTER_NAME: mgmt-${ENV_TAG}
  WORKLOAD_CLUSTER_NAME: wc-${ENV_TAG}
  MGMT_ADDITIONAL_VALUES:
    value: ""
    description: |
      Path to a file for customizing the values used
      during all management cluster stages
  WC_ADDITIONAL_VALUES:
    value: ""
    description: |
      Path to a file for customizing the values used
      during all workload cluster stages
  # Used for cross repo pipelines
  REMOTE_VALUES: ""
  # Management cluster relative variables
  # Timeout configuration
  APPLY_WATCH_TIMEOUT_MIN:
    value: "20"
    description: "apply.sh timeout"
  MGMT_WATCH_TIMEOUT_MIN:
    value: "45"
    description: "bootstrap.sh timeout"
  BOOTSTRAP_WATCH_TIMEOUT_MIN:
    value: "45"
    description: "bootstrap.sh timeout for bootstrap cluster"
  # Customize values files
  MGMT_INITIAL_ADDITIONAL_VALUES:
    value: ""
    description: |
      Path to a file for customizing the values used
      during the management cluster deployment stage
  MGMT_UPDATE_ADDITIONAL_VALUES:
    value: "${SYLVA_CI_VALUES_FOLDER}/ci-enabled-units.yml"
    description: |
      Path to a file for customizing the values used
      during the management cluster update stage
  MGMT_INITIAL_REVISION:
    value: ""
    description: |
      Git revision used for the management cluster deployment
  MGMT_UPDATE_REVISION:
    value: ""
    description: |
      Git revision used for the management cluster update"
  # Workload cluster relative variables
  APPLY_WC_WATCH_TIMEOUT_MIN:
    value: "30"
    description: "apply-workload-cluster.sh timeout"
  # Customize values files
  WC_INITIAL_ADDITIONAL_VALUES:
    value: ""
    description: |
      Path to a file for customizing the values used
      during the workload cluster deployment stage
  WC_UPDATE_ADDITIONAL_VALUES:
    value: "${SYLVA_CI_VALUES_FOLDER}/ci-enabled-units.yml"
    description: |
      Path to a file for customizing the values used
      during the workload cluster update stage
  WC_INITIAL_REVISION:
    value: ""
    description: |
      Git revision used for the workload cluster deployment
  WC_UPDATE_REVISION:
    value: ""
    description: |
      Git revision used for the workload cluster update"
  DEPLOYMENT_FLAVOR:
    value: ""
    description: |
      Use for web or scheduled pipelines to select which deployments to run
      it can be the exact name of a job like "capd-kubeadm-ubuntu"
      or it can be a regex matching some deployment job. In this case
      the value need to be enclose with / like this
      "/capo-kubeadm/"
  # Repo used to store CI values
  SYLVA_CI_VALUES_REPO: https://gitlab.com/sylva-projects/sylva-elements/ci-tooling/ci-deployment-values.git
  SYLVA_CI_VALUES_FOLDER: environment-values/sylva-core-ci-values
  # Reference to checkout for CI values, by default we use the same for all stages but it can be overriden
  # eg: if we have a breaking change during an upgrade we could use a different branch for the deployment and update
  CI_VALUES_REVISION: 0.3.1
  MGMT_INITIAL_CI_VALUES_REVISION: ${CI_VALUES_REVISION}
  MGMT_UPDATE_CI_VALUES_REVISION: ${MGMT_INITIAL_CI_VALUES_REVISION}
  WC_INITIAL_CI_VALUES_REVISION: ${CI_VALUES_REVISION}
  WC_UPDATE_CI_VALUES_REVISION: ${CI_VALUES_REVISION}


.deployment_rules:
  - if: '$CI_COMMIT_TAG'
  - if: $CI_PIPELINE_SOURCE == 'pipeline' && $OCI_TAG == null && $CI_JOB_NAME =~ $DEPLOYMENT_FLAVOR
  - if: $CI_PIPELINE_SOURCE == 'pipeline' && $OCI_TAG == null
    allow_failure: true
    when: manual
  - if: '$CI_PIPELINE_SOURCE == "web" && $CI_JOB_NAME =~ $DEPLOYMENT_FLAVOR'
  - if: '$CI_PIPELINE_SOURCE == "web"'
    allow_failure: true
    when: manual
  # Scheduled pipelines are trigerring rolling updates and test k8s version upgrade for the workload cluster
  # For capd scheduled pipelines we don't want to test rolling updates
  # As it's not supported for single node deployments
  - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_DEPLOYMENTS && $CI_JOB_NAME =~ $DEPLOYMENT_FLAVOR && $CI_JOB_NAME =~ /capd.*/'
  # override to test rolling updates in scheduled pipelines
  - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_DEPLOYMENTS && $CI_JOB_NAME =~ $DEPLOYMENT_FLAVOR'
    variables:
      MGMT_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml ${SYLVA_CI_VALUES_FOLDER}/serve-k8s-1.27-image.yml
      MGMT_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/dummy-rolling-update-trigger.yml ${SYLVA_CI_VALUES_FOLDER}/serve-k8s-1.27-image.yml
      MGMT_WATCH_TIMEOUT_MIN: 45
      APPLY_WATCH_TIMEOUT_MIN: 80
      APPLY_WC_WATCH_TIMEOUT_MIN: 80
      WC_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/k8s-1.27.yml
      WC_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/k8s-1.28.yml
  # For capd MR pipelines we don't want to test rolling updates in MR flagged with ci-feature::test-rolling-update
  # For capd MR pipelines we don't want to test 1.1.1 to main upgrades in MR flagged with ci-feature::test-upgrade-from-1.1.1
  # As it's not supported for single node deployments
  - if: $CI_MERGE_REQUEST_LABELS =~ /ci-feature::test-rolling-update|ci-feature::test-upgrade-from-1.1.1|ci-feature::mgmt-rolling-update/ && $CI_JOB_NAME =~ /capd.*/
    allow_failure: true
    when: manual
  # override to test rolling updates in MR flagged with ci-feature::test-rolling-update
  - if: $CI_MERGE_REQUEST_LABELS =~ /ci-feature::test-rolling-update/
    variables:
      EXTRA_DESCRIPTION: "\\e[1;31m \\u26A0 This pipeline was triggered with label ci-feature::test-rolling-update \n  pipeline will perform a rolling update *with k8s upgrade* instead of a dummy rolling update \\e[0m"
      MGMT_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml ${SYLVA_CI_VALUES_FOLDER}/serve-k8s-1.27-image.yml
      MGMT_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/dummy-rolling-update-trigger.yml ${SYLVA_CI_VALUES_FOLDER}/serve-k8s-1.27-image.yml
      MGMT_WATCH_TIMEOUT_MIN: 45
      APPLY_WATCH_TIMEOUT_MIN: 80
      APPLY_WC_WATCH_TIMEOUT_MIN: 80
      WC_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/k8s-1.27.yml
      WC_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/k8s-1.28.yml
    allow_failure: true
    when: manual
  # override to test dev branch to main upgrade in MR flagged with ci-feature::mgmt-rolling-upgrade
  - if: $CI_MERGE_REQUEST_LABELS =~ /ci-feature::mgmt-rolling-update/
    variables:
      EXTRA_DESCRIPTION: "\\e[1;31m \\u26A0 This pipeline was triggered with label ci-feature::mgmt-rolling-update \n  pipeline will perform a rolling upgrade for only mgmt cluster \\e[0m"
      DEPLOY_MGMT_CLUSTER: "true"
      UPDATE_MGMT_CLUSTER: "true"
      DEPLOY_WORKLOAD_CLUSTER: "false"
      MGMT_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml
      MGMT_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/dummy-rolling-update-trigger.yml
      MGMT_WATCH_TIMEOUT_MIN: 45
      APPLY_WATCH_TIMEOUT_MIN: 80
    allow_failure: true
    when: manual
  # override to test dev branch to main upgrade in MR flagged with ci-feature::test-upgrade-from-1.1.1
  - if: $CI_MERGE_REQUEST_LABELS =~ /ci-feature::test-upgrade-from-1.1.1/
    variables:
      EXTRA_DESCRIPTION: "\\e[1;31m \\u26A0 This pipeline was triggered with label ci-feature::test-upgrade-from-1.1.1 \n  pipeline will test upgrade from 1.1.1 version \\e[0m"
      # Need to be HA in case of rolling update triggered by the upgrade
      MGMT_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml
      # libvirt-metal-no-bond.yaml file is added to updates values as a temporary fix for capm3 upgrades from 1.1.1,
      # it can be removed after next release, see https://gitlab.com/sylva-projects/sylva-core/-/issues/1581
      MGMT_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml ${SYLVA_CI_VALUES_FOLDER}/libvirt-metal-no-bond.yaml
      WC_INITIAL_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml
      WC_UPDATE_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/control-plane-replicas-3.yml ${SYLVA_CI_VALUES_FOLDER}/libvirt-metal-no-bond.yaml
      # Set initial revision to 1.1.1
      MGMT_INITIAL_REVISION: 1.1.1-ci-tweaks
      WC_INITIAL_REVISION: 1.1.1-ci-tweaks
      # Use 1.1.1 CI values
      MGMT_INITIAL_CI_VALUES_REVISION: stable/1.1.1
      MGMT_UPDATE_CI_VALUES_REVISION: ${CI_VALUES_REVISION}
      WC_INITIAL_CI_VALUES_REVISION: stable/1.1.1
      WC_UPDATE_CI_VALUES_REVISION: ${CI_VALUES_REVISION}
      # Increase default timers due to rolling update
      MGMT_WATCH_TIMEOUT_MIN: 45
      APPLY_WATCH_TIMEOUT_MIN: 80
      APPLY_WC_WATCH_TIMEOUT_MIN: 80
    allow_failure: true
    when: manual
  - if: $CI_MERGE_REQUEST_LABELS =~ /renovate/ && $CAPO_TAG
    allow_failure: true
    when: manual
  - if: $CI_MERGE_REQUEST_LABELS =~ /run-e2e-tests/ && ($E2E_JOB_MR_PARITY == "any" || ($E2E_JOB_MR_PARITY == "even" && $CI_OPEN_MERGE_REQUESTS =~ /[02468]$/) || ($E2E_JOB_MR_PARITY == "odd" && $CI_OPEN_MERGE_REQUESTS =~ /[13579]$/))
    allow_failure: true
  - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    allow_failure: true
    when: manual

.default-trigger:
  stage: deploy
  rules: !reference [".deployment_rules"]
  trigger:
    forward:
      pipeline_variables: true  # required to pass variables from upstream to downstream pipelines
  variables:
    # Used to pass parent JOB_NAME to the child pipelines
    WORKFLOW_NAME: $CI_JOB_NAME
  needs: []

.needs-publish-jobs:
  - job: push-helm-artifacts
  - job: publish-kustomize-units-artifact
  - job: publish-sylva-units-artifact

.default-trigger-oci:
  extends: .default-trigger
  variables:
    OCI_TAG: $OCI_TAG_FORMAT
    KIND_CLUSTER_NAME: bootstrap-${ENV_TAG_OCI}
    MANAGEMENT_CLUSTER_NAME: mgmt-${ENV_TAG_OCI}
    WORKLOAD_CLUSTER_NAME: wc-${ENV_TAG_OCI}
  needs: !reference [.needs-publish-jobs]

capd-preview-deploy:
  extends: .default-trigger
  variables:
    CAPD_RUNNER_TAG: gitlab-org-docker
    ENV_NAME: kubeadm-capd
    DEPLOY_MGMT_CLUSTER: "true"
    UPDATE_MGMT_CLUSTER: "false"
    DEPLOY_WORKLOAD_CLUSTER: "false"
    SKIP_TESTS: "true"
  trigger:
    include: .gitlab/ci/pipeline-deploy-capd-preview.yml
    strategy: depend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - preview.sh
        - tools/shell-lib/common.sh
        - .gitlab/ci/pipeline-deploy-capd-preview.yml

capd-preview-oci-deploy:
  extends: [capd-preview-deploy]
  variables:
    OCI_TAG: $OCI_TAG_FORMAT
  needs: !reference [.needs-publish-jobs]

capd-kubeadm-ubuntu:
  extends: .default-trigger
  variables:
    CAPD_RUNNER_TAG: saas-linux-medium-amd64
    E2E_JOB_MR_PARITY: even
    ENV_NAME: kubeadm-capd
    UPDATE_MGMT_CLUSTER: "false"
    DEPLOY_WORKLOAD_CLUSTER: "false"
    SKIP_TESTS: "true"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/lightweight-disable-some-units.yml
  trigger:
    include: .gitlab/ci/pipeline-deploy-capd.yml
    strategy: depend

capd-rke2-ubuntu:
  extends: .default-trigger
  variables:
    CAPD_RUNNER_TAG: saas-linux-medium-amd64
    E2E_JOB_MR_PARITY: even
    ENV_NAME: rke2-capd
    UPDATE_MGMT_CLUSTER: "false"
    DEPLOY_WORKLOAD_CLUSTER: "false"
    SKIP_TESTS: "true"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/lightweight-disable-some-units.yml
  trigger:
    include: .gitlab/ci/pipeline-deploy-capd.yml
    strategy: depend

capd-kubeadm-oci-ubuntu:
  extends: .default-trigger-oci
  variables:
    CAPD_RUNNER_TAG: saas-linux-medium-amd64
    E2E_JOB_MR_PARITY: odd
    ENV_NAME: kubeadm-capd
    UPDATE_MGMT_CLUSTER: "false"
    DEPLOY_WORKLOAD_CLUSTER: "false"
    SKIP_TESTS: "true"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/lightweight-disable-some-units.yml
  trigger:
    include: .gitlab/ci/pipeline-deploy-capd.yml
    strategy: depend

capd-rke2-oci-ubuntu:
  extends: .default-trigger-oci
  variables:
    CAPD_RUNNER_TAG: saas-linux-medium-amd64
    E2E_JOB_MR_PARITY: odd
    ENV_NAME: rke2-capd
    UPDATE_MGMT_CLUSTER: "false"
    DEPLOY_WORKLOAD_CLUSTER: "false"
    SKIP_TESTS: "true"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/lightweight-disable-some-units.yml
  trigger:
    include: .gitlab/ci/pipeline-deploy-capd.yml
    strategy: depend

capo-kubeadm-ubuntu:
  extends: .default-trigger
  variables:
    CAPO_TAG: $ENV_TAG
    E2E_JOB_MR_PARITY: even
    ENV_NAME: kubeadm-capo
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-kubeadm-oci-ubuntu:
  extends: .default-trigger-oci
  variables:
    CAPO_TAG: $ENV_TAG_OCI
    E2E_JOB_MR_PARITY: odd
    ENV_NAME: kubeadm-capo
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-rke2-ubuntu:
  extends: .default-trigger
  variables:
    CAPO_TAG: $ENV_TAG
    E2E_JOB_MR_PARITY: odd
    ENV_NAME: rke2-capo
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-rke2-oci-ubuntu:
  extends: .default-trigger-oci
  variables:
    CAPO_TAG: $ENV_TAG_OCI
    E2E_JOB_MR_PARITY: even
    ENV_NAME: rke2-capo
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-misc-rke2-units-ubuntu:
  extends: .default-trigger-oci
  stage: deploy
  variables:
    ENV_NAME: rke2-capo
    CAPO_TAG: "${ENV_TAG_OCI}-misc"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/misc-units-in-capo.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/misc-units-in-capo-wkld.yml
    MGMT_WATCH_TIMEOUT_MIN: 45
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-fip-kubeadm-oci-ubuntu:
  extends: .default-trigger-oci
  variables:
    ENV_NAME: kubeadm-capo
    CAPO_TAG: "${ENV_TAG_OCI}-fip"
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/capo-fip.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/capo-fip.yml
    MGMT_WATCH_TIMEOUT_MIN: 22
    E2E_JOB_MR_PARITY: none
  trigger:
    include: .gitlab/ci/pipeline-deploy-capo.yml
    strategy: depend

capo-rke2-suse:
  extends: capo-rke2-ubuntu
  variables:
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml

capo-rke2-oci-suse:
  extends: capo-rke2-oci-ubuntu
  variables:
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml

.capm3-virt-equinix:
  extends: .default-trigger
  variables:
    DOCKER_HOST: ""
    MGMT_WATCH_TIMEOUT_MIN: 35
    APPLY_WATCH_TIMEOUT_MIN: 80
    APPLY_WC_WATCH_TIMEOUT_MIN: 80
    RUNNER_PLAN: m3.large.x86
  trigger:
    include: .gitlab/ci/pipeline-deploy-capm3-virt-equinix.yml
    strategy: depend

.rke2-capm3-virt-equinix:
  extends: .capm3-virt-equinix
  variables:
    ENV_NAME: rke2-capm3-virt

.kubeadm-capm3-virt-equinix:
  extends: .capm3-virt-equinix
  variables:
    ENV_NAME: kubeadm-capm3-virt

capm3-ha-rke2-virt-ubuntu:
  extends: .rke2-capm3-virt-equinix

capm3-ha-kubeadm-virt-ubuntu:
  extends: .kubeadm-capm3-virt-equinix

capm3-misc-rke2-virt-ubuntu:
  extends: .rke2-capm3-virt-equinix
  variables:
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/misc-units-in-capm3.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/misc-units-in-capm3.yml

capm3-ha-rke2-virt-suse:
  extends: .rke2-capm3-virt-equinix
  variables:
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml

capm3-ha-kubeadm-virt-suse:
  extends: .kubeadm-capm3-virt-equinix
  variables:
    MGMT_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml
    WC_ADDITIONAL_VALUES: ${SYLVA_CI_VALUES_FOLDER}/suse-os.yml
