---
# ==========================================
# Generate deployment jobs
# ==========================================

.deploy_rules:
  rules:
    - if: $NO_DEPLOYMENTS
      when: never
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_DEPLOYMENTS'
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_DEPLOYMENTS == null'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

prepare_deployment_jobs:
  stage: deploy
  extends: .deploy_rules
  needs: []
  script:
    - ./.gitlab/ci/scripts/generate_deployment_jobs.py > deployments.yml
  artifacts:
    paths:
      - deployments.yml

deployment_jobs:
  stage: deploy
  extends: .deploy_rules
  needs: [prepare_deployment_jobs]
  trigger:
    include:
      - artifact: deployments.yml
        job: prepare_deployment_jobs
    forward:
      pipeline_variables: true  # required to pass variables from upstream to downstream pipelines
    strategy: depend
