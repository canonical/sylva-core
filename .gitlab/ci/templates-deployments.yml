---
# =============================
# Templates for deployments
# =============================

include:
  - local: .gitlab/ci/common.yml


.function_change_git_revision:
  # Function to change the git revision used during the deployment
  - |
    function change_git_revision() {
      echo "GIT_REVISION: $GIT_REVISION"
        if git ls-remote --exit-code --tags https://gitlab.com/sylva-projects/sylva-core.git "${GIT_REVISION}" > /dev/null; then
          echo "Provided GIT_REVISION: $GIT_REVISION is a known upstream tag. Using it as it"
          git fetch origin tag ${GIT_REVISION}
          if [ -n "${OCI_TAG}" ] ; then
            OCI_TAG=${GIT_REVISION}
          fi
        elif git ls-remote --exit-code --heads https://gitlab.com/sylva-projects/sylva-core.git "${GIT_REVISION}" > /dev/null; then
          echo "Provided GIT_REVISION: $GIT_REVISION is a known upstream branch. It will be used as reference for fetching sylva-core code"
          GIT_REVISION=$(git ls-remote --exit-code --heads https://gitlab.com/sylva-projects/sylva-core.git "${GIT_REVISION}" | cut -f 1)
          SHORT_ID=$(echo $GIT_REVISION | head -c 8)
          if [ -n "${OCI_TAG}" ] ; then
            OCI_TAG=0.0.0-git-$SHORT_ID
          fi
        else
          echo "Provided GIT_REVISION: $GIT_REVISION, will try to use it as a commit id"
          SHORT_ID=$(echo $GIT_REVISION | head -c 8)
          if [ -n "${OCI_TAG}" ] ; then
            OCI_TAG=0.0.0-git-$SHORT_ID
          fi
        fi
      if [ -n "${OCI_TAG}" ] ; then
        echo "Sylva-units chart will use: $OCI_TAG reference"
        echo "Checking if oci://registry.gitlab.com/sylva-projects/sylva-core/sylva-units:$OCI_TAG exist"
        if helm pull oci://registry.gitlab.com/sylva-projects/sylva-core/sylva-units --version $OCI_TAG -d /tmp > /dev/null; then
          echo "oci://registry.gitlab.com/sylva-projects/sylva-core/sylva-units:$OCI_TAG was sucessfully pulled"
        else
          echo "Failed to retrieve: oci://registry.gitlab.com/sylva-projects/sylva-core/sylva-units:$OCI_TAG"
          echo "Ensure you are targeting a branch with an open MR and check if that OCI artifact was not removed by cleanup job"
          exit 1
        fi
      fi
      git fetch origin $GIT_REVISION
      echo -e "Changing git revision to use \\e[1;94m$1\\e[0m"
      git checkout $GIT_REVISION
      git status
      # This is required as old version of Sylva rely on $CI_COMMIT_SHA to determine the ref to use for flux
      export CI_COMMIT_SHA=$(git rev-parse HEAD)
      echo -e "Current revision: $(git rev-parse HEAD)"
    }

.sylva_ci_versioned_ci_values_folder:
  # this block computes SYLVA_CI_VERSIONED_CI_VALUES_FOLDER
  # which computes the sub-directory of ci-deployment-values from which we take values
  # it is used from update_values_file()
  #
  # this function assumes that the ci-deployment-values repo can have such directories:
  # - "current"
  # - "1.x" (e.g. 1.3 for Sylva 1.3.x)
  #
  # * if GIT_REVISION is set, SYLVA_CI_VERSIONED_CI_VALUES_FOLDER depends on it
  # * for MRs, the folder is computed based on the MR title
  #     (to have automatic selection, for instance of directory "1.3.x" for MR having "[backport-1.3]" in their title)
  # * current is used as a fallback value
  - |
    if [[ -z ${SYLVA_CI_VERSIONED_CI_VALUES_FOLDER} ]]; then
      if [[ -n ${GIT_REVISION} ]]; then
        case ${GIT_REVISION} in

          release-*.*)  # "release-1.x" -> "1.x" directory
            SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=${GIT_REVISION#release-}
            ;;

          ?.*.*)   # "1.x.y" -> "1.x" directory
            SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=${GIT_REVISION%.*}
            ;;

          main)   # "main" -> "current" directory
            SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=current
            ;;

        esac
      fi

      # if no value was found yet ...
      if [[ -z ${SYLVA_CI_VERSIONED_CI_VALUES_FOLDER} ]]; then
        # try based on CI_MERGE_REQUEST_TARGET_BRANCH_NAME (applies to MRs only)
        if [[ -n ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME} ]]; then
          case ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME} in

            release-*.*)  # "release-1.x" -> "1.x" directory
              SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=${CI_MERGE_REQUEST_TARGET_BRANCH_NAME#release-}
              ;;

            main)   # "main" -> "current" directory
              SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=current
              ;;

            *)   # for an MR not targetting 'main' or 'release-*', we default to "current" directory
              SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=current
              ;;
          esac
        # else fallback to use "current" directory
        else
          SYLVA_CI_VERSIONED_CI_VALUES_FOLDER=current
        fi
      fi
    fi

.function_update_values_file:
  # Common function to update the deployment values file with the content of multiple yaml files
  - |
    function update_values_file() {
      for target_file in $@; do
        file_found="false"
        if [ -f "$target_file" ]; then
          file_found="true"
          echo -e "Applying values from \\e[1;94m$target_file\\e[0m to \\e[1;92m$values_file\\e[0m"
          yq -i eval-all '. as $item ireduce ({}; . * $item )' $values_file $target_file

        else
          common_ci_values_path=${SYLVA_CI_VALUES_FOLDER}/common
          if [ -f "$common_ci_values_path/$target_file" ]; then
            file_found="true"
            echo -e "Applying values from \\e[1;94m$common_ci_values_path/$target_file\\e[0m to \\e[1;92m$values_file\\e[0m"
            yq -i eval-all '. as $item ireduce ({}; . * $item )' $values_file $common_ci_values_path/$target_file
          fi

          # SYLVA_CI_VERSIONED_CI_VALUES_FOLDER is defined via ".sylva_ci_versioned_ci_values_folder"
          versioned_ci_values_path=${SYLVA_CI_VALUES_FOLDER}/${SYLVA_CI_VERSIONED_CI_VALUES_FOLDER}
          if [ -d "$SYLVA_CI_VERSIONED_CI_VALUES_FOLDER" ] || [ -h "$SYLVA_CI_VERSIONED_CI_VALUES_FOLDER" ] ; then
            echo >&2 "[WARNING] 🛑 Defined SYLVA_CI_VERSIONED_CI_VALUES_FOLDER $SYLVA_CI_VERSIONED_CI_VALUES_FOLDER doesn't exist"
          fi

          if [ -f "$versioned_ci_values_path/$target_file" ]; then
            file_found="true"
            echo -e "Applying values from \\e[1;94m$versioned_ci_values_path/$target_file\\e[0m to \\e[1;92m$values_file\\e[0m"
            yq -i eval-all '. as $item ireduce ({}; . * $item )' $values_file $versioned_ci_values_path/$target_file
          fi
        fi
        if [ "$file_found" = "false" ]; then
          echo >&2 "[ERROR] Unable to find value file $target_file"
          exit 1
        fi
      done

      if [[ ${DISPLAY:-false} == "true" ]]; then
        echo "Content of $values_file:"
        cat $values_file
      fi
    }

# This function CI_JOB_TOKEN to authenticate against the gitlab artifact API.
# It's working for premium and ultimate tier.
# It can be overriden via the ARTIFACT_AUTHENTICATION_HEADER variable
.function_download_artifact:
  - |
    function download_artifact() {
    export job_name=$1
    artifact_name=$2
    page=1
    job_id=""
    if [[ $CI_JOB_NAME != $job_name ]]; then
      while [[ -z "$job_id" ]]; do
        job_id=$(curl --silent -S --location -f --header "${ARTIFACT_AUTHENTICATION_HEADER:-JOB-TOKEN: $CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs?page=${page}" | yq '.[] | select(.name == env(job_name)) | .id')

        if [[ -n "${job_id}" ]]; then
          echo -e "Retrieving \\e[1;94m$artifact_name\\e[0m artifact from \\e[1;92m$job_name with ID: ${job_id}\\e[0m job"
          curl --location --silent -S -f -o $artifact_name --header "${ARTIFACT_AUTHENTICATION_HEADER:-JOB-TOKEN: $CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${job_id}/artifacts/$artifact_name"
          break
        fi
        next_page=$(curl --silent -S --head --location -f --header "${ARTIFACT_AUTHENTICATION_HEADER:-JOB-TOKEN: $CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/pipelines/${CI_PIPELINE_ID}/jobs?page=${page}" \
          | grep -Fi X-Next-Page | awk '{print $2}' | tr -d '\r')
        if [[ -z "$next_page" ]]; then
          echo "No more pages to check. Job not found."
          exit 1
        fi
        page=$next_page
      done
    fi
    }

.import_functions:
  - !reference [.function_change_git_revision]
  - !reference [.function_update_values_file]
  - !reference [.function_download_artifact]

.clone_ci_values:
  - |
    echo -e "Cloning CI values from \\e[1;94m${SYLVA_CI_VALUES_REPO}\\e[0m to \\e[1;92m${SYLVA_CI_VALUES_FOLDER}\\e[0m"
    git clone -q ${SYLVA_CI_VALUES_REPO} ${SYLVA_CI_VALUES_FOLDER}
    echo -e "Using \\e[1;94m${SYLVA_CI_VALUES_REVISION}\\e[0m reference from \\e[1;92m${SYLVA_CI_VALUES_REPO}\\e[0m"
    git -C ${SYLVA_CI_VALUES_FOLDER} checkout ${SYLVA_CI_VALUES_REVISION}

.setup_docker:
  - |
    # Configure docker for bootstrap cluster
    if [[ $SKIP_DOCKER_SERVICE != "true" ]]; then
      echo "Configuring docker networking"
      docker network create --attachable kind || true
      export DOCKER_IP=$(getent ahostsv4 docker | awk '{print $1}' | sort -u)
      KIND_PREFIX=$(docker network inspect kind -f '{{ (index .IPAM.Config 0).Subnet }}')
      ip route add $KIND_PREFIX via $DOCKER_IP
    fi

.deployment-information:
  - |
    # Extract deployment parameters from WORKFLOW_NAME

    function extract_from_job_name() {
      [ -z "${1:-}" ] && (echo >&2 "Extract function needs a key parameter" ; exit 1;)
      [ -z "${2:-}" ] && (echo >&2 "Extract function needs input string (workflow name basically)" ; exit 1;)
      echo "$2" | sed -n -e 's/.*'$1'\s\?\([[:alnum:]\.\,\-]\+\).*/\1/p'
    }
    DEPLOYMENT_INFRA_PROV=${DEPLOYMENT_INFRA_PROV:-$(extract_from_job_name ☁ "$WORKFLOW_NAME")}
    if [[ "$DEPLOYMENT_INFRA_PROV" == "capm3" ]]; then export DEPLOYMENT_INFRA_PROV="capm3-virt"; fi   # Currently capm3 is capm3-virt
    DEPLOYMENT_BOOTSTRAP_PROV=${DEPLOYMENT_BOOTSTRAP_PROV:-$(extract_from_job_name 🚀 "$WORKFLOW_NAME")}
    if [[ "$DEPLOYMENT_BOOTSTRAP_PROV" == "kadm" ]]; then export DEPLOYMENT_BOOTSTRAP_PROV="kubeadm"; fi   # kadm is shortcut for kubeadm
    DEPLOYMENT_OS=${DEPLOYMENT_OS:-$(extract_from_job_name 🐧 "$WORKFLOW_NAME")}
    DEPLOYMENT_SCENARIO=${DEPLOYMENT_SCENARIO:-$(extract_from_job_name 🎬 "$WORKFLOW_NAME")}
    DEPLOYMENT_OPTIONS=${DEPLOYMENT_OPTIONS:-$(extract_from_job_name 🛠 "$WORKFLOW_NAME")}

    export ENV_NAME="${DEPLOYMENT_BOOTSTRAP_PROV}-${DEPLOYMENT_INFRA_PROV}"
    export ENV_TAG="${CI_PIPELINE_ID}-${ENV_NAME}"
    if [[ "$DEPLOYMENT_INFRA_PROV" == "capo" ]]; then export CAPO_TAG=$ENV_TAG; fi
    export KIND_CLUSTER_NAME="bootstrap-${ENV_TAG}"
    export MANAGEMENT_CLUSTER_NAME="mgmt-${ENV_TAG}"
    export WORKLOAD_CLUSTER_NAME="wc-${ENV_TAG}"
    export OCI_TAG="$OCI_TAG_FORMAT"

    if [[ ${DEPLOYMENT_OPTIONS} == *"dev-sources"* ]]; then
      unset OCI_TAG
    fi

  - !reference [.sylva_ci_versioned_ci_values_folder]
  - |
      echo -e "[\\e[1;94mEnvironment INFO\\e[0m]"
      echo "  WORKFLOW_NAME=$WORKFLOW_NAME"
      echo "  DEPLOYMENT_INFRA_PROVIDER = ${DEPLOYMENT_INFRA_PROV}"
      echo "  DEPLOYMENT_BOOTSTRAP_PROVIDER = ${DEPLOYMENT_BOOTSTRAP_PROV}"
      echo "  DEPLOYMENT_OS = ${DEPLOYMENT_OS}"
      echo "  DEPLOYMENT_SCENARIO = ${DEPLOYMENT_SCENARIO}"
      echo "  DEPLOYMENT_OPTIONS = ${DEPLOYMENT_OPTIONS}"
      echo "  GIT_REVISION = ${GIT_REVISION:-'N/A'}"
      echo "  SYLVA_CI_VERSIONED_CI_VALUES_FOLDER = ${SYLVA_CI_VERSIONED_CI_VALUES_FOLDER:-'N/A'}"
      if [[ -n ${EXTRA_DESCRIPTION} ]]; then echo -e "  ${EXTRA_DESCRIPTION}"; fi
      echo "  Fetch CI values from ${SYLVA_CI_VALUES_REPO} using ${SYLVA_CI_VALUES_REVISION} revision"
      echo "  CAPO_TAG = ${CAPO_TAG:-'N/A'}"
      echo "  OCI_TAG = ${OCI_TAG:-'N/A'}"
      echo "  ENV_NAME = $ENV_NAME"
      echo "  KIND_CLUSTER_NAME = $KIND_CLUSTER_NAME"
      echo "  BOOTSTRAP_WATCH_TIMEOUT_MIN = $BOOTSTRAP_WATCH_TIMEOUT_MIN"
      echo -e "[\\e[1;94mCommon cluster INFO\\e[0m]"
      echo "  REMOTE_VALUES = ${REMOTE_VALUES:-'N/A'}"
      echo -e "[\\e[1;94mManagement cluster INFO\\e[0m]"
      echo "  MANAGEMENT_CLUSTER_NAME = $MANAGEMENT_CLUSTER_NAME"
      echo "  MGMT_ADDITIONAL_VALUES = ${MGMT_ADDITIONAL_VALUES:-'N/A'}"
      echo "  MGMT_INITIAL_ADDITIONAL_VALUES = ${MGMT_INITIAL_ADDITIONAL_VALUES:-'N/A'}"
      echo "  MGMT_UPDATE_ADDITIONAL_VALUES = ${MGMT_UPDATE_ADDITIONAL_VALUES:-'N/A'}"
      echo "  MGMT_INITIAL_REVISION = ${MGMT_INITIAL_REVISION:-'N/A'}"
      echo "  MGMT_UPDATE_REVISION = ${MGMT_UPDATE_REVISION:-'N/A'}"
      echo "  MGMT_WATCH_TIMEOUT_MIN = ${MGMT_WATCH_TIMEOUT_MIN}"
      echo "  APPLY_WATCH_TIMEOUT_MIN = ${APPLY_WATCH_TIMEOUT_MIN}"
      echo -e "[\\e[1;94mWorkload cluster INFO\\e[0m]"
      echo "  WORKLOAD_CLUSTER_NAME = $WORKLOAD_CLUSTER_NAME"
      echo "  WC_ADDITIONAL_VALUES = ${WC_ADDITIONAL_VALUES:-'N/A'}"
      echo "  WC_INITIAL_ADDITIONAL_VALUES = ${WC_INITIAL_ADDITIONAL_VALUES:-'N/A'}"
      echo "  WC_UPDATE_ADDITIONAL_VALUES = ${WC_UPDATE_ADDITIONAL_VALUES:-'N/A'}"
      echo "  WC_INITIAL_REVISION = ${WC_INITIAL_REVISION:-'N/A'}"
      echo "  WC_UPDATE_REVISION = ${WC_UPDATE_REVISION:-'N/A'}"
      echo "  APPLY_WC_WATCH_TIMEOUT_MIN = ${APPLY_WC_WATCH_TIMEOUT_MIN}"

.setup_ci_context_and_values:
  - |
    # Running common deployment
    echo -e "\e[1m\e[0Ksection_start:`date +%s`:gitlab_ci_common[collapsed=true]\r\e[0KRunning common deployment steps\e[0m"
  - !reference [.import_functions]
  - !reference [.setup_docker]
  - !reference [.clone_ci_values]
  - |
    if [[ $CI_JOB_NAME != preview-management-cluster ]]; then
      download_artifact deploy-management-cluster management-cluster-kubeconfig
    fi
  - |
    # configure Git revision
    if [ -n "${GIT_REVISION}" ] ; then
      change_git_revision $GIT_REVISION
    else
      echo -e "Current revision: $(git rev-parse HEAD)"
    fi
  - |
    # configure env type
    if [[ ${CLUSTER_TYPE} == 'workload' ]]; then
        ENV_SUB_PATH=${ENV_SUB_PATH:-"environment-values/workload-clusters"}
        export OCI_COMPONENT_PATH="../../components/workload-cluster-oci-artifacts"
        export CLUSTER_CI_NAME=${WORKLOAD_CLUSTER_NAME}
    else
        ENV_SUB_PATH=${ENV_SUB_PATH:-"environment-values"}
        export OCI_COMPONENT_PATH="../components/oci-artifacts"
        export CLUSTER_CI_NAME=${MANAGEMENT_CLUSTER_NAME}
    fi
    export ENV_PATH=${ENV_SUB_PATH}/${ENV_NAME}
  - values_file=$ENV_PATH/values.yaml
  - |
    # Apply values for requested options
    yq -i '.cluster.name = strenv(CLUSTER_CI_NAME)' $values_file
    update_values_file all-ci-deployments.yml
    update_values_file node-os-${DEPLOYMENT_OS}.yml
    options=$(echo $DEPLOYMENT_OPTIONS | tr "," "\n")
    for option in $options; do
      if [[ $option == "dev-sources" ]]; then
        echo "dev-sources option is set, OCI configuration will be disabled"
      elif [[ $option == "misc" ]]; then
        if [[ "$DEPLOYMENT_INFRA_PROV" == "capo" ]] && [[ "${CLUSTER_TYPE}" == "management" ]]; then
          update_values_file misc-units-in-capo.yml
        elif [[ "$DEPLOYMENT_INFRA_PROV" == "capo" ]] && [[ "${CLUSTER_TYPE}" == "workload" ]]; then
          update_values_file misc-units-in-capo-wkld.yml
        elif [[ "$DEPLOYMENT_INFRA_PROV" == "capm3-virt" ]] && [[ "${CLUSTER_TYPE}" == "management" ]]; then
          update_values_file misc-units-in-capm3.yml
        elif [[ "$DEPLOYMENT_INFRA_PROV" == "capm3-virt" ]] && [[ "${CLUSTER_TYPE}" == "workload" ]]; then
          update_values_file misc-units-in-capm3-wkld.yml
        fi
      else
        update_values_file ${option}.yml
      fi
    done
    if [[ "$DEPLOYMENT_INFRA_PROV" == "capm3-virt" ]] && [[ "$DEPLOYMENT_OPTIONS" == *single-node* ]]; then
      yq -i '.components = []' $ENV_PATH/kustomization.yaml  # remove ha component
    fi
  - |
    # Apply management/workload cluster additionnal values
    if [ -n "${MGMT_ADDITIONAL_VALUES}" ] && [ "${CLUSTER_TYPE}" = "management" ]; then
      update_values_file ${MGMT_ADDITIONAL_VALUES}
    fi
    if [ -n "${WC_ADDITIONAL_VALUES}" ] && [ "${CLUSTER_TYPE}" = "workload" ]; then
      update_values_file ${WC_ADDITIONAL_VALUES}
    fi
  - |
    # Apply remote values in case of cross project pipeline
    if [ -n "${REMOTE_VALUES}" ]; then
      echo -e "This pipeline is a cross project pipeline."
      echo "${REMOTE_VALUES}" > /tmp/remote_values.yaml
      update_values_file /tmp/remote_values.yaml
    fi
  - |
    # Apply specific value file
    if [ -n "${SPECIFIC_VALUES_FILE}" ]; then
      update_values_file $SPECIFIC_VALUES_FILE
    else
      echo -e "No specific values to apply"
    fi
  - |
    # configure OCI artifacts if needed
    if [ ${OCI_TAG} ]; then
      echo -e "Applying OCI configuration for tag: ${OCI_TAG}"
      if [ $(yq '.components | length' $ENV_PATH/kustomization.yaml) -eq "0" ]; then
        yq -i '.components = []' $ENV_PATH/kustomization.yaml
      fi
      # Check if OCI_TAG starts with "0.0.0-git" as OCI artifacts are only signed on protected branch and for tagged release
      if [[ "${OCI_TAG}" == 0.0.0-git* ]]; then
        # Disabled OCI verification for dev branches
        yq -i '.security.oci_artifacts.skip_signing_check = true' "$ENV_PATH/values.yaml"
      fi
      yq -i '.components += strenv(OCI_COMPONENT_PATH)' $ENV_PATH/kustomization.yaml
    cat <<EOF>> $ENV_PATH/kustomization.yaml
    patches:
    - target:
        kind: SylvaUnitsRelease
        name: sylva-units
      patch: |
        - op: remove
          path: /spec/sylvaUnitsSource/commit
        - op: replace
          path: /spec/sylvaUnitsSource/tag
          value: ${OCI_TAG}
    EOF
    fi
  - echo -e "\e[0Ksection_end:`date +%s`:gitlab_ci_common\r\e[0K"
  - |
    # Display kustomization.yaml
    echo -e "\e[1m\e[0Ksection_start:`date +%s`:display_kusto[collapsed=true]\r\e[0KDisplay kustomization.yaml\e[0m"
    cat $ENV_PATH/kustomization.yaml
    echo -e "\e[0Ksection_end:`date +%s`:display_kusto\r\e[0K"
  - |
    # Display values.yaml
    echo -e "\e[1m\e[0Ksection_start:`date +%s`:display_values[collapsed=true]\r\e[0KDisplay values.yaml\e[0m"
    cat $values_file | tee ci-environment-values.yaml
    echo -e "\e[0Ksection_end:`date +%s`:display_values\r\e[0K"
  - !reference [.flavored-pre-deployment-configuration]

# By default we don't have specific configuration to apply
.flavored-pre-deployment-configuration:
  - []

.os_cloud:
  # the OS_* variables below are set in the gitlab runner configuration
  # and contain information to connect to the OpenStack instance used
  # by this test
  - mkdir -p ~/.config/openstack
  - |
    cat <<EOF>> ~/.config/openstack/clouds.yml
    clouds:
      capo_cloud:
        auth:
          auth_url: '${OS_AUTH_URL}'
          user_domain_name: '${OS_USER_DOMAIN_ID}'
          project_domain_name: '${OS_PROJECT_DOMAIN_ID}'
          project_name: '${OS_TENANT_NAME}'
          username: '${OS_USERNAME}'
          password: '${OS_PASSWORD}'
        region_name: '${OS_REGION_NAME}'
        verify: false
    EOF

.management-base:
  extends: .docker-service
  variables:
    CLUSTER_TYPE: management
  timeout: 130min
  stage: deploy
  artifacts:
    expire_in: 48 hour
    when: always
    paths:
      - debug-on-exit.log
      - bootstrap-cluster-dump/
      - management-cluster-dump/
      - crust-gather.tar.gz
      - "*-timeline.html"
      - "*-record.yaml"
      - management-cluster-kubeconfig
      - ci-environment-values.yaml
      - sylva.env
    name: "artifact-$CI_JOB_ID"
    # expose_as: $CI_JOB_NAME  # not allowed https://gitlab.com/gitlab-org/gitlab/-/issues/427149
  after_script:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:dump_machine_logs[collapsed=true]\r\e[0KDumping machines logs\e[0m"
    - if [ "$SKIP_DOCKER_SERVICE" = "true" ]; then export DOCKER_HOST=""; fi # CAPM3 deployment doesn't rely on docker in docker
    - !reference [.setup_docker]  # needed to access bootstrap cluster and/or capd mgmt cluster
    - |
      .gitlab/ci/scripts/dump_machine_logs.sh management || true
      echo -e "\e[0Ksection_end:`date +%s`:dump_machine_logs\r\e[0K"

.preview-management:
  extends: .management-base
  timeout: 15min
  script:
    - !reference [.setup_ci_context_and_values]
    - ./preview.sh ${ENV_PATH}
  variables:
    SPECIFIC_VALUES_FILE: $MGMT_INITIAL_ADDITIONAL_VALUES
    GIT_REVISION: $MGMT_INITIAL_REVISION
  artifacts:
    when: on_failure
    expire_in: 1 hour
    paths:
      - debug-on-exit.log
      - bootstrap-cluster-dump/
      - "*-record.yaml"

.deploy-management:
  extends: .management-base
  script:
    - !reference [.setup_ci_context_and_values]
    - ./bootstrap.sh ${ENV_PATH}
  variables:
    SPECIFIC_VALUES_FILE: $MGMT_INITIAL_ADDITIONAL_VALUES
    GIT_REVISION: $MGMT_INITIAL_REVISION

.update-management:
  extends: .management-base
  script:
    - !reference [.setup_ci_context_and_values]
    - ./apply.sh ${ENV_PATH}
  variables:
    SPECIFIC_VALUES_FILE: $MGMT_UPDATE_ADDITIONAL_VALUES
    GIT_REVISION: $MGMT_UPDATE_REVISION

.workload-base:
  extends: .docker-service
  variables:
    CLUSTER_TYPE: workload
  timeout: 110min
  stage: deploy
  artifacts:
    name: "artifact-$CI_JOB_ID"
    expire_in: 48 hour
    when: always
    paths:
      - debug-on-exit.log
      - bootstrap-cluster-dump/default/
      - bootstrap-cluster-dump/sylva-system/
      - management-cluster-dump/
      - workload-cluster-dump/
      - crust-gather.tar.gz
      - "*-timeline.html"
      - "*-record.yaml"
      - management-cluster-kubeconfig
      - ci-environment-values.yaml
      - sylva.env
  after_script:
    - |
      echo -e "\e[1m\e[0Ksection_start:`date +%s`:dump_machine_logs[collapsed=true]\r\e[0KDumping machines logs\e[0m"
    - if [ "$SKIP_DOCKER_SERVICE" = "true" ]; then export DOCKER_HOST=""; fi # CAPM3 deployment doesn't rely on docker in docker
    - !reference [.setup_docker]  # needed to access bootstrap cluster and/or capd mgmt cluster
    - |
      .gitlab/ci/scripts/dump_machine_logs.sh workload || true
      echo -e "\e[0Ksection_end:`date +%s`:dump_machine_logs\r\e[0K"

.deploy-workload:
  extends: .workload-base
  script:
    - !reference [.setup_ci_context_and_values]
    - ./apply-workload-cluster.sh ${ENV_PATH}
  variables:
    SPECIFIC_VALUES_FILE: $WC_INITIAL_ADDITIONAL_VALUES
    GIT_REVISION: $WC_INITIAL_REVISION
.update-workload:
  extends: .workload-base
  script:
    - !reference [.setup_ci_context_and_values]
    - ./apply-workload-cluster.sh ${ENV_PATH}
  variables:
    SPECIFIC_VALUES_FILE: $WC_UPDATE_ADDITIONAL_VALUES
    GIT_REVISION: $WC_UPDATE_REVISION

.delete-workload:
  extends: .workload-base
  stage: delete
  script:
    - !reference [.function_download_artifact]
    - download_artifact deploy-management-cluster management-cluster-kubeconfig
    - . bin/env
    - kubectl --kubeconfig management-cluster-kubeconfig delete -n ${ENV_NAME} hr sylva-units --timeout 30m
    - |
      # Check if we have some remaining resources that should have been deleted
      # and fail before attempting to delete the namespace in order to ease troubleshooting
      for KIND in "kustomizations -l app.kubernetes.io/instance=sylva-units" "helmreleases -l app.kubernetes.io/instance=sylva-units" heatstacks; do
        if kubectl --kubeconfig management-cluster-kubeconfig get -n ${ENV_NAME} $KIND -o yaml | yq -e '.items | length > 0' &>/dev/null; then
          echo "there remains $(echo $KIND | awk '{print $1}') resources, can't delete namespace"
          exit 1
        fi
      done
    - kubectl --kubeconfig management-cluster-kubeconfig delete ns ${ENV_NAME} --timeout 2m || true
    - |
      if (kubectl --kubeconfig management-cluster-kubeconfig get ns ${ENV_NAME} 2>/dev/null); then
        echo "Namespace '${ENV_NAME}' deletion did not complete (.status below)"
        kubectl --kubeconfig management-cluster-kubeconfig get ns ${ENV_NAME} -o yaml | yq .status
        exit 1
      fi
  after_script:
    - echo -e "\e[1m\e[0Ksection_start:`date +%s`:debug_exit[collapsed=true]\r\e[0Kgathering debugging logs in debug-on-exit.log file\e[0m"
    - . bin/env
    - ./tools/shell-lib/debug-on-exit.sh
    - echo -e "\e[0Ksection_end:`date +%s`:debug_exit\r\e[0K"

# Used to generate summary comment in MRs
.summary:
  image:
    name: registry.gitlab.com/python-gitlab/python-gitlab:v5.6.0-alpine
    entrypoint: [""]
  before_script: []
  tags:
    - gitlab-org-docker
  script:
    - .gitlab/ci/scripts/pipeline_summary.py
  rules:
    - if: $SKIP_PIPELINE_SUMMARY == "true"
      when: never
    - if: $CI_MERGE_REQUEST_IID
      when: always
