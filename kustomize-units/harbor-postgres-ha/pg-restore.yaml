apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-db-restore
  namespace: harbor
spec:
  template:
    spec:
      initContainers:
        - name: check-backup
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - "-c"
          args:
            - |
              status=$(kubectl get job harbor-db-backup -n harbor -o jsonpath='{.status.succeeded}');
              if [ "$status" != "1" ]; then
                echo "Backup Job did not succeed. Exiting.";
                exit 1;
              fi;
              echo "Backup Job succeeded. Proceeding with restore.";
      containers:
        - name: pg-restore
          image: postgres:13
          command: ["/bin/sh", "-c"]
          args:
            - echo "Listing available backup file:"
              ls -lrth /data ;
              echo "Staring restore process"
              psql -h "${PGHOST}" -U "${PGUSER}" "${PGDATABASE}" < /data/harbor-backup.sql ;
              echo "Restore complete";
          volumeMounts:
            - mountPath: /data
              name: backup-storage
      restartPolicy: Never
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: backup-pvc
