apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    annotationSelector: cert-manager.io/inject-ca-from
  patch: |-
    kind: CustomResourceDefinition
    metadata:
      name: _unused_
    spec:
      conversion:
        webhook:
          clientConfig:
            caBundle: null
