apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: shared-workload-clusters-settings
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  generateExisting: true
  rules:
  - name: generate-cm
    skipBackgroundRequests: false
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
              sylva-project.org/shared-workload-cluster-settings: ""
    generate:
      kind: ConfigMap
      apiVersion: v1
      name: shared-workload-clusters-settings
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      clone:
        name: shared-workload-clusters-settings
        namespace: sylva-system
  - name: generate-secret
    skipBackgroundRequests: false
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
              sylva-project.org/shared-workload-cluster-settings: ""
    generate:
      kind: Secret
      apiVersion: v1
      name: shared-workload-clusters-settings
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      clone:
        name: shared-workload-clusters-settings
        namespace: sylva-system

  - name: kubevirt-auth-secret-clone
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
              kubevirt-manager.io/version: 1.4.0
    generate:
      apiVersion: v1
      kind: Secret
      name: auth-secret
      namespace: "{{request.object.metadata.name}}"
      synchronize: true   # 🔁 keep it updated on changes
      clone:
        namespace: kubevirt-manager
        name: auth-secret
