apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: kubevirt-manager
  labels:
    app: kubevirt-manager
    kubevirt-manager.io/version: 1.4.0
    kubevirt-manager.io/managed: "true"
data:
  # basicauth.conf: |
  #   auth_basic "Restricted Content";
  #   auth_basic_user_file /etc/nginx/secret.d/.htpasswd;

  nginx.conf: |
    events {}

    http {
        server {
            listen 8080;
            server_name ${KUBEVIRT_MANAGER_DNS};

            # Allow health checks without auth (optional)
            location /healthz {
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # OAuth2 Proxy endpoints
            location /oauth2/ {
                proxy_pass       http://127.0.0.1:4180;        #outh:port
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Callback after login
            location /oauth2/callback {
                proxy_pass       http://127.0.0.1:4180;         #oauth:port
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Catch-all: send all traffic through oauth2-proxy (auth first)
            location / {
                proxy_pass       http://127.0.0.1:4180;       #oauth:port
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }

        # Internal server for Angular UI (served on 8081)
        server {
            listen 8081;
            root /usr/share/nginx/html;
            index index.html;

            location / {
                try_files $uri $uri/ /index.html;
            }
        }
    }