apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kubevirt-manager-oidc-init
  namespace: kubevirt-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: eso-store-k8s-keycloak
  target:
    name: auth-secret # name of the k8s Secret to be created in the same namespace as ExternalSecret
    template:
      engineVersion: v2
      data:
        clientSecret: "{{ .clientSecret }}"
        clientID: "{{ .clientID }}"
  data:
    - secretKey: clientSecret
      remoteRef:
        key: keycloak-client-secret-kubevirt-manager-client  # this secret is a byproduct of the kubevirt-manager-client KeycloakClient resource
        property: CLIENT_SECRET
    - secretKey: clientID
      remoteRef:
        key: keycloak-client-secret-kubevirt-manager-client
        property: CLIENT_ID
