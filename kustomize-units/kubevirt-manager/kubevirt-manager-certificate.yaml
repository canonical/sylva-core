apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kubevirt-manager-tls
  namespace: kubevirt-manager
spec:
  commonName: kubevirt-manager.sylva
  dnsNames:
  - kubevirt-manager.sylva
  - localhost
  duration: 2160h0m0s
  emailAddresses:
  - surname.name@sylva.org
  ipAddresses:
  - 127.0.0.1
  issuerRef:
    kind: ClusterIssuer
    name: ca-issuer
  renewBefore: 360h0m0s
  secretName: keycloak-tls
  subject:
    countries:
    - eu
    organizationalUnits:
    - DEV
    organizations:
    - Sylva
