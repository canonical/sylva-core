    allow_update: false
    name: operator
    path: /usr/bin/operator
  - action: allow
    allow_update: false
    name: pause
    path: /pause
  process_profile:
    baseline: zero-drift
  target:
    policymode: Monitor
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: tigera-operator.tigera-operator
      - key: domain
        op: =
        value: tigera-operator
      grp_band_width: 0
      grp_sess_cur: 0
      grp_sess_rate: 0
      mon_metric: false
      name: nv.tigera-operator.tigera-operator
      original_name: ''
  waf:
    settings: []
    status: true
