---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.heat-operator-controller-manager.heat-operator-system
  namespace: heat-operator-system
spec:
  dlp:
    settings: []
    status: true
  egress:
  - action: allow
    applications:
    - DNS
    name: nv.rke2-coredns-rke2-coredns.kube-system-egress-230
    ports: any
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: rke2-coredns-rke2-coredns.kube-system
      - key: domain
        op: =
        value: kube-system
      name: nv.rke2-coredns-rke2-coredns.kube-system
      original_name: ''
  - action: allow
    applications:
    - any
    name: nv.kube-apiserver-mgmt-cluster-cp.kube-system-egress-231
    ports: tcp/6443
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: kube-apiserver-mgmt-cluster-cp.kube-system
      - key: domain
        op: =
        value: kube-system
      name: nv.kube-apiserver-mgmt-cluster-cp.kube-system
      original_name: ''
  file: []
  ingress: []
  process:
  - action: allow
    allow_update: false
    name: csi-snapshotter
    path: /csi-snapshotter
  - action: allow
    allow_update: false
    name: kube-rbac-proxy
    path: /usr/local/bin/kube-rbac-proxy
  - action: allow
    allow_update: false
    name: manager
    path: /manager
  - action: allow
    allow_update: false
    name: pause
    path: /pause
  process_profile:
    baseline: zero-drift
  target:
    policymode: Monitor
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: heat-operator-controller-manager.heat-operator-system
      - key: domain
        op: =
        value: heat-operator-system
      name: nv.heat-operator-controller-manager.heat-operator-system
      original_name: ''
  waf:
    settings: []
    status: true
