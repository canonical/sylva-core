---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.capi-rancher-import.capi-rancher-import
  namespace: capi-rancher-import
spec:
  dlp:
    settings: []
    status: true
  egress:
  - action: allow
    applications:
    - SSL
    name: nv.rancher.cattle-system-egress-143
    ports: any
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: rancher.cattle-system
      - key: domain
        op: =
        value: cattle-system
      name: nv.rancher.cattle-system
      original_name: ''
  - action: allow
    applications:
    - any
    name: nv.kube-apiserver-mgmt-cluster-cp.kube-system-egress-144
    ports: tcp/6443
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: kube-apiserver-mgmt-cluster-cp.kube-system
      - key: domain
        op: =
        value: kube-system
      name: nv.kube-apiserver-mgmt-cluster-cp.kube-system
      original_name: ''
  - action: allow
    applications:
    - DNS
    name: nv.rke2-coredns-rke2-coredns.kube-system-egress-145
    ports: any
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: rke2-coredns-rke2-coredns.kube-system
      - key: domain
        op: =
        value: kube-system
      name: nv.rke2-coredns-rke2-coredns.kube-system
      original_name: ''
  file: []
  ingress: []
  process:
  - action: allow
    allow_update: false
    name: kopf
    path: /usr/local/bin/python3.12
  - action: allow
    allow_update: false
    name: pause
    path: /pause
  process_profile:
    baseline: zero-drift
  target:
    policymode: Monitor
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: capi-rancher-import.capi-rancher-import
      - key: domain
        op: =
        value: capi-rancher-import
      name: nv.capi-rancher-import.capi-rancher-import
      original_name: ''
  waf:
    settings: []
    status: true
