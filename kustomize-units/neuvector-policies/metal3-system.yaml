---
apiVersion: neuvector.com/v1
kind: NvSecurityRule
metadata:
  name: nv.baremetal-operator-controller-manager.metal3-system
  namespace: metal3-system
spec:
  dlp:
    settings: []
    status: true
  egress:
  - action: allow
    applications:
    - any
    name: nv.kube-apiserver-mgmt-cluster-cp.kube-system-egress-136
    ports: tcp/6443
    priority: 0
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: kube-apiserver-mgmt-cluster-cp.kube-system
      - key: domain
        op: =
        value: kube-system
      name: nv.kube-apiserver-mgmt-cluster-cp.kube-system
      original_name: ''
  file: []
  ingress: []
  process:
  - action: allow
    allow_update: false
    name: baremetal-operator
    path: /usr/bin/baremetal-operator
  - action: allow
    allow_update: false
    name: kube-rbac-proxy
    path: /kube-rbac-proxy
  - action: allow
    allow_update: false
    name: pause
    path: /pause
  process_profile:
    baseline: zero-drift
  target:
    policymode: Monitor
    selector:
      comment: ''
      criteria:
      - key: service
        op: =
        value: baremetal-operator-controller-manager.metal3-system
      - key: domain
        op: =
        value: metal3-system
      name: nv.baremetal-operator-controller-manager.metal3-system
      original_name: ''
  waf:
    settings: []
    status: true
