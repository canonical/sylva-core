apiVersion: redhatcop.redhat.io/v1alpha1
kind: AuthEngineMount
metadata:
  name: ${OIDC_AUTH_PATH}
  namespace: vault
spec:
  connection:
    tLSConfig:
      skipVerify: true # see https://gitlab.com/sylva-projects/sylva-core/-/issues/261
    address: ${VAULT_API}
  authentication:
    path: ${K8S_AUTH_PATH}
    role: admin
  type: oidc
