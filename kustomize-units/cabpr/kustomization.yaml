apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.13.0/bootstrap-components.yaml
  - https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.13.0/control-plane-components.yaml

components:
  - ../common-kustomize-components/crd-remove-caBundle

# Add labels to enable clusterctl move to retrieve resources correponding to cabpr CRDs
labels:
  - pairs:
      clusterctl.cluster.x-k8s.io: ""

images:
- name: ghcr.io/rancher/cluster-api-provider-rke2-controlplane
  newName: registry.gitlab.com/sylva-projects/sylva-elements/container-images/sandbox-registry/cluster-api-provider-rke2-controlplane-amd64
  newTag: 0.12.0-skip-etcd-membership-removal
- name: ghcr.io/rancher/cluster-api-provider-rke2-bootstrap
  newName: registry.gitlab.com/sylva-projects/sylva-elements/container-images/sandbox-registry/cluster-api-provider-rke2-bootstrap-amd64
  newTag: 0.13.0-gzipped-cloud-init

