apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../kube-job
  - ../kube-cronjob
  - role.yaml
  - cluster-creator-global-role.yaml

configMapGenerator:

- name: kube-job-cm
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - kube-job.sh=cluster-creator-login.sh

- name: kube-cronjob-cm
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - kube-cronjob.sh=cluster-creator-login.sh
