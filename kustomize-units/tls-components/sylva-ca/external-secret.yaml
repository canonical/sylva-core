apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: eso-sylva-ca
  namespace: ${CERTIFICATE_NAMESPACE}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: eso-store-k8s-cert-manager
  target:
    name: ${CACERT_SECRET_NAME:-sylva-ca.crt}
    template:
      type: Opaque
      data:
        ${CERT_FILE_NAME:-ca.crt}: |
          {{ .sylvaCa }}
          {{ .extraCaCert }}
  data:
  - secretKey: sylvaCa
    remoteRef:
      key: ca-key-pair
      property: ca.crt
  - secretKey: extraCaCert
    remoteRef:
      key: extra-ca-cert
      property: cacert
