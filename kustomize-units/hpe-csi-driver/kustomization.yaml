apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hpe-storage

resources:
  - namespace.yaml
  - storageClass.yaml
  - hpe-storage-config-secret.yaml

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: hpe-csi-controller
      namespace: hpe-storage
    patch: |-
      - op: replace
        path: /spec/replicas
        value: ${CONTROLLER_REPLICAS}
