kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: hpe-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.hpe.com
parameters:
    csi.storage.k8s.io/fstype: xfs
    csi.storage.k8s.io/controller-expand-secret-name: hpe-storage-secrets
    csi.storage.k8s.io/controller-expand-secret-namespace: hpe-storage
    csi.storage.k8s.io/controller-publish-secret-name: hpe-storage-secrets
    csi.storage.k8s.io/controller-publish-secret-namespace: hpe-storage
    csi.storage.k8s.io/node-publish-secret-name: hpe-storage-secrets
    csi.storage.k8s.io/node-publish-secret-namespace: hpe-storage
    csi.storage.k8s.io/node-stage-secret-name: hpe-storage-secrets
    csi.storage.k8s.io/node-stage-secret-namespace: hpe-storage
    csi.storage.k8s.io/provisioner-secret-name: hpe-storage-secrets
    csi.storage.k8s.io/provisioner-secret-namespace: hpe-storage
    description: "Volume created by using a HPE Storage Secret with the HPE CSI Driver for Kubernetes"
reclaimPolicy: Delete
allowVolumeExpansion: true

