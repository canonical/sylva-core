apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/openshift-assisted/cluster-api-provider-openshift-assisted/releases/download/v0.3.3/bootstrap-components.yaml

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ASSISTED_CA_BUNDLE_NAME
          value: assisted-installer-ca
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ASSISTED_CA_BUNDLE_NAMESPACE
          value: assisted-installer
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ASSISTED_CA_BUNDLE_RESOURCE
          value: secret
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ASSISTED_CA_BUNDLE_KEY
          value: ca.crt
    target:
      kind: Deployment
      name: capoa-bootstrap-controller-manager
      version: v1

labels:
  - pairs:
      clusterctl.cluster.x-k8s.io: ""
