apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: workload-clusters-propagate-mgmt-state-settings
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  generateExisting: true
  mutateExistingOnPolicyUpdate: true
  rules:
  - name: generate-cm
    skipBackgroundRequests: false
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
              sylva-project.org/workload-cluster: ""
    generate:
      kind: ConfigMap
      apiVersion: v1
      name: mgmt-cluster-state-values
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      clone:
        name: mgmt-cluster-state-values
        namespace: sylva-system

  - name: reconcile-on-secret-update
    match:
      any:
      - resources:
          kinds:
          - Kustomization
          names:
          - wkld-ds-copy-file
          namespaces:
          - kubeadm-capo
    context:
    - name: secretconfig
      apiCall:
        urlPath: "/api/v1/namespaces/cert-manager/secrets/ca-key-pair"
    preconditions:
      all:
      - key: "{{ secretconfig.metadata.name }}"
        operator: Equals
        value: "ca-key-pair"
    mutate:
      targets:
      - apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        name: wkld-ds-copy-file
        namespace: kubeadm-capo
      patchStrategicMerge:
        metadata:
          annotations:
            reconcile.fluxcd.io/requestedAt: "{{ time_now_utc() }}"
            kyverno-applied: "true"
        spec:
          postBuild:
            substitute:
              DATA: "Substituted by Kyverno {{ time_now_utc() }}"
              TIME: "{{ time_now_utc() }}"
              
              
              
