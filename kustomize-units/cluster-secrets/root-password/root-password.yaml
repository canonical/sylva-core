apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: root-password
  annotations:
    sylvaproject.org/cluster-secrets: true
    kustomize.toolkit.fluxcd.io/force: Enabled
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Generate the Root account password for a cluster
    policies.kyverno.io/minversion: 1.12.0
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: root-password
    policies.kyverno.io/description: >-
      This policy injects objects to manage the password of the Root account per target cluster.
      It generates a RandomSecret to inject a preiodically rotated root password in Vault.
      It generates a VaultSecret to extract the root password from Vault into K8S secret.

spec:
  background: true
  rules:

    - name: root-password-sa
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: false
        apiVersion: v1
        kind: ServiceAccount
        name: root-password
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            annotations:
              sylvaproject.org/cluster-name: "{{request.object.spec.clusterName}}"
              sylvaproject.org/cluster-secrets: 'true'

    - name: root-password-vaultpolicy
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: false
        apiVersion: redhatcop.redhat.io/v1alpha1
        kind: Policy
        name: "root-password-{{request.object.spec.clusterName}}"
        namespace: vault
        data:
          metadata:
            annotations:
              sylvaproject.org/cluster-name: "{{request.object.spec.clusterName}}"
              sylvaproject.org/cluster-secrets: 'true'
          spec:
            authentication:
              path: kubernetes
              role: admin
              serviceAccount:
                name: vault
            connection:
              address: https://vault.vault.svc.cluster.local:8200
              tLSConfig:
                skipVerify: true
            type: acl
            policy: |
              path "/sys/policies/password/+/generate" {
                capabilities = ["read"]
              }
              path "/cluster-secrets/data/{{request.object.spec.clusterName}}/root-password" {
                capabilities = ["create", "read", "list", "update", "delete"]
              }
              path "/cluster-secrets/metadata/{{request.object.spec.clusterName}}/root-password" {
                capabilities = ["read", "list", "delete"]
              }

    - name: root-password-k8sauthenginerole
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: false
        apiVersion: redhatcop.redhat.io/v1alpha1
        kind: KubernetesAuthEngineRole
        name: "root-password-{{request.object.spec.clusterName}}"
        namespace: vault
        data:
          metadata:
            annotations:
              sylvaproject.org/cluster-name: "{{request.object.spec.clusterName}}"
              sylvaproject.org/cluster-secrets: 'true'
          spec:
            authentication:
              path: kubernetes
              role: admin
              serviceAccount:
                name: vault
            connection:
              address: https://vault.vault.svc.cluster.local:8200
              tLSConfig:
                skipVerify: true
            path: kubernetes
            policies:
              - "root-password-{{request.object.spec.clusterName}}"
            targetNamespaces:
              targetNamespaces:
                - "{{request.object.metadata.namespace}}"
            targetServiceAccounts:
              - root-password
            tokenTTL: 3600
            tokenType: default


    - name: root-password-randomsecret
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: redhatcop.redhat.io/v1alpha1
        kind: RandomSecret
        name: root-password
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            annotations:
              sylvaproject.org/cluster-name: "{{request.object.spec.clusterName}}"
              sylvaproject.org/cluster-secrets: 'true'
          spec:
            connection:
              tLSConfig:
                skipVerify: true  # not cool but refering tlsSecret does not work in release v0.8.13 - see https://gitlab.com/sylva-projects/sylva-core/-/issues/261
                #  name: vault-tls
              address: https://vault.vault.svc.cluster.local:8200
            authentication:
              path: kubernetes
              role: "root-password-{{request.object.spec.clusterName}}"
              serviceAccount:
                name: root-password
            isKVSecretsEngineV2: true
            path: "cluster-secrets/data/{{request.object.spec.clusterName}}"
            secretKey: password
            secretFormat:
              passwordPolicyName: sylva-password-policy
            refreshPeriod: ${REFRESH_PERIOD}


    # - name: root-password-vaultsecret
    #   match:
    #     any:
    #       - resources:
    #           kinds:
    #             - cluster.x-k8s.io/*/Machine
    #           operations:
    #             - CONNECT
    #             - CREATE
    #             - UPDATE
    #             - DELETE
    #       - resources:
    #           kinds:
    #             - cluster.x-k8s.io/*/Cluster
    #           operations:
    #             - CONNECT
    #             - CREATE
    #             - UPDATE
    #             - DELETE
    #   generate:
    #     generateExisting: true
    #     synchronize: true
    #     apiVersion: redhatcop.redhat.io/v1alpha1
    #     kind: VaultSecret
    #     name: root-password
    #     namespace: "{{request.object.metadata.namespace}}"
    #     data:
    #       spec:
    #         refreshThreshold: ${REFRESH_THRESHOLD}
    #         vaultSecretDefinitions:
    #           - authentication:
    #               path: kubernetes
    #               role: "root-password-{{request.object.spec.clusterName}}"
    #               serviceAccount:
    #                 name: root-password
    #             name: rootdata
    #             path: "cluster-secrets/data/{{request.object.spec.clusterName}}/root-password"
    #             connection:
    #               tLSConfig:
    #                 skipVerify: true  # not cool but refering tlsSecret does not work in release v0.8.13 - see https://gitlab.com/sylva-projects/sylva-core/-/issues/261
    #                 #  name: vault-tls
    #               address: https://vault.vault.svc.cluster.local:8200
    #           - authentication:
    #               path: kubernetes
    #               role: "root-password-{{request.object.spec.clusterName}}"
    #               serviceAccount:
    #                 name: root-password
    #             name: rootmetadata
    #             path: "cluster-secrets/metadata/{{request.object.spec.clusterName}}/root-password"
    #             connection:
    #               tLSConfig:
    #                 skipVerify: true  # not cool but refering tlsSecret does not work in release v0.8.13 - see https://gitlab.com/sylva-projects/sylva-core/-/issues/261
    #                 #  name: vault-tls
    #               address: https://vault.vault.svc.cluster.local:8200
