    #             sylvaproject.org/cluster-secrets: 'true'
    #             sylvaproject.org/cluster-secrets-type: user

    #
    # ESO attempt
    #
    - name: root-password-clustersecretstore
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: external-secrets.io/v1beta1
        kind: ClusterSecretStore
        name: "root-password-{{request.object.spec.clusterName}}"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          spec:
            provider:
              vault:
                auth:
                  kubernetes:
                    mountPath: kubernetes
                    role: "root-password-{{request.object.spec.clusterName}}"
                    serviceAccountRef:
                      name: root-password
                      namespace: "{{request.object.metadata.namespace}}"
                caProvider:
                  key: ca.crt
                  name: ca-key-pair
                  namespace: cert-manager
                  type: Secret
                path: cluster-secrets
                server: https://vault.vault.svc.cluster.local:8200
                version: v2
    - name: root-password-externalsecret
      match:
        any:
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Machine
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - cluster.x-k8s.io/*/Cluster
              operations:
                - CONNECT
                - CREATE
                - UPDATE
                - DELETE
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: external-secrets.io/v1beta1
        kind: ExternalSecret
        name: root-password
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            name: "root-password"
            namespace: "{{request.object.metadata.namespace}}"
          spec:
            secretStoreRef:
              name: "root-password-{{request.object.spec.clusterName}}"
              kind: ClusterSecretStore
            refreshInterval: 1m0s
            target:
              creationPolicy: Orphan # Orphan,Owner,None,Merge
              deletionPolicy: Retain # Delete,Merge,Retain
              name: root-password
              template:
                engineVersion: v2
                mergePolicy: Merge
                metadata:
                  labels:
                    sylvaproject.org/cluster-secrets: 'true'
                  annotations:
                    sylvaproject.org/cluster-secrets-type: user
                    sylvaproject.org/password-sha256sum: \{{ sha256sum .password }}
                data:
                  username: root
            data:
              - secretKey: password
                remoteRef:
                  conversionStrategy: Unicode
                  key: "{{request.object.spec.clusterName}}/root-password"
                  property: password
