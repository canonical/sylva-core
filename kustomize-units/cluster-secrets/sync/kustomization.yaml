apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../kube-cronjob

configMapGenerator:
  - name: kube-cronjob-cm
    behavior: merge
    files:
      - kube-cronjob.sh=cluster-secrets.sh
    options:
      disableNameSuffixHash: true

patches:
- target:
    kind: CronJob
  path: xtemplate-cluster-secrets-cronjob.yaml
- target:
    kind: ClusterRole
  path: rbac.yaml
