apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://raw.githubusercontent.com/openshift/assisted-service/v2.41.0/hack/crds/hive.openshift.io_clusterdeployments.yaml
  - https://raw.githubusercontent.com/openshift/assisted-service/v2.41.0/hack/crds/hive.openshift.io_clusterimagesets.yaml
  - https://github.com/openshift/assisted-service/config/default?ref=v2.41.0
  - agentconfig.yaml
  - root-fsGroup-assisted-installer.yaml # test workaround for https://gitlab.com/sylva-projects/sylva-core/-/merge_requests/2654#note_2114765991

# ocm-2.12-2024-10-30 build
images:
  - name: quay.io/edge-infrastructure/assisted-service
    newName: quay.io/edge-infrastructure/assisted-service
    newTag: ocm-2.12-2024-10-30

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: infrastructure-operator
      namespace: assisted-installer
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: quay.io/edge-infrastructure/assisted-service:ocm-2.12-2024-10-30
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: quay.io/edge-infrastructure/assisted-service-el8:ocm-2.12-2024-10-30
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: quay.io/edge-infrastructure/assisted-image-service:ocm-2.12-2024-10-30
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: quay.io/sclorg/postgresql-12-c8s@sha256:663089471e999a4175341ac4d97dcff9cd15ec5f2e96b2309dc8de806106198b
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: quay.io/edge-infrastructure/assisted-installer-agent:ocm-2.12-2024-10-30
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: quay.io/edge-infrastructure/assisted-installer-controller:ocm-2.12-2024-10-30
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: quay.io/edge-infrastructure/assisted-installer:ocm-2.12-2024-10-30
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: HTTP_PROXY
          value: "${HTTP_PROXY}"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: HTTPS_PROXY
          value: "${HTTPS_PROXY}"
      - op: add
        path: "/spec/template/spec/containers/0/env/-"
        value:
          name: NO_PROXY
          value: "${NO_PROXY}"
  - target:
      version: v1
      kind: Namespace
    patch: |-
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: baseline

labels:
  - pairs:
      clusterctl.cluster.x-k8s.io: ""
