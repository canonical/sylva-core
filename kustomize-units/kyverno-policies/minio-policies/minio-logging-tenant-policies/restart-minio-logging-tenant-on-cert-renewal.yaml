apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: restart-minio-logging-tenant-on-cert-renewal
  namespace: minio-logging
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      This policy monitors MinIO-logging tenant certificate secrets and will update annotations
      to trigger pod rollouts when certificates are renewed.
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
  - name: minio-logging-tenant-restart
    match:
      any:
      - resources:
          kinds:
          - Secret
          names:
          - minio-logging-internal-tls
    mutate:
      targets:
        - apiVersion: minio.min.io/v2
          kind: Tenant
          name: logging
          namespace: minio-logging
      patchStrategicMerge:
        spec:
          poolsMetadata:
            annotations:
              minio-logging/triggerrestart: "{{request.object.metadata.resourceVersion}}"
