apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: restart-${TENANT_NS}-tenant-on-cert-renewal
  namespace: ${TENANT_NS}
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      This policy monitors ${TENANT_NS} tenant certificate secrets and will update annotations
      to trigger pod rollouts when certificates are renewed.
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
  - name: ${TENANT_NS}-tenant-restart
    match:
      any:
      - resources:
          kinds:
          - Secret
          names:
          - ${TENANT_NS}-internal-tls
    mutate:
      targets:
        - apiVersion: apps/v1
          kind: StatefulSet
          namespace: ${TENANT_NS}
      patchStrategicMerge:
        spec:
          template:
            metadata:
              annotations:
                ${TENANT_NS}/triggerrestart: "{{ request.object.data || '' | to_string(@) | sha256(@) | truncate(@,`12`) }}"
