apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: block-rke2-uninstall-jobs
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      block rke2 helmchart jobs if they try to uninstall critical components like calico, coredns, metallb
spec:
  background: false
  validationFailureAction: Enforce
  webhookConfiguration:
    matchConditions:
    - name: is-create
      expression: request.operation == "CREATE"
    - name: is-calico-or-metallb
      expression: >-
        has(object.metadata) && object.metadata.name in [
          "helm-delete-rke2-calico",
          "helm-delete-rke2-calico-crd",
          "helm-delete-rke2-coredns",
          "helm-delete-metallb",
        ]
  rules:
    - name: block-job
      match:
        any:
        - resources:
            kinds:
              - batch/v1/Job
      validate:
        message: Sylva prevents the deletion of Calico, MetalLB and CoreDNS by the RKE2 HelmCharts controller
        deny: {}
