apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: block-rke2-uninstall-jobs
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      block rke2 helmchart jobs if they try to uninstall critical components like calico, coredns
    #sylva.org/kyverno-exclude-kube-system: add-matchCondition  # purposefully not set, this policy works in kube-system
spec:
  background: false
  validationFailureAction: Enforce
  webhookConfiguration:
    matchConditions:
    - name: kube-system-ns
      expression: request.namespace == "kube-system"
    - name: is-create
      expression: request.operation == "CREATE"
    - name: is-calico-or-coredns
      expression: >-
        request.name in [
          "helm-delete-rke2-calico",
          "helm-delete-rke2-calico-crd",
          "helm-delete-rke2-coredns",
        ]
  rules:
    - name: block-job
      match:
        any:
        - resources:
            kinds:
              - batch/v1/Job
      validate:
        message: Sylva prevents the deletion of Calico, CoreDNS by the RKE2 HelmCharts controller
        deny: {}
---
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: block-rke2-uninstall-jobs
  namespace: metallb-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      block rke2 helmchart jobs if they try to uninstall critical components like metallb
    sylva.org/kyverno-exclude-kube-system: add-matchCondition
spec:
  background: false
  validationFailureAction: Enforce
  webhookConfiguration:
    matchConditions:
    - name: metallb-ns
      expression: request.namespace == "metallb-system"
    - name: is-create
      expression: request.operation == "CREATE"
    - name: is-metallb
      expression: >-
        request.name in [
          "helm-delete-metallb",
        ]
  rules:
    - name: block-job
      match:
        any:
        - resources:
            kinds:
              - batch/v1/Job
      validate:
        message: Sylva prevents the deletion of MetalLB by the RKE2 HelmCharts controller
        deny: {}
