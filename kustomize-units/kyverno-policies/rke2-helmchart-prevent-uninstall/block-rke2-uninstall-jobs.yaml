apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: block-rke2-uninstall-jobs
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/description: >-
      block rke2 helmchart jobs if they try to uninstall critical components like calico, coredns, metallb
spec:
  background: true
  validationFailureAction: Enforce
  rules:
    - name: block-job
      match:
        any:
        - resources:
            kinds:
              - batch/v1/Job
            names:
              - helm-delete-rke2-calico
              - helm-delete-rke2-calico-crd
              - helm-delete-rke2-coredns
              - helm-delete-metallb
      validate:
        deny:
          conditions:
            - key: '{{request.operation}}'
              operator: AnyIn
              value:
              - CREATE
