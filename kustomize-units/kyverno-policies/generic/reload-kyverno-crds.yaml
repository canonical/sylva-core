apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: refresh-kyverno-crds
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Refresh Kyverno CRDs
    policies.kyverno.io/category: Other
    kyverno.io/kyverno-version: 1.12.0
    kyverno.io/kubernetes-version: "1.24"
    policies.kyverno.io/subject: HelmReleases
    policies.kyverno.io/description: >-
      Trigger an restart of kyverno pods on CRD changes
      See https://gitlab.com/sylva-projects/sylva-core/-/issues/1899
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: refresh-kyverno-CRDs
    match:
      any:
      - resources:
          kinds:
          - apiextensions.k8s.io/*/CustomResourceDefinition
    context:
    - name: resourcesHash
      apiCall:
        urlPath: "/apis/apiextensions.k8s.io/v1/customresourcedefinitions"
        jmesPath: "items[].[metadata.name, spec.versions[].name] | to_string(@) | sha256(@)"
    mutate:
      targets:
      - apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        name: kyverno
        namespace: sylva-system
      patchStrategicMerge:
        spec:
          values:
            admissionController:
              podAnnotations:
                crdHash: "{{ resourcesHash }}"
