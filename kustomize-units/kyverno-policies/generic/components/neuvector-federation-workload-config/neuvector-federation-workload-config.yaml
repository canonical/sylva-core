apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: reconcile-neuvector-helmrelease
  namespace: sylva-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Reconcile Neuvector HelmRelease
    policies.kyverno.io/minversion: 1.12.0
    policies.kyverno.io/description: >-
      Reconcile neuvector HelmRelease when neuvector-federation-* is created, excluding sylva-system namespace
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: reconcile-neuvector-helmrelease
      match:
        resources:
          kinds:
            - HelmRelease
          namespaces:
            - "*"
      context:
        - name: configMapData
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.namespace }}/configmaps/neuvector-federation-{{ request.namespace }}"  # Utilisation de l'interpolation
            jmesPath: "data"  # Récupère les données du ConfigMap
      mutate:
        targets:
          - apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            name: neuvector
            namespace: "{{ request.namespace }}"
        patchesJson6902:
          - target:
              group: helm.toolkit.fluxcd.io
              version: v2
              kind: HelmRelease
              name: neuvector
              namespace: "{{ request.namespace }}"
            patch: |
              - op: add
                path: /spec/values/controller/configmap/data/fedinitcfg.yaml
                value: |
                  {{ configMapData | toJson }}  # Injecte les données du ConfigMap
      validate:
        message: "HelmRelease cannot be updated in the sylva-system namespace."
        pattern:
          metadata:
            namespace: "!sylva-system"  # Exclure le namespace sylva-system