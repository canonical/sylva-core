apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kubevirt-manager-exception
  namespace: kubevirt-manager
spec:
  exceptions:
  - policyName: disallow-latest-and-main-tag
    ruleNames:
    - require-valid-image-tag
    - autogen-require-valid-image-tag
    - autogen-cronjob-require-valid-image-tag
  match:
    any:
    - resources:
        kinds:
        - Pod
        - Deployment
        - ReplicaSet
        - DaemonSet
        - StatefulSet
        - CronJob
        - Job
        namespaces:
        - kubevirt-manager
        names:
        - kubevirt-manager-scanner*
        - kubevirt-manager-updater*
