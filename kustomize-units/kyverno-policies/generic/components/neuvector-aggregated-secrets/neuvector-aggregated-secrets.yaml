apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: neuvector-aggregated-secret
  namespace: sylva-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Aggregate neuvector credentials
    policies.kyverno.io/minversion: 1.12.0
    policies.kyverno.io/description: >-
      Aggregate neuvector credentials from various (workload) cluster namespaces
      into a secret that is usable by neuvector HelmRelease
    sylva.org/kyverno-exclude-kube-system: add-matchCondition
spec:
  generateExisting: true
  webhookConfiguration:
    matchConditions:
    - name: is-neuvector-aggregated-secret
      expression: "has(object.metadata) && has(object.metadata.labels) && 'sylva.io/aggregated-secret' in object.metadata.labels && object.metadata.labels['sylva.io/aggregated-secret'] == 'neuvector'"
  rules:
  - name: neuvector-aggregated-secret
    match:
      any:
      - resources:
          kinds:
          - Secret
          selector:
            matchLabels:
              sylva.io/aggregated-secret: neuvector
    context:
    - name: tenantList
      apiCall:
        urlPath: "/api/v1/secrets?labelSelector=sylva.io/aggregated-secret=neuvector"
        jmesPath: "items[].data.{name: base64_decode(username), password:base64_decode(password)}"
      # Build a config that matches the chart values format, so that secret can be merged as is
      # to the chart values (without specifying targetPath, otherwise values would be injected as a string)
      # Secret content will have the following structure:
      #   neuvector:
      #     tenants:
      #     - name: management-cluster
      #       password: foo
      #     - name: test-workload1
      #       password: bar
    - name: neuvectorConfig
      variable:
        value:
          neuvector:
            tenants: "{{ tenantList }}"
    generate:
      synchronize: true
      apiVersion: v1
      kind: Secret
      name: neuvector-secrets
      namespace: sylva-system
      data:
        type: Opaque
        data:
          secrets: "{{ neuvectorConfig | to_string(@) | base64_encode(@) }}"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: reconcile-neuvector-helmrelease
  namespace: sylva-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Reconcile sylve-units HelmReleases
    policies.kyverno.io/minversion: 1.12.0
    policies.kyverno.io/description: >-
      Reconcile neuvector HelmRelease when neuvector-secrets is updated
    sylva.org/kyverno-exclude-kube-system: add-matchCondition
spec:
  mutateExistingOnPolicyUpdate: true
  webhookConfiguration:
    matchConditions:
    - name: is-neuvector-aggregated-secret
      expression: "has(object.metadata) && object.metadata.namespace == 'sylva-system' && object.metadata.name == 'neuvector-secrets'"
  rules:
  - name: reconcile-neuvector-helmrelease
    skipBackgroundRequests: false # Required here as we match a resource generated by background controller in previous policy
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - sylva-system
          names:
          - neuvector-secrets
    mutate:
      targets:
      - apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        name: neuvector
        namespace: sylva-system
      patchStrategicMerge:
        metadata:
          annotations:
            reconcile.fluxcd.io/requestedAt: "{{ time_now_utc() }}"
            kyverno.reconcile-neuvector-helmrelease/requestedAt: "{{ time_now_utc() }}"
