apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: merge-neuvector-secrets
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
  - name: merge-neuvector-secrets
    match:
      resources:
        kinds:
        - Secret
        names:
        - neuvector-oidc-init
        namespaces:
        - neuvector
    mutate:
      targets:
      - apiVersion: v1
        kind: Secret
        name: neuvector-init
        namespace: neuvector
      patchesJson6902: |-
        - path: "/data/oidcinitcfg.yaml"
          op: add
          value: {{request.object.data.oidcinitcfg}}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-sylva-ca
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  rules:
  - name: add-sylva-ca
    match:
      resources:
        kinds:
        - Deployment
        names:
        - neuvector-controller-pod
        namespaces:
        - neuvector
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            name: "{{request.object.metadata.name}}"
        spec:
          template:
            spec:
              containers:
                - name: neuvector-controller-pod
                  volumeMounts:
                    - name: keycloak-ca
                      mountPath: /etc/ssl/certs
              volumes:
                - name: keycloak-ca
                  secret:
                    secretName: sylva-ca.crt
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: reconcile-neuvector-helmrelease
  namespace: sylva-system
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Reconcile Neuvector HelmRelease
    policies.kyverno.io/minversion: 1.12.0
    policies.kyverno.io/description: >-
      Reconcile neuvector HelmRelease when neuvector-federation-* is created, excluding sylva-system namespace
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: reconcile-neuvector-helmrelease
      match:
        any:
          - resources:
              kinds:
              - HelmRelease
              names:
              - neuvector
              namespaces:
              - "*"
      exclude:
        any:
          - resources:
              namespaces:
                - sylva-system
      context:
        - name: configMapData
          configMap:
            name: "neuvector-federation-{{ request.namespace }}"
            namespace: neuvector
      mutate:
        targets:
          - apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            name: neuvector
            namespace: "{{ request.namespace }}"
        patchStrategicMerge:
          metadata:
            annotations:
              reconcile.fluxcd.io/requestedAt: "{{ time_now_utc() }}"
              kyverno.reconcile-neuvector-helmrelease/requestedAt: "{{ time_now_utc() }}"
          spec:
            values:
              controller:
                configmap:
                  data:
                    fedinitcfg.yaml: |
                      {{ configMapData.data.fedinitcfg }}
