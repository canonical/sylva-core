apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: check-image
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    policies.kyverno.io/title: Check Image Signature
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Check the signature of the image when it is signed.
spec:
  validationFailureAction: ${SIGN_MGMT}
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: check-image
      match:
        any:
        - resources:
            kinds:
              - Pod
      verifyImages:
        - repository: ${SIG_REPO}
          mutateDigest: ${DIGEST}
          verifyDigest: ${DIGEST}
          required: ${DIGEST}
          imageReferences: ${IMAGE_LIST}
          attestors:
          - entries:
            - keys:
                publicKeys: ${COSIGN_PUBLIC_KEY}
                rekor:
                  ignoreTlog: true
                  url: https://rekor.sigstore.dev
