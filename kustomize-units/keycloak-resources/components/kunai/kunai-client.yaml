---
apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakClient
metadata:
  name: kunai-client
  namespace: keycloak
  labels:
    realm1: sylva
spec:
  realmSelector:
    matchLabels:
      realm1: sylva
  roles:
    - name: admin
    - name: editor
    - name: viewer
  client:
    clientId: kunai
    name: kunai
    enabled: true
    protocol: openid-connect
    publicClient: false
    implicitFlowEnabled: false
    clientAuthenticatorType: client-secret
    rootUrl: "https://${KUNAI_DNS}"
    adminUrl: "https://${KUNAI_DNS}"
    baseUrl: "https://${KUNAI_DNS}"
    redirectUris:
      - "https://${KUNAI_DNS}/*"
    webOrigins:
      - "https://${KUNAI_DNS}"
    directAccessGrantsEnabled: true
    standardFlowEnabled: true
    attributes:
      use.refresh.tokens: "true"
    defaultClientScopes:
      - "profile"
      - "openid"
      - "email"
      - "roles"
      - "offline_access"
    optionalClientScopes:
      - "phone"
      - "openid"
      - "address"
    protocolMappers:
      - name: Groups Mapper
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          full.path: "false"
          id.token.claim: "false"
          access.token.claim: "false"
          userinfo.token.claim: "true"
          claim.name: groups
