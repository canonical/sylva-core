---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: loki
  namespace: cattle-logging-system
spec:
  loki:
    buffer:
      chunk_limit_size: 1MB
      timekey: 5m
      timekey_wait: 30s
    configure_kubernetes_labels: true
    extra_labels:
      job: ${CLUSTER_NAME}-job
    tenant: ${CLUSTER_NAME}
    url: ${LOKI_URL}
    insecure_tls: true
    username:
      value: ${LOKI_USERNAME}
    password:
      value: ${LOKI_PASSWORD}
