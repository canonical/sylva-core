apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  labels:
    app: sso
spec:
  db:
    vendor: postgres
    host: cnpg-keycloak-rw
    usernameSecret:
      name: cnpg-keycloak-app
      key: username
    passwordSecret:
      name: cnpg-keycloak-app
      key: password
  hostname:
    hostname: https://${KEYCLOAK_DNS}
  http:
    tlsSecret: keycloak-internal-tls
  ingress:
    enabled: false
  instances: 1
  unsupported:
    podTemplate:
      spec:
        serviceAccountName: keycloak
        containers:
          - securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              runAsGroup: 1000
              runAsNonRoot: true
              runAsUser: 1000
              seccompProfile:
                type: RuntimeDefault
            env: []
