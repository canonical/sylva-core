apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Job
    patch: |
      # Add writable /.config for clusterctl
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: clusterctl-config
          emptyDir: {}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /.config
          name: clusterctl-config
  - target:
      kind: CronJob
    patch: |
      # Add writable /.config for clusterctl
      - op: add
        path: /spec/jobTemplate/spec/template/spec/volumes/-
        value:
          name: clusterctl-config
          emptyDir: {}
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /.config
          name: clusterctl-config
  - target:
      kind: ClusterRole
    patch: |
      - op: replace
        path: /rules
        value:
          - apiGroups: [apiextensions.k8s.io]
            resources: [customresourcedefinitions]
            verbs: ["get", "list"]
          - apiGroups: [runtime.cluster.x-k8s.io]
            resources: [extensionconfigs]
            verbs: ["get", "list"]
          - apiGroups: [clusterctl.cluster.x-k8s.io]
            resources: [providers]
            verbs: ["get", "list"]

configMapGenerator:
- name: kube-job-cm
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - kube-job.sh=backup-cluster-capi.sh
- name: kube-cronjob-cm
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - kube-cronjob.sh=backup-cluster-capi.sh
