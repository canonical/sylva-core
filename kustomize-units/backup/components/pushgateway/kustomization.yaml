apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: CronJob
    patch: |
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/-
        value:
          name: PUSHGATEWAY_URL
          value: "http://prometheus-pushgateway.pushgateway.svc.cluster.local:9091"
