apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - cert.yaml

patches:
  - target:
      kind: Job
    patch: |
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: s3-certs
          secret:
            secretName: backup-store-s3-cert-${CRONJOB_NAME}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /s3-config/certs/CAs
          name: s3-certs
  - target:
      kind: CronJob
    patch: |
      - op: add
        path: /spec/jobTemplate/spec/template/spec/volumes/-
        value:
          name: s3-certs
          secret:
            secretName: backup-store-s3-cert-${CRONJOB_NAME}
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /s3-config/certs/CAs
          name: s3-certs
