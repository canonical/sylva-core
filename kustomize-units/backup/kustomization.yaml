apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../kube-cronjob

patches:
  - target:
      kind: CronJob
    patch: |
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: registry.gitlab.com/sylva-projects/sylva-elements/container-images/kube-job/backup:v1.2.0
