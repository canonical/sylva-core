.:53 {
    errors
    health {
       lameduck 5s
    }
    ready
    kubernetes cluster.local in-addr.arpa ip6.arpa {
       pods insecure
       fallthrough in-addr.arpa ip6.arpa
       ttl 30
    }
    prometheus :9153
    forward . /etc/resolv.conf {
       max_concurrent 1000
    }
    hosts {
      ${MGMT_CLUSTER_VIRTUAL_IP} ${EXTERNAL_HOSTNAMES}
      fallthrough
    }
    cache 30
    loop
    reload
    loadbalance
}
