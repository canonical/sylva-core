apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubevirt-tests

resources:
- kubevirt-tests-namespace.yaml
- multus-nw.yaml
- multus-vm.yaml
- cirros-vm.yaml
- ../kube-job

configMapGenerator:

- name: kube-job-cm
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - kube-job.sh=job.sh
