apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-nonroot-v2
  namespace: flux-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nonroot-v2  # Directly bind to the SCC
subjects:
- kind: ServiceAccount
  name: notification-controller  # Flux ServiceAccount
  namespace: flux-system
- kind: ServiceAccount
  name: source-controller  # Flux ServiceAccount
  namespace: flux-system
