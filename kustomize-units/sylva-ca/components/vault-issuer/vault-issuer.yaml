apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: certificate-issuer
spec:
  vault:
    path: ${VAULT_PATH}
    server: ${ISSUER_SERVER} # e.g. https://vaultserver:8200
    caBundle: ${CA_CHAIN}
    auth:
      tokenSecretRef:
        name: external-vault-token
        key: token
