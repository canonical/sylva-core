apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${CA_NAME}
  namespace: cert-manager
spec:
  isCA: true
  duration: 25920h  # 25920h is approx. 3 years
  commonName: ${CA_COMMON_NAME}
  secretName: ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  subject:
    organizations:
    - ${CA_O_NAME}
    countries:
    - eu
    organizationalUnits:
    - DEV
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-certificate-issuer
spec:
  ca:
    secretName: ca-key-pair
