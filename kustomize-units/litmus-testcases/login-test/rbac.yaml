apiVersion: v1
kind: ServiceAccount
metadata:
  name: login-test-sa
  namespace:  "litmus"
  labels:
    name: login-test-sa
    app.kubernetes.io/part-of: litmus

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: login-test-clusterrole
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: login-test-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: login-test-clusterrole
subjects:
- kind: ServiceAccount
  name: login-test-sa
  namespace: "litmus"
