---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: '${SERVICE_NAME}'
  namespace: '${NAMESPACE}'
  labels:
    name: '${SERVICE_NAME}'
    app.kubernetes.io/part-of: litmus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '${SERVICE_NAME}'
  labels:
    name: '${SERVICE_NAME}'
    app.kubernetes.io/part-of: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: litmus-sa
subjects:
  - kind: ServiceAccount
    name: '${SERVICE_NAME}'
    namespace: '${NAMESPACE}'

