apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: '${UNIT_NAME}'
  namespace: '${NAMESPACE}'
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
spec:
  appinfo:
    appns: '${NAMESPACE}'
    applabel: '${APP_LABEL}'
    appkind: '${APP_KIND}'

  ## It can be true/false
  annotationCheck: 'false'
  # It can be active/stop
  engineState: 'active'
  chaosServiceAccount: '${UNIT_NAME}'
  monitoring: false
  # It can be delete/retain
  jobCleanUpPolicy: 'retain'
  experiments:
    - name: '${UNIT_NAME}'
      spec:
        probe: '${PROBE_DATA}'
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: ${QUOTE}${TOTAL_CHAOS_DURATION}${QUOTE}

            # set chaos interval (in sec) as desired
            - name: CHAOS_INTERVAL
              value: ${QUOTE}${CHAOS_INTERVAL}${QUOTE}

            ## percentage of total pods to target
            - name: PODS_AFFECTED_PERC
              value: ${QUOTE}${PODS_AFFECTED_PERC}${QUOTE}
