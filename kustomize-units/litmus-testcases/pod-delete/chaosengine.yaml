apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-delete-chaos-2-1727759643
  namespace: 'vault'
spec:
  appinfo:
    appns: 'vault'
    applabel: 'vault-active=true'
    appkind: 'statefulset'
    
  ## It can be true/false
  annotationCheck: 'false'
  # It can be active/stop
  engineState: 'active'
  chaosServiceAccount: pod-delete-sa
  monitoring: false
  # It can be delete/retain
  jobCleanUpPolicy: 'delete'
  experiments:
    - name: pod-delete-2-1727759643
      spec:
         probe:
         - name: "CMD Probe--> Execute Vault Login Test Script"
           type: "cmdProbe"
           cmdProbe/inputs:
             command: "/scripts/vault.sh"
             comparator:
               type: "string"
               criteria: "contains"
               value: "Failed files:    0"
             source:
               image: nikhilsethi31/login-test:vault-login-test
           mode: SOT
           runProperties:
             probeTimeout: "30s"
             interval: "30s"
             retry: 0
             initialDelaySeconds: 0
         - name: "HTTP Probe--> Check Vault url reachability"
           type: "httpProbe"
           httpProbe/inputs:
             url: "https://vault-0:8200"
             insecureSkipVerify: true
             method:
               get: 
                 criteria: == # ==, !=, oneof
                 responseCode: "200"
           mode: "SOT"
           runProperties:
             probeTimeout: "10s" 
             interval: "10s" 
             retry: 0
             initialDelaySeconds: 0
         - name: "CMD Probe--> Check vault pod is in unsealed state"
           type: "cmdProbe"
           cmdProbe/inputs:
             command: "kubectl exec -n vault vault-1 -- vault status | grep Sealed"
             comparator:
               type: "string"
               criteria: "contains"
               value: "false"
             source:
               image: enilegu/alpine-kubectl:v1.0.4
           mode: SOT
           runProperties:
             probeTimeout: "30s"
             interval: "30s"
             retry: 0
             initialDelaySeconds: 0
             probePollingInterval: "0s"
         - name: "K8S Probe--> Pod Creation After Chaos"
           type: "k8sProbe"
           k8sProbe/inputs:
             group: ""
             version: "v1"
             resource: "pods"
             namespace: "vault"
             operation: "create"
           mode: EOT
           runProperties:
             probeTimeout: "10s"
             interval: "10s"
             retry: 0
             initialDelaySeconds: 210
             probePollingInterval: "300s"
           data: |
             apiVersion: v1
             kind: Pod
             metadata:
               name: nginx-pod
               labels:
                 app: nginx
             spec:
               affinity:
                 nodeAffinity:
                   requiredDuringSchedulingIgnoredDuringExecution:
                     nodeSelectorTerms:
                     - matchExpressions:
                       - key: kubernetes.io/hostname
                         operator: In
                         values:
                         - "management-cluster-cp-db7de73e8b-8m66k"
               containers:
               - name: nginx-container
                 image: nginx:stable-perl
                 ports:
                 - containerPort: 80
         - name: "K8S Probe--> Pod Deletion After Chaos"
           type: "k8sProbe"
           k8sProbe/inputs:
             group: ""
             version: "v1"
             resource: "pods"
             namespace: "vault"
             operation: "delete"
             labelSelector: "app=nginx"
             fieldSelector: ""
           mode: EOT
           runProperties:
             probeTimeout: "10s"
             interval: "10s"
             retry: 0
             initialDelaySeconds: 240
             probePollingInterval: "0s"
         components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '30'

            # set chaos interval (in sec) as desired
            - name: CHAOS_INTERVAL
              value: '10'

            ## percentage of total pods to target
            - name: PODS_AFFECTED_PERC
              value: ''
