apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: '${SERVICE_NAME}'
  namespace: '${NAMESPACE}'
spec:
  appinfo:
    appns: '${NAMESPACE}'
    applabel: '${APP_LABEL}'
  ## It can be true/false
  annotationCheck: 'false'
  # It can be active/stop
  engineState: 'active'
  chaosServiceAccount: '${SERVICE_NAME}'
  monitoring: false
  # It can be delete/retain
  jobCleanUpPolicy: 'delete'
  experiments:
    - name: '${SERVICE_NAME}'
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '${TOTAL_CHAOS_DURATION}'

            # set chaos interval (in sec) as desired
            - name: CHAOS_INTERVAL
              value: '${CHAOS_INTERVAL}'

            - name: APP_NAMESPACE
              value: '${NAMESPACE}'
