apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-api-response-sa
  namespace: "litmus"
  labels:
    name: k8s-api-response-sa
    app.kubernetes.io/part-of: litmus

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-api-response-clusterrole
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-api-response-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-api-response-clusterrole
subjects:
- kind: ServiceAccount
  name: k8s-api-response-sa
  namespace: "litmus"
