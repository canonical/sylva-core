---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: propagate-ca
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  rules:
  - name: reconcile-on-secret-update
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - ${NAMESPACE}
          names:
          - ca-key-pair
    mutate:
      targets:
      - apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
        kind: Kustomization
        name: wkld-copy-file
        namespace: ${NAMESPACE}
      patchStrategicMerge:
        metadata:
          annotations:
            reconcile.fluxcd.io/requestedAt: "{{ time_now_utc() }}"
            kyverno_applied: "true"
        spec:
          postBuild:
            substituteFrom:
            - kind: Secret
              name: ca-key-pair