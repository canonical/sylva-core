---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-operator-internal-certificate
  namespace: minio-operator
spec:
  secretName: sts-tls
  issuerRef:
    name: certificate-issuer
    kind: ClusterIssuer
  commonName: minio-operator
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  dnsNames:
    - sts
    - sts.minio-operator.svc
    - sts.minio-operator.svc.cluster.local
    - sts.minio-operator.svc.${CLUSTER_DOMAIN}"
  ipAddresses:
  - 127.0.0.1
