---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
   name: ${TENANT_NS}-root
   namespace: ${TENANT_NS}
spec:
   secretStoreRef:
      name: vault
      kind: ClusterSecretStore
   target:
      creationPolicy: Orphan
      name: ${TENANT_NS}-root
      template:
         type: Opaque
         data:
            config.env: |-
              export MINIO_ROOT_USER=${TENANT_NS}-root
              export MINIO_ROOT_PASSWORD="{{ .password | toString }}"
   data:
   - secretKey: password
     remoteRef:
        key: ${SECRET_PATH}/data/${TENANT_NS}-root-password
        property: password
