apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: default-nginx-tls
spec:
  secretName: default-nginx-tls
  issuerRef:
    name: certificate-issuer
    kind: ClusterIssuer
  commonName: ${CLUSTER_IP}
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  emailAddresses:
  - surname.name@sylva.org
  subject:
    organizations:
    - Sylva
    countries:
    - EU
    organizationalUnits:
    - Sylva-OU
  dnsNames:
  - localhost
  ipAddresses:
  - 127.0.0.1
  - ${CLUSTER_IP}
