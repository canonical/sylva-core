---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
   name: loki-minio-user
   namespace: sylva-system
spec:
   secretStoreRef:
      name: vault
      kind: ClusterSecretStore
   target:
      creationPolicy: Orphan
      name: loki-minio-user
      template:
         type: Opaque
         data:
            CONSOLE_ACCESS_KEY: minio-logging-user
            CONSOLE_SECRET_KEY: "{{ .password | toString }}"
   data:
   - secretKey: password
     remoteRef:
        key: ${SECRET_PATH}/data/minio-logging-user-password
        property: password
