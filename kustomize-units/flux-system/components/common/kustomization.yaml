apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        template:
          spec:
            containers:
              - name: manager
                env:
                  - name: "http_proxy"
                    value: "${http_proxy}"
                  - name: "https_proxy"
                    value: "${https_proxy}"
                  - name: "no_proxy"
                    value: "localhost,${no_proxy},${KIND_POD_SUBNET},${KIND_SVC_SUBNET},.cluster.local.,.cluster.local,.svc"
    target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=flux

# workaround for https://gitlab.com/sylva-projects/sylva-core/-/issues/1738#note_2181546896
images:
- name: ghcr.io/fluxcd/helm-controller
  newName: registry.gitlab.com/sylva-projects/sylva-elements/container-images/sandbox-registry/helm-controller
  newTag: v1.0.1-helm-oci-replace-underscore-plus
