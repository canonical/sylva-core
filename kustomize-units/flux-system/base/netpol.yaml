---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-sylva-workload-cluster-operator
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      app: source-controller
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: namespace
          app.kubernetes.io/created-by: workload-cluster-operator
      podSelector:
        matchLabels:
          control-plane: controller-manager
    ports:
    - protocol: TCP
      port: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-sylva-sylva-units-operator
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      app: source-controller
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: namespace
          app.kubernetes.io/created-by: sylva-units-operator
      podSelector:
        matchLabels:
          control-plane: controller-manager
    ports:
    - protocol: TCP
      port: http