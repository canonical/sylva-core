apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/fluxcd/flux2/releases/download/v2.4.0/install.yaml
components:
  - ../components/common
  - ../components/extra-config

patches:
- target:
    labelSelector: app.kubernetes.io/component=image-automation-controller
  patch: |-
    $patch: delete
    kind: _unused_
    metadata:
      name: _unused_
- target:
    labelSelector: app.kubernetes.io/component=image-reflector-controller
  patch: |-
    $patch: delete
    kind: _unused_
    metadata:
      name: _unused_
- target:
    kind: Deployment
    name: helm-controller
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 2Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Gi
