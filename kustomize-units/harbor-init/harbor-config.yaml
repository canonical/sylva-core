---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
   name: harbor-init
   namespace: harbor
   annotations:
      kustomize.toolkit.fluxcd.io/force: Enabled
spec:
   secretStoreRef:
      name: vault
      kind: ClusterSecretStore
   target:
      creationPolicy: Orphan
      name: harbor-init
      template:
         type: Opaque
         data:
            HARBOR_ADMIN_PASSWORD: "{{ .password | toString }}"
   data:
   - secretKey: password
     remoteRef:
        key: secret/data/${CLUSTER_NAME:management-cluster}/harbor-passwd
        property: password
