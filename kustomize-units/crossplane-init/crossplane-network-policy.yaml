apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-crossplane-ingress
  namespace: crossplane-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: crossplane
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          namespace: kube-system
    ports:
    - port: 9443
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: crossplane
    ports:
    - port: 9443
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          pkg.crossplane.io/function: function-extra-resources
    - podSelector:
        matchLabels:
          app: crossplane-provider
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: crossplane-rbac-manager
    ports:
    - port: 9443
      protocol: TCP
  egress:
  - {} # Allow all egress traffic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rbac-manager-ingress
  namespace: crossplane-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: crossplane-rbac-manager
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: crossplane
    - podSelector:
        matchLabels:
          app: crossplane-provider
    ports:
    - port: 9443
      protocol: TCP
  egress:
  - {} # Allow all egress traffic
