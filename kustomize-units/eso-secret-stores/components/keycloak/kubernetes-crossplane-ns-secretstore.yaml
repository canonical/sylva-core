apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: eso-store-k8s-crossplane
spec:
  provider:
    kubernetes:
      remoteNamespace: crossplane-system # with this, the store is able to pull only from `crossplane-system` namespace
      server:
       # url can be omitted and defaults to kubernetes.default
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: sylva-system
      auth:
        serviceAccount:
          name: eso-store-crossplane-sa
          namespace: crossplane-system
  # conditions about namespaces in which the ClusterSecretStore is usable for ExternalSecrets
  conditions:
    - namespaces:
        - "flux-system"
        - "neuvector"
        - "harbor"
        - "cattle-global-data"
        - "keycloak"
        - "crossplane-system"
        - "gitea"
        - "cattle-monitoring-system"
        - "sylva-system"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-store-crossplane-role
  namespace: crossplane-system
rules:
- apiGroups: [""]
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.k8s.io
  resources:
  - selfsubjectrulesreviews
  verbs:
  - create
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-store-crossplane-sa
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-store-crossplane-role-binding
  namespace: crossplane-system
subjects:
- kind: ServiceAccount
  name: eso-store-crossplane-sa
  namespace: crossplane-system
roleRef:
  kind: Role
  name: eso-store-crossplane-role
  apiGroup: rbac.authorization.k8s.io
