apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: ${SECRET_PATH}
      version: v2
      caProvider:
        type: Secret
        name: ca-key-pair
        namespace: cert-manager
        key: ca.crt
      auth:
        kubernetes:
          mountPath: ${K8S_AUTH_PATH}
          role: secret-reader
          serviceAccountRef:
            name: default
            namespace: vault
