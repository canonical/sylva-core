---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
   name: thanos-minio-user
   namespace: sylva-system
   annotations:
      kustomize.toolkit.fluxcd.io/force: Enabled
spec:
   secretStoreRef:
      name: vault
      kind: ClusterSecretStore
   target:
      creationPolicy: Orphan
      name: thanos-minio-user
      template:
         type: Opaque
         data:
            CONSOLE_ACCESS_KEY: minio-monitoring-user
            CONSOLE_SECRET_KEY: "{{ .password | toString }}"
   data:
   - secretKey: password
     remoteRef:
        key: secret/data/${CLUSTER_NAME:management-cluster}//minio-monitoring-user-passwd
        property: password

