apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/kubernetes-sigs/cluster-api-provider-openstack/releases/download/v0.14.4/infrastructure-components.yaml

# Add labels to enable clusterctl move to retrieve resources correponding to capo CRDs
labels:
  - pairs:
      clusterctl.cluster.x-k8s.io: ""

patches:
# we can't use ../common-kustomize-components/crd-remove-caBundle because
# we need to make an exception for the openstackfloatingippools.infrastructure.cluster.x-k8s.io and openstackservers.infrastructure.cluster.x-k8s.io CRDs
- target:
    group: apiextensions.k8s.io
    version: v1
    kind: CustomResourceDefinition
    annotationSelector: cert-manager.io/inject-ca-from
    name: openstack[^fs].*  # carve an exception to not try this patch on openstackfloatingippools.infrastructure.cluster.x-k8s.io and openstackservers.infrastructure.cluster.x-k8s.io CRDs, for which it does not apply cleanly
  patch: |-
    kind: CustomResourceDefinition
    metadata:
      name: _unused_
    spec:
      conversion:
        webhook:
          clientConfig:
            caBundle: null
