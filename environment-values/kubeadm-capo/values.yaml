---
cluster:

  capi_providers:
    infra_provider: capo
    bootstrap_provider: cabpk
  capo:
    os_image_selector:
      os: ubuntu
      hardened: false
    ssh_key_name: # OpenStack Nova SSH keypair is provided by runner context in CI
    network_id: # OpenStack Neutron network id is provided by runner context in CI

  machine_deployments:
    md0:
      replicas: 1
      capo:
        failure_domain: region0

# We can define users if needed (.cluster.kubeadm.users[])
  #kubeadm:
  #  users:
  #    - name: sylva-user
  #      passwd: "put your password hash here"  # (copy pasted from /etc/shadow or created with "mkpasswd --method=SHA-512 --stdin")
  #      groups: users,sylva-ops
  #      sudo: ALL=(ALL) NOPASSWD:ALL
  #      shell: /bin/bash
  #      lockPassword: false
  #      sshAuthorizedKeys:
  #        - ssh-rsa AAAA...... YOUR KEY HERE ....UqnQ==

openstack:
  storageClass:
    name: "cinder-ceph-ssd"
    type: "ceph_ssd"

proxies:
  # put your own proxy settings here if you need
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""

# configure containerd registry mirrors following https://github.com/containerd/containerd/blob/main/docs/hosts.md
# see charts/syla-units/values.yaml for a more detailled example
# registry_mirrors:
#   hosts_config:
#     docker.io:
#     - mirror_url: http://your.mirror/docker

# add ntp servers if you need
ntp:
  enabled: false
  servers:
  # - 1.2.3.4
  # - 1.2.3.5
