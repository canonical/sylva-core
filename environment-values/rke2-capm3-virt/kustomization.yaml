apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base-capm3-virt

components:
  - ../base-capm3-virt/high-availability

labels:
- includeSelectors: true
  pairs:

configMapGenerator:
- name: sylva-units-values
  behavior: merge
  options:
    disableNameSuffixHash: true
  files:
  - values=values.yaml
