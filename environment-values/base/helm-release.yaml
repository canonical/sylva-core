---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: sylva-units
  labels:
spec:
  interval: 168h
  ref:
    commit: CURRENT_COMMIT # Placeholder that will be replaced by bootstrap.sh and apply.sh commands
  url: SYLVA_CORE_REPO
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sylva-units
  labels:
    sylva-units/protected: ""
spec:
  chart:
    spec:
      sourceRef:
        kind: GitRepository
        name: sylva-units
      chart: charts/sylva-units
      reconcileStrategy: Revision
      valuesFiles:
        - charts/sylva-units/values.yaml
        - charts/sylva-units/management.values.yaml
  driftDetection:
    mode: enabled
    ignore:
      - target:  # until https://gitlab.com/sylva-projects/sylva-core/-/issues/2375 is fully solved
          kind: Kustomization
          name: minio-logging
        paths:
          - /spec/healthCheckExprs
      - target:  # until https://gitlab.com/sylva-projects/sylva-core/-/issues/2375 is fully solved
          kind: Kustomization
          name: minio-monitoring
        paths:
          - /spec/healthCheckExprs
  interval: 24h
  valuesFrom:
  - kind: Secret
    name: sylva-units-secrets
    valuesKey: secrets
  - kind: ConfigMap
    name: sylva-units-values
    valuesKey: values
  - kind: ConfigMap
    name: capo-cluster-resources
    valuesKey: allocated_ip
    targetPath: cluster_virtual_ip
    optional: true
  - kind: ConfigMap
    name: capo-cluster-resources
    valuesKey: allocated_fip
    targetPath: openstack.floating_ip
    optional: true
    # Optional configMap used to save public endpoint
    # (used when it is determined dynamically in bootstrap for libvirt-metal)
  - kind: ConfigMap
    name: cluster-public-endpoint
    valuesKey: endpoint
    targetPath: cluster_public_endpoint
    optional: true

  values:
    source_templates:
      sylva-core:
        spec:
          url: SYLVA_CORE_REPO
          ref:
            commit: CURRENT_COMMIT
