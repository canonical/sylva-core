apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sylva-system

resources:
- helm-release.yaml
- namespace.yaml
- ../ci
- patch-cronjobs-policy.yaml

buildMetadata:
- originAnnotations

# Generate empty secret & configmap to let kustomize overlays & descendants add data with 'behavior: merge'

configMapGenerator:
- name: sylva-units-values
  options:
    disableNameSuffixHash: true

secretGenerator:
- name: sylva-units-secrets
  options:
    disableNameSuffixHash: true

# Apply the patch to modify the CronJob schedule
patches:
  - patch-cronjobs-policy.yaml
