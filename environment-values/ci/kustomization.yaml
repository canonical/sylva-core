apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sylva-system

resources:
  - ../ci

buildMetadata:
  - originAnnotations

configMapGenerator:
  - name: sylva-units-values
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: sylva-units-secrets
    options:
      disableNameSuffixHash: true

# Apply the patch to modify the CronJob schedule
patches:
  - patch-cronjobs-policy.yaml
