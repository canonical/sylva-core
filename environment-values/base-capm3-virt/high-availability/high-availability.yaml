---
cluster:
  control_plane_replicas: 3

  machine_deployments:
    md0:
      replicas: 1

  baremetal_hosts:
    management-cp-0:
      ip_preallocations:
        primary: 192.168.100.20
        provisioning: 192.168.10.20
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:00
        nic2:
          mac_address: 52:54:00:55:55:00
      bmh_metadata:
        labels:
          cluster-role: control-plane
          snmp-enabled: "true"
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8000/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:00
    management-cp-1:
      ip_preallocations:
        primary: 192.168.100.21
        provisioning: 192.168.10.21
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:01
        nic2:
          mac_address: 52:54:00:55:55:01
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8001/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:01
    management-cp-2:
      ip_preallocations:
        primary: 192.168.100.22
        provisioning: 192.168.10.22
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:02
        nic2:
          mac_address: 52:54:00:55:55:02
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8002/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:02
    management-md-0:
      ip_preallocations:
        primary: 192.168.100.23
        provisioning: 192.168.10.23
      # No interface_mappings to test backward compatibility
      bmh_metadata:
        labels:
          cluster-role: worker
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8003/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:03

libvirt_metal:
  #image: registry.gitlab.com/sylva-projects/sylva-elements/container-images/libvirt-metal:_tag_  # customize if wanted
  nodes:
    management-cp-0:
      redfishPort: 8000
      memGB: 24
      numCPUs: 10
    management-cp-1:
      redfishPort: 8001
      memGB: 24
      numCPUs: 10
    management-cp-2:
      redfishPort: 8002
      memGB: 24
      numCPUs: 10
    management-md-0:
      redfishPort: 8003
      memGB: 24
      numCPUs: 10

    workload-cp-0:
      redfishPort: 8010
      memGB: 16 # IPA allocates half of it to tmpfs, if must be large enough to store the image
      numCPUs: 4
      enableDHCP: false
    workload-cp-1:
      redfishPort: 8011
      memGB: 16
      numCPUs: 4
      enableDHCP: false
    workload-cp-2:
      redfishPort: 8012
      memGB: 16
      numCPUs: 4
      enableDHCP: false
    workload-md-0:
      redfishPort: 8013
      memGB: 16
      numCPUs: 4
      enableDHCP: false

