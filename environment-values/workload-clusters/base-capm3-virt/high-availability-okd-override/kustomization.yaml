apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: WORKLOAD_CLUSTER_NAMESPACE

configMapGenerator:
- name: capm3-virt-ha-okd-values
  options:
    disableNameSuffixHash: true
  files:
  - capm3-virt-ha-okd-values=high-availability-okd.yaml

patches:
- target:
    kind: HelmRelease
    name: sylva-units
  patch: |
    - op: add
      path: /spec/valuesFrom/1
      value:
        kind: ConfigMap
        name: capm3-virt-ha-okd-values
        valuesKey: capm3-virt-ha-okd-values
