---
cluster:
  control_plane_replicas: 3

  machine_deployments:
    md0:
      replicas: 1

  baremetal_hosts:
    workload-cp-0:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8010/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:04
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:04
        nic2:
          inspection_name: ens5
      ip_preallocations:
        primary: 192.168.100.70

    workload-cp-1:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8011/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:05
      interface_mappings:
        nic1:
          inspection_name: ens4
        nic2:
          mac_address: 52:54:00:55:55:05
      ip_preallocations:
        primary: 192.168.100.71

    workload-cp-2:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8012/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:06
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:06
        nic2:
          mac_address: 52:54:00:55:55:06
      ip_preallocations:
        primary: 192.168.100.72

    workload-md-0:
      # No interface_mappings to test backward compatibility
      bmh_metadata:
        labels:
          cluster-role: worker
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8013/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:07
      # interface_mappings:
      #   ens4:
      #     mac_address: 52:54:00:44:44:07
      #   ens5:
      #     mac_address: 52:54:00:55:55:07
      ip_preallocations:
        primary: 192.168.100.73

units:
  longhorn:
    enabled: true
    helmrelease_spec:
      values:
        persistence:
          defaultClassReplicaCount: 3   # enable data replication
