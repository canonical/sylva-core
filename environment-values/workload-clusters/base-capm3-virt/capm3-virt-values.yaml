cluster_virtual_ip: 192.168.100.3

cilium_helm_values:
  global:
    clusterCIDR: '{{ first .Values.cluster.cluster_pods_cidrs }}'
    clusterCIDRv4: '{{ first .Values.cluster.cluster_pods_cidrs }}'
    clusterDNS: '{{ regexReplaceAll "[.]0/.*" (first .Values.cluster.cluster_services_cidrs) ".10" }}'
    clusterDomain: cluster.local
    serviceCIDR: '{{ first .Values.cluster.cluster_services_cidrs }}'
  egressGateway:
    enabled: true
  bpf:
    masquerade: true
  kubeProxyReplacement: true
  l7Proxy: false
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 6443
  bgpControlPlane:
    enabled: false
  cni:
    exclusive: false
  hubble:
    enabled: true
    ui:
      enabled: true
    relay:
      enabled: true

cluster:
  cni:
    default_provider: cilium

  capi_providers:
    infra_provider: capm3
    # bootstrap_provider: cabpr

  # Add kind container address to cluster kubernetes api certificate SubjectAltNames,
  # in order to be able to reach it from the outside through kubernetes-external service created by libvirt-metal unit
  # once pivot to management cluster will happen, this IP will be retrieved in a cluster-public-endpoint configMap created for that purpose
  cluster_api_cert_extra_SANs:
    - '{{ .Values._internal.bootstrap_node_ip }}'

  capm3:
    os_image_selector:
      os: ubuntu
    networks:
      primary:
        subnet: 192.168.100.0/24
        gateway: 192.168.100.1
        start: 192.168.100.60
        end: 192.168.100.90
        interface: bond0.100
      provisioning:
        subnet: 192.168.10.0/24
        start: 192.168.10.60
        end: 192.168.10.90
        interface: bond0
    dns_servers: [1.1.1.1]

    default_network_settings:
      bondXmitHashPolicy: "layer2"
      bond_mode: "active-backup"

  control_plane:  # tweak network configuration as needed
    capm3:
      hostSelector:  # criteria for matching labels on BareMetalHost objects defined by baremetal_hosts value
        matchLabels:
          cluster-role: control-plane

    network_interfaces:
      bond0:
        type: bond
        interfaces:
          - nic1
          - nic2
        vlans:
          - id: 100  # VLAN ID is fixed, per libvirt-metal internals
      nic1:
        type: phy
      nic2:
        type: phy

  control_plane_replicas: 1

  machine_deployments:
    md0:
      replicas: 0
      capm3:
        hostSelector:
          matchLabels:
            cluster-role: worker

      network_interfaces:
        bond0:
          type: bond
          interfaces:
            - ens4
            - ens5
          vlans:
            - id: 100  # VLAN ID is fixed, per libvirt-metal internals
        ens4:
          type: phy
        ens5:
          type: phy

  baremetal_host_default:
    longhorn_disk_config:
      - path: "/var/longhorn/disks/disk_by-path_pci-0000:00:0a.0"
        storageReserved: 0
        allowScheduling: true
        tags:
          - vhdd
          - fast
      - path: "/var/longhorn/disks/disk_by-path_pci-0000:00:0b.0"
        storageReserved: 0
        allowScheduling: true
        tags:
          - vhdd
          - fast
    bmh_spec:
      online: true
      description: workload cluster node
      bmc:
        disableCertificateVerification: true
      bootMode: legacy
      rootDeviceHints:
        deviceName: /dev/vda

  baremetal_hosts:  # corresponding credentials need to be set in secrets.yaml
    workload-cp-0:
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:01
        nic2:
          inspection_name: ens5
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8010/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:01
      ip_preallocations:
        primary: 192.168.100.70

