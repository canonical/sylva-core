    provisioning_pool_end: 172.20.86.62
    provisioning_pool_prefix: "26"
    dns_servers:
    - 10.193.21.160
  control_plane:   # tweak network configuration as needed ...
    capm3:
      hostSelector:
        matchLabels:
          cluster-role: control-plane
      provisioning_pool_interface: bond0
      primary_pool_interface: bond0.16
    network_interfaces:
      bond0:
        type: bond
        interfaces:
          - enp138s0f0
          - enp138s0f1
        vlans:
          - id: 16
      enp138s0f0:
        type: phy
      enp138s0f1:
        type: phy
