cluster:
  name: '{{ .Release.Namespace }}'
  k8s_version: v1.27.6+rke2r1
  enable_longhorn: true
  capi_providers:
    infra_provider: capm3
    bootstrap_provider: cabpr
  control_plane_replicas: 1
  rke2:
