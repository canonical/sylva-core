---
units:
  longhorn-crd:
    enabled: false
  longhorn:
    enabled_conditions:
      - false
  multus-ready:
    enabled: false
  sriov-crd:
    enabled: false
  monitoring:
    enabled: false
  monitoring-crd:
    enabled: false
  calico:
    enabled: false
  calico-crd:
    enabled: false
  ingress-nginx:
    enabled: false
  kyverno:
    depends_on:
      monitoring-crd: false
  cluster:
    depends_on:
      calico: '{{ and (tuple . "calico" | include "unit-enabled") .Values._internal.state.is_upgrade }}'
      calico-ready: '{{ and (tuple . "calico-ready" | include "unit-enabled") .Values._internal.state.is_upgrade }}'

cluster_machines_ready:
  wait_timeout: 900s

cluster_domain: okd

cluster:
  name: okd-capm3
  agent_config_format: "ignition"
  capi_providers:
    bootstrap_provider: cabpoa

  capm3:
    machine_image_checksum: https://abcde
    machine_image_checksum_type: sha256
    machine_image_format: live-iso
    machine_image_url: https://abcdef
    dns_servers: '{{ list .Values.cluster.mgmt_cluster_ip }}'
    networks:
      primary:
        subnet: 192.168.100.0/24
        gateway: 192.168.100.1
        start: 192.168.100.60
        end: 192.168.100.90
  openshift:
    ingressVIP: 192.168.100.4
    baseDomain: okd
    version: 4.17.0
    releaseImage: quay.io/okd/scos-release:4.17.0-okd-scos.ec.3

  control_plane:
    capm3:
      hostSelector:
        matchLabels:
          cluster-role: control-plane

  machine_deployments:
    md0:
      replicas: 1
      capm3:
        hostSelector:
          matchLabels:
            cluster-role: worker


  baremetal_hosts:
    workload-cp-0:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8010/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: '52:54:00:44:44:04'
      interface_mappings:
        nic1:
          mac_address: '52:54:00:44:44:04'
        nic2:
          inspection_name: ens5
      ip_preallocations:
        primary: 192.168.100.70

    workload-cp-1:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8011/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: '52:54:00:44:44:05'
      interface_mappings:
        nic1:
          inspection_name: ens4
        nic2:
          mac_address: '52:54:00:55:55:05'
      ip_preallocations:
        primary: 192.168.100.71

    workload-cp-2:
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8012/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: '52:54:00:44:44:06'
      interface_mappings:
        nic1:
          mac_address: '52:54:00:44:44:06'
        nic2:
          mac_address: '52:54:00:55:55:06'
      ip_preallocations:
        primary: 192.168.100.72

    workload-md-0:
      bmh_metadata:
        labels:
          cluster-role: worker
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8013/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: '52:54:00:44:44:07'
      interface_mappings:
        ens4:
          mac_address: '52:54:00:44:44:07'
        ens5:
          mac_address: '52:54:00:55:55:07'
      ip_preallocations:
        primary: 192.168.100.73
