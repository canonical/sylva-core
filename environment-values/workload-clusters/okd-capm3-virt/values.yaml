---
units:
  longhorn-crd:
    enabled: false
  longhorn:
    enabled_conditions:
      - false
  multus-ready:
    enabled: false
  sriov-crd:
    enabled: false
  monitoring:
    enabled: false
  monitoring-crd:
    enabled: false
  calico:
    enabled: false
  calico-crd:
    enabled: false
  ingress-nginx:
    enabled: false
  kyverno:
    depends_on:
      monitoring-crd: false
  cluster:
    depends_on:
      calico: '{{ and (tuple . "calico" | include "unit-enabled") .Values._internal.state.is_upgrade }}'
      calico-ready: '{{ and (tuple . "calico-ready" | include "unit-enabled") .Values._internal.state.is_upgrade }}'

cluster_machines_ready:
  wait_timeout: 900s

cluster_domain: okd

cluster:
  name: okd-capm3
  agent_config_format: "ignition"
  capi_providers:
    bootstrap_provider: cabpoa

  capm3:
    machine_image_checksum: https://abcde
    machine_image_checksum_type: sha256
    machine_image_format: live-iso
    machine_image_url: https://abcdef
    dns_servers: '{{ list .Values.cluster.mgmt_cluster_ip }}'

  openshift:
    ingressVIP: 192.168.100.4
    baseDomain: okd
    version: 4.17.0
    releaseImage: quay.io/okd/scos-release:4.17.0-okd-scos.ec.3

  baremetal_hosts:  # corresponding credentials need to be set in secrets.yaml
    workload-cp-0:
      interface_mappings:
        nic1:
          mac_address: 52:54:00:44:44:04
        nic2:
          inspection_name: ens5
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8010/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: 52:54:00:44:44:04
      ip_preallocations:
        primary: 192.168.100.74
