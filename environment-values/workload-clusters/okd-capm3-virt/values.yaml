---
units:
  longhorn-crd:
    enabled: false
  longhorn:
    enabled_conditions:
      - false
  multus-ready:
    enabled: false
  sriov-crd:
    enabled: false
  monitoring:
    enabled: false
  monitoring-crd:
    enabled: false
  calico:
    enabled: false
  calico-crd:
    enabled: false
  # libvirt-metal:
  #   helmrelease_spec:
  #     values:
  #       useBond: false
  ingress-nginx:
    enabled: false
  kyverno:
    depends_on:
      monitoring-crd: false
  cluster:
    depends_on:
      calico: '{{ and (tuple . "calico" | include "unit-enabled") .Values._internal.state.is_upgrade }}'
      calico-ready: '{{ and (tuple . "calico-ready" | include "unit-enabled") .Values._internal.state.is_upgrade }}'

cluster_machines_ready:
  wait_timeout: 900s

cluster_domain: okd

cluster_virtual_ip: 192.168.100.74

cluster:
  name: okd-capm3
  agent_config_format: "ignition"
  capi_providers:
    bootstrap_provider: cabpoa

  capm3:
    machine_image_checksum: https://abcde
    machine_image_checksum_type: sha256
    machine_image_format: live-iso
    machine_image_url: https://abcdef
    dns_servers: ['{{ list .Values.cluster.mgmt_cluster_ip }}']
    # networks:
    #   primary:
    #     subnet: 192.168.100.0/24
    #     gateway: 192.168.100.1
    #     start: 192.168.100.60
    #     end: 192.168.100.90
    #     interface: bond0.100
    #   provisioning: '{{ tuple "" false | include "set-only-if" }}'

  #   networks:
  #     provisioning:
  #       interface: ens4
  #     primary:
  #       interface: ens5
  #   default_network_settings:
  #     bondXmitHashPolicy: '{{ tuple "" false | include "set-only-if" }}'
  #     bond_mode: '{{ tuple "" false | include "set-only-if" }}'

  # control_plane:
  #   network_interfaces:
  #     bond0: '{{ tuple "" false | include "set-only-if" }}'
  #     nic1: '{{ tuple "" false | include "set-only-if" }}'
  #     nic2: '{{ tuple "" false | include "set-only-if" }}'
  #     ens4:
  #       type: phy
  #     ens5:
  #       type: phy

  # machine_deployments:
  #   md0:
  #     network_interfaces:
  #       bond0: '{{ tuple "" false | include "set-only-if" }}'

  openshift:
    ingressVIP: 192.168.100.74
    baseDomain: okd
    version: 4.17.0
    releaseImage: quay.io/okd/scos-release:4.17.0-okd-scos.ec.3

  baremetal_hosts:  # corresponding credentials need to be set in secrets.yaml
    workload-cp-0:
      interface_mappings:
        nic1:
          mac_address: '52:54:00:44:44:04'
        nic2:
          mac_address: '52:54:00:55:55:04'
        # ens4:
        #   mac_address: '52:54:00:44:44:04'
        # ens5:
        #   mac_address: '52:54:00:55:55:04'
      bmh_metadata:
        labels:
          cluster-role: control-plane
      bmh_spec:
        bmc:
          address: redfish-virtualmedia://{{ .Values._internal.bootstrap_node_ip }}:8010/redfish/v1/Systems/c0014001-b10b-f001-c0de-feeb1e54ee15
        bootMACAddress: '52:54:00:44:44:04'
      ip_preallocations:
        primary: 192.168.100.74
