apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base-capm3-virt

components:
  - ../base-capm3-virt/high-availability
  - ../base-capm3-virt/high-availability-okd-override

configMapGenerator:
  - name: sylva-units-values
    behavior: merge
    files:
      - values=values.yaml
    options:
      disableNameSuffixHash: true
